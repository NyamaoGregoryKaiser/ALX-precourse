```nginx
server {
    listen 80;
    server_name localhost;

    # Serve static files from React build
    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the NestJS backend
    # This assumes the frontend app will make API calls to /api/*
    # And the backend is accessible at http://backend:3001 (service name in docker-compose)
    # The actual frontend app needs to be configured with `REACT_APP_API_BASE_URL=/api`
    # if it's hitting the same Nginx. If separate, `REACT_APP_API_BASE_URL=http://localhost:3001`
    # This configuration is for serving frontend and proxying backend from a single Nginx.
    # In `docker-compose.yml`, `frontend` service's `REACT_APP_API_BASE_URL` should point to
    # the Nginx public IP/domain, not the backend directly if this proxy is used.
    # For now, `REACT_APP_API_BASE_URL=http://localhost:${PORT}` in docker-compose build args is simpler
    # and assumes the frontend directly accesses the backend. If Nginx is proxying backend,
    # it would be `REACT_APP_API_BASE_URL=/api` in frontend build and uncomment the `location /api` block below.

    # location /api {
    #     proxy_pass http://backend:3001; # 'backend' is the service name in docker-compose
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Optionally add caching headers for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
```