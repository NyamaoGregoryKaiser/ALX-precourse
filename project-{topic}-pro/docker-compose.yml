```yaml
version: '3.8'

services:
  pgdb:
    image: postgres:14-alpine
    container_name: aurora_pgdb
    restart: unless-stopped
    env_file:
      - ./config/.env
    environment:
      POSTGRES_USER: aurora_user
      POSTGRES_PASSWORD: aurora_password
      POSTGRES_DB: aurora_metrics_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d/migrations
      - ./db/seed:/docker-entrypoint-initdb.d/seed
      # Custom Dockerfile for DB initialization including migration/seeding on startup
      # For a production setup, a separate migration tool (Flyway/Sqitch) would run externally.
      # For demo, using docker-entrypoint-initdb.d is common.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aurora_user -d aurora_metrics_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aurora_app
    restart: unless-stopped
    env_file:
      - ./config/.env
    ports:
      - "8080:8080"
    depends_on:
      pgdb:
        condition: service_healthy # Ensure DB is ready before starting app
    volumes:
      - ./logs:/app/logs # Persist application logs

volumes:
  pgdata:
```
*   **Note on DB initialization:** The `docker-compose.yml` uses `docker-entrypoint-initdb.d` to run SQL scripts on `pgdb` startup. For a robust production environment, a dedicated database migration tool (e.g., Flyway, Sqitch, or even custom scripts) would be run as a separate step in the CI/CD pipeline, independent of the database container's initial startup.

