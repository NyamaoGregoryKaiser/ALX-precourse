```yaml
version: '3.8'

services:
  # PostgreSQL Database
  postgres_db:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis_cache:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Node.js Backend API
  api:
    build:
      context: ./docker/api # Path to the Dockerfile for API
      dockerfile: Dockerfile
    container_name: ecommerce_api
    env_file:
      - ./api/.env # Load environment variables for the API
    ports:
      - "5000:5000"
    volumes:
      - ./api:/app # Mount the local API directory into the container
      - /app/node_modules # Exclude node_modules from host mount to prevent issues
    depends_on:
      postgres_db:
        condition: service_healthy
      redis_cache:
        condition: service_healthy
    networks:
      - ecommerce-network
    command: sh -c "npm install && npm run migrate && npm run seed && npm run dev" # Run migrations, seed, then start in dev mode
    # For production, change command to: "npm install --production && npm run migrate && npm start"

  # React Frontend (Development setup, replace with built assets for production)
  frontend:
    build:
      context: ./docker/frontend # Path to the Dockerfile for Frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    env_file:
      - ./frontend/.env # If your frontend uses .env
    environment:
      - REACT_APP_API_URL=${API_VERSION} # Or the full URL if Nginx is not used to proxy
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - ecommerce-network
    depends_on:
      - api
    command: npm start

  # Nginx Reverse Proxy (for production or unified access)
  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: ecommerce_nginx
    ports:
      - "80:80"
      - "443:443" # For HTTPS (requires SSL setup)
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # For production, mount frontend build files here:
      # - ./frontend/build:/var/www/frontend # Assuming React build output is in 'build'
    depends_on:
      - api
      - frontend # In production, Nginx would serve built frontend assets directly
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  pgdata:
  redisdata:
```