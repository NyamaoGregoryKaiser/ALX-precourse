```yaml
version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: task-manager-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin_password}
      POSTGRES_DB: ${DB_DATABASE:-task_manager_db}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: task-manager-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-manager-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development # Can be changed to production in production deployment
      PORT: 5000
      DB_HOST: db # Service name for PostgreSQL
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin_password}
      DB_DATABASE: ${DB_DATABASE:-task_manager_db}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_please_change_this_in_production}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME:-1h}
      REDIS_HOST: redis # Service name for Redis
      REDIS_PORT: 6379
      REDIS_CACHE_TTL_SECONDS: ${REDIS_CACHE_TTL_SECONDS:-3600}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env # Mount .env for local development
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://backend:5000/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-manager-frontend
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx default)
    environment:
      VITE_API_BASE_URL: http://backend:5000/api/v1 # Frontend uses the internal backend service name
    depends_on:
      backend:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
```