```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: event_management_db
    environment:
      POSTGRES_DB: event_db
      POSTGRES_USER: alx_user
      POSTGRES_PASSWORD: alx_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alx_user -d event_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event_management_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/event_db
      SPRING_DATASOURCE_USERNAME: alx_user
      SPRING_DATASOURCE_PASSWORD: alx_password
      JWT_SECRET: ASuperSecretKeyForJWTThatIsAtLeast256BitsLongAndShouldBeStoredInEnvironmentVariables # IMPORTANT: Use a strong, random key in production
      JWT_EXPIRATION: 86400000 # 24 hours in milliseconds
    depends_on:
      db:
        condition: service_healthy # Wait for the database to be healthy
    restart: on-failure

volumes:
  postgres_data:
```