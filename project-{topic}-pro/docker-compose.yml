```yaml
version: '3.8'

services:
  ml-db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - ml_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ml_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "PING"]
      interval: 5s
      timeout: 5s
      retries: 5

  ml-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      PORT: 5000
      DB_HOST: ml-db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REDIS_URL: redis://ml-redis:6379
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: http://localhost:3000 # For CORS on local machine, use http://localhost for dockerized frontend
    volumes:
      - ml_uploads:/app/uploads # Persist uploaded files
    ports:
      - "5000:5000"
    depends_on:
      ml-db:
        condition: service_healthy
      ml-redis:
        condition: service_healthy
    # Initialize database after services are healthy
    command: ["sh", "-c", "npm install && npm run migrate && npm run seed && npm start"]

  ml-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: http://localhost:5000/api # Connects to backend on host machine
    restart: always
    ports:
      - "3000:80" # Map container port 80 to host port 3000
    depends_on:
      - ml-backend

volumes:
  ml_db_data:
  ml_redis_data:
  ml_uploads:
```

