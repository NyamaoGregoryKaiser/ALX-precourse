version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: task-management-db
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: task-management-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task-management-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://user:password@db:5432/taskdb # Hostname 'db' matches service name
      JWT_SECRET: supersecretjwtkeythatshouldbeverylongandrandom
      JWT_EXPIRES_IN: 1h
      REDIS_URL: redis://redis:6379 # Hostname 'redis' matches service name
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 100
      CACHE_TTL_SECONDS: 3600
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules # Anonymous volume for node_modules to prevent local overwrite
    command: sh -c "npm install && npm run migration:run && npm run dev" # Run migrations, then start dev server

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task-management-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api # Connects to backend on host machine
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules # Anonymous volume
    command: npm start

volumes:
  pgdata:
```

