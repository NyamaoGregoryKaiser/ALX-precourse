version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: cms_db
    restart: always
    environment:
      POSTGRES_DB: cms_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - cms_db_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d # For initial schema and seed data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms_backend
    restart: always
    ports:
      - "9080:9080"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/cms_db
      APP_PORT: 9080
      APP_THREADS: 4
      JWT_SECRET: your_very_secure_and_long_jwt_secret_key_alx_project
      # ... other environment variables from .env.example
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src # Mount source for easier development if needed
    command: ["./cms_backend"] # Or a custom entrypoint script that handles migrations

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cms_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  cms_db_data:
```

