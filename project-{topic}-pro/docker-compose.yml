```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dataviz_db
    environment:
      POSTGRES_DB: datavizdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - dataviz_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d datavizdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dataviz_redis
    ports:
      - "6379:6379"
    volumes:
      - dataviz_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dataviz_backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://user:password@db:5432/datavizdb # Connect to DB service
      JWT_SECRET: your_jwt_secret_key_very_long_and_secure # CHANGE THIS IN PRODUCTION
      JWT_EXPIRES_IN: 1d
      NODE_ENV: development # Use 'production' for production builds
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      FRONTEND_URL: http://localhost:3000 # For CORS
    volumes:
      - ./backend:/app # Mount backend source for dev mode (hot-reloading)
      - /app/node_modules # Keep node_modules inside container
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy # Assuming Redis is used for caching, even if mocked in this code
    command: npm run dev # Use 'npm start' for production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dataviz_frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # Connect to backend service
    volumes:
      - ./frontend:/app # Mount frontend source for dev mode (hot-reloading)
      - /app/node_modules # Keep node_modules inside container
    depends_on:
      - backend

volumes:
  dataviz_db_data:
  dataviz_redis_data:
```