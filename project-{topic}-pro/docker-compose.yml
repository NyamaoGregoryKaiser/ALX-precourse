```yaml
version: '3.8'

services:
  payment-processor-db:
    image: postgres:14-alpine
    container_name: payment-processor-db
    environment:
      POSTGRES_DB: ${DB_NAME:-paymentdb}
      POSTGRES_USER: ${DB_USER:-paymentuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
    volumes:
      - payment_processor_data:/var/lib/postgresql/data
      # Mount migrations and seed data for initial setup
      - ./migrations:/docker-entrypoint-initdb.d/migrations
      - ./seeds:/docker-entrypoint-initdb.d/seeds
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-paymentuser} -d ${DB_NAME:-paymentdb}"]
      interval: 5s
      timeout: 5s
      retries: 5

  payment-processor-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment-processor-app
    depends_on:
      payment-processor-db:
        condition: service_healthy # Wait for the DB to be healthy
    environment:
      # Pass database connection details as environment variables (overrides config if loaded from env)
      DB_HOST: payment-processor-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-paymentdb}
      DB_USER: ${DB_USER:-paymentuser}
      DB_PASSWORD: ${DB_PASSWORD:-securepassword}
      APP_PORT: ${APP_PORT:-9080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_that_is_at_least_32_chars_long_and_complex}
    ports:
      - "${APP_PORT:-9080}:${APP_PORT:-9080}"
    volumes:
      - ./config:/app/config # Mount config for easy updates without rebuilding
      - ./logs:/app/logs    # Mount logs directory
    command: ["./PaymentProcessor", "config/default.json"] # Ensure it picks up mounted config

volumes:
  payment_processor_data:
```