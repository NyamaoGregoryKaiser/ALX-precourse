```yaml
version: '3.8'

services:
  app:
    build: .
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 wsgi:app
    volumes:
      - .:/app
    ports:
      - "5000:5000"
    env_file:
      - ./.env
    depends_on:
      - db
      - redis
    # Recommended for production: restart policies
    restart: unless-stopped
    networks:
      - cms_network

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-cms_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    networks:
      - cms_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - cms_network

  # Optional: Nginx for reverse proxy, load balancing, SSL termination in production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443" # For HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./certbot/conf:/etc/letsencrypt # For SSL certificates
      # - ./certbot/www:/var/www/certbot # For SSL challenges
    depends_on:
      - app
    networks:
      - cms_network
    # command: "/bin/sh -c 'while :; do sleep 6h & wait $!; nginx -s reload; done & nginx -g \"daemon off;\"'" # For automated cert renewal

networks:
  cms_network:
    driver: bridge

volumes:
  postgres_data:
```