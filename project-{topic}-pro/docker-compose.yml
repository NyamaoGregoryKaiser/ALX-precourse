version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - chat_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - chat_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        # Pass .env variables from host to Dockerfile.server if needed for build steps
        # E.g., if any build step depends on specific NODE_ENV
        NODE_ENV: ${NODE_ENV}
    restart: always
    env_file:
      - ./server/.env # Load server-specific environment variables
      - ./.env # Load shared DB/Redis envs
    ports:
      - "5000:5000"
    volumes:
      - ./server/logs:/app/logs # Persist logs
      # Optional: Bind mount source for hot-reloading in dev, remove for prod
      - ./server/src:/app/src
      - ./server/package.json:/app/package.json
      - ./server/package-lock.json:/app/package-lock.json
      - ./server/tsconfig.json:/app/tsconfig.json
      - ./server/tsconfig.build.json:/app/tsconfig.build.json
      - ./server/ormconfig.ts:/app/ormconfig.ts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "dev"] # Use dev command for hot-reloading in compose, change to "npm run start" for production

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:5000/api}
        REACT_APP_WS_BASE_URL: ${REACT_APP_WS_BASE_URL:-http://localhost:5000}
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container's port 80 (Nginx)
    depends_on:
      server:
        condition: service_started
    # For local development with React's dev server (optional alternative to Nginx):
    # volumes:
    #   - ./client:/app
    #   - /app/node_modules # Exclude node_modules from host mount
    # command: ["npm", "start"]


volumes:
  chat_db_data:
  chat_redis_data: