version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: alxpay_db
    environment:
      POSTGRES_DB: ${DB_NAME:-alxpay}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # To enable uuid-ossp extension
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-alxpay}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: alxpay_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alxpay_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-alxpay}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      HASH_SALT_ROUNDS: ${HASH_SALT_ROUNDS}
      PAYMENT_GATEWAY_URL: ${PAYMENT_GATEWAY_URL}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules # Avoid overwriting node_modules inside container
    command: sh -c "npm install && npm run typeorm migration:run && npm run seed && npm run dev"
    # In production, use: command: sh -c "npm install --production && npm run typeorm migration:run && npm run start"


  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alxpay_frontend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      REACT_APP_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:5000/api}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules # Avoid overwriting node_modules inside container
    command: npm start

volumes:
  pgdata:
  redisdata: