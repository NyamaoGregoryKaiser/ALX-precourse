```ini
[alembic]
# Path to migration scripts
script_location = alembic
# Python path to the package containing your models
sqlalchemy.url = postgresql+asyncpg://user:password@db:5432/taskdb
# This is the async DSN, which alembic uses for connection.
# Make sure it matches your ASYNC_DATABASE_URL from config.py

# A base module for models, this is where Alembic will look for your Base object
# To import models for autogeneration, specify the module path
# e.g., for models in backend/app/models/users.py, it'd be app.models.users
# For this project, all Base models inherit from app.models.base.Base.
# We'll import all specific model files into app.models/__init__.py
# and then set target_metadata in env.py to app.models.base.Base.metadata
# For now, just a placeholder.

[loggers]
keys = root, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```

To initialize Alembic, run `alembic init -t async alembic`.
Then, in `backend/alembic/env.py`, you'd configure `target_metadata` to point to `Base.metadata` from `app.models.base`.
You would then generate migrations using `alembic revision --autogenerate -m "Initial migration"`.

