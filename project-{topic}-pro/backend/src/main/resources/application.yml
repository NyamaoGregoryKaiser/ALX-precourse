spring:
  application:
    name: task-management-system
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskdb}
    username: ${DB_USER:taskuser}
    password: ${DB_PASSWORD:taskpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Use 'update' or 'create' for development, 'validate' for production with Flyway
    show-sql: false # Set to true for debugging SQL queries
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true # Fix for Postgres bytea
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Recommended for existing databases without Flyway metadata
  security:
    user:
      name: admin
      password: password
  cache:
    caffeine:
      specs: "expireAfterWrite=60s,maximumSize=500" # Default cache spec

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

jwt:
  secret: ${JWT_SECRET:your_very_secure_jwt_secret_key_that_is_at_least_256_bits_long} # Replace with a strong secret key
  expiration: 86400000 # 24 hours in milliseconds (86400 * 1000)

rate-limiting:
  enabled: true
  limit: 100 # Max requests per time unit
  time-interval-seconds: 60 # Time unit for rate limiting

logging:
  level:
    root: INFO
    com.alx.task_management_system: DEBUG # Set to DEBUG for more detailed application logs
    org.springframework.web: INFO
    org.hibernate.SQL: INFO # Log SQL queries
    org.hibernate.type.descriptor.sql.BasicExtractor: TRACE # Log parameters of SQL queries
  file:
    name: logs/task-management-system.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%t] %-40.40c{1.} : %m%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5p [%t] %-40.40c{1.} : %m%n"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
    urls:
      - name: Task Management API
        url: /api-docs
  model-and-view-allowed: true # Required for Swagger UI to work correctly with Spring WebMVC
```

