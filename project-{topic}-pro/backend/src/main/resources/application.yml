spring:
  application:
    name: task-management-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskmgrdb}
    username: ${DB_USERNAME:taskmgruser}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # 'validate' in production, 'update' or 'create' for development
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false # Set to true for debugging in development
  flyway:
    enabled: true
    locations: classpath:db/migration # Location of migration scripts
  cache:
    type: caffeine # Enable Caffeine as caching provider

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:413F4428472B4B6250655368566D5971337436763979244226452948404D6351} # Base64 encoded, min 32 bytes for HS256
      expiration: 3600000 # 1 hour in milliseconds (3600 * 1000)

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate: WARN
    com.alx.taskmgr: DEBUG # Set to DEBUG for detailed application logging
    # Enable for more granular Flyway logging:
    org.flywaydb: INFO

server:
  port: ${SERVER_PORT:8080} # Default server port
```
**Note:** `JWT_SECRET` should be a strong, randomly generated secret (e.g., `openssl rand -base64 32`). The one provided is an example.

