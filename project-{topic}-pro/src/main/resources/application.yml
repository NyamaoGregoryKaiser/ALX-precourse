```yaml
spring:
  application:
    name: event-management-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/event_db
    username: alx_user
    password: alx_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update # In production, use "none" with Flyway/Liquibase
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20 # For efficient batch inserts/updates
  security:
    user:
      name: admin
      password: admin_password # Default for basic auth if no custom auth is configured

  # H2 Database for tests
  h2:
    console:
      enabled: false # Disable H2 console in production

  # Cache Configuration (Caffeine)
  cache:
    caffeine:
      spec: expireAfterAccess=60m,maxSize=500 # Default cache settings
    cache-names:
      - eventCategories # Specific cache for categories
      - popularEvents # Example for another cache

server:
  port: 8080

jwt:
  secret: ASuperSecretKeyForJWTThatIsAtLeast256BitsLongAndShouldBeStoredInEnvironmentVariables
  expiration: 86400000 # 24 hours in milliseconds

# Logging Configuration
logging:
  level:
    root: INFO
    com.alx.eventmanagement: DEBUG # Detailed logging for our application
    org.springframework.security: INFO # Adjust for security debugging
    org.hibernate.SQL: DEBUG # Show SQL queries
    org.hibernate.orm.jdbc.bind: TRACE # Show SQL parameter binding
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/event-management.log
    max-size: 10MB
    max-history: 7

# Springdoc OpenAPI (Swagger UI) Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    display-request-duration: true

# Resilience4j Configuration
resilience4j.ratelimiter:
  instances:
    eventCreationRateLimiter:
      limitForPeriod: 5 # Allow 5 requests per period
      limitRefreshPeriod: 60s # In 60 seconds
      timeoutDuration: 0s # Don't wait if rate limited, throw exception immediately
```