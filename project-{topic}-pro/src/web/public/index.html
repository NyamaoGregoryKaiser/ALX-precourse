```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aurora Metrics Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Aurora Metrics Dashboard</h1>
        <nav>
            <button id="loginBtn">Login</button>
            <button id="logoutBtn" style="display: none;">Logout</button>
        </nav>
    </header>
    <main>
        <section id="authSection">
            <h2>Authentication</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
                <button type="button" id="registerBtn">Register</button>
            </form>
            <p id="authMessage" style="color: red;"></p>
        </section>

        <section id="dashboard" style="display: none;">
            <h2>System Metrics</h2>
            <div class="metrics-grid">
                <div class="metric-card">
                    <h3>CPU Usage (%)</h3>
                    <canvas id="cpuChart"></canvas>
                </div>
                <div class="metric-card">
                    <h3>Memory Used (GB)</h3>
                    <canvas id="memoryChart"></canvas>
                </div>
                <div class="metric-card">
                    <h3>Network In (MB/s)</h3>
                    <canvas id="netInChart"></canvas>
                </div>
                <div class="metric-card">
                    <h3>API Response Time (ms)</h3>
                    <canvas id="apiResponseChart"></canvas>
                </div>
                <!-- Add more charts for other metrics -->
            </div>
            <div class="refresh-info">
                Last updated: <span id="lastUpdated">N/A</span>. Auto-refresh every <span id="refreshInterval">5</span> seconds.
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2023 Aurora Metrics. All rights reserved.</p>
    </footer>
    <script src="/app.js"></script>
</body>
</html>
