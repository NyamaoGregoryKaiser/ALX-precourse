```nginx
user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout  65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Upstream for the Node.js API
    upstream api_upstream {
        server api:5000; # 'api' is the service name in docker-compose
    }

    # Upstream for the React Frontend (development server)
    upstream frontend_upstream {
        server frontend:3000; # 'frontend' is the service name in docker-compose
    }

    server {
        listen 80;
        server_name localhost; # Replace with your domain in production

        location / {
            # In development, proxy to the React dev server
            proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            # For production, you would serve static files directly:
            # root /var/www/frontend;
            # try_files $uri $uri/ /index.html;
        }

        location /api/v1/ {
            proxy_pass http://api_upstream/api/v1/; # Proxy API requests to the Node.js backend
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 90;
        }

        # Optional: serve static files (e.g., images, fonts) directly from Nginx
        # location /static/ {
        #    root /path/to/static/files;
        #    expires 30d;
        # }

        # Error pages (optional)
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }

    # Optional: HTTPS server block (requires SSL certificates)
    # server {
    #     listen 443 ssl;
    #     server_name localhost;
    #
    #     ssl_certificate /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #
    #     include /etc/nginx/snippets/ssl-params.conf;
    #
    #     location / {
    #         proxy_pass http://frontend_upstream;
    #         # ... same proxy headers as above
    #     }
    #
    #     location /api/v1/ {
    #         proxy_pass http://api_upstream/api/v1/;
    #         # ... same proxy headers as above
    #     }
    # }
}
