server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests if Nginx is also handling backend
    # If client is serving directly, this is not needed as client fetches API via its own env.
    # This setup is if Nginx acts as a single entry point for both frontend and backend.
    # For docker-compose, client connects directly to backend service, so this is illustrative.
    # location /api/ {
    #     proxy_pass http://server:5000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Optional: Proxy WebSocket requests
    # If client is serving directly, this is not needed as client fetches WS via its own env.
    # location /socket.io/ {
    #     proxy_pass http://server:5000/socket.io/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }
}