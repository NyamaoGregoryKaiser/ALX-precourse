```yaml
spring:
  application:
    name: vizflow-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:vizflow}
    username: ${DB_USER:vizflow_user}
    password: ${DB_PASSWORD:vizflow_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # 'none' in production with Flyway, 'update' or 'create-drop' for dev/testing
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    user:
      name: admin
      password: adminpassword # THIS IS FOR DEV ONLY, REMOVE IN PROD OR USE REAL SECURE AUTH

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:YOUR_SECURE_AND_LONG_SECRET_KEY_HERE_MIN_32_CHARS_FOR_HS256} # Generate a secure key for production
  expiration: ${JWT_EXPIRATION_MS:86400000} # 24 hours in milliseconds

rate:
  limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    requests-per-second: ${RATE_LIMIT_RPS:10} # 10 requests per second per IP

logging:
  file:
    name: ./logs/vizflow-backend.log
  level:
    root: INFO
    com.alx.vizflow: DEBUG # Enable debug logs for our application
```