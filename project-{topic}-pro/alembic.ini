# A generic, usable Alembic configuration file.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate new revision files. Change to 'standard' to use the
# default combined template, 'multidb' for a multi-database migration template.
# revision_script_template = %(script_location)s/%(rev)s_%(_short_name)s.py
# This is a good default for most projects, which means it will use
# the 'script.py.mako' template from the 'migrations' directory.

# output encoding for revision files
encoding = utf-8

# add your database connection string here.
# for production environments, use a multi-settings approach
# where different production/development configurations can be switched.
# For local dev, you can uncomment this and set your local DB URL.
# For Docker setup, this will be handled via env var.
sqlalchemy.url = postgresql+psycopg2://user:password@db:5432/task_db

# set to 'true' to run the environment multiple times when using -x directive
# multiple_execute_once = false

# Allows to use relative paths for 'file_template' (etc.) in env.py
# file_template_path = False

# revision_table_name: Default name for Alembic's revision table
revision_table_name = alembic_version

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
