```yaml
name: CMS CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    env:
      # Use test environment variables for the backend
      NODE_ENV: test
      PORT: 5001
      DB_CLIENT: pg
      DB_HOST: localhost
      DB_PORT: 5433 # Use a different port to avoid conflicts
      DB_USER: test_user
      DB_PASSWORD: test_password
      DB_NAME: test_db
      JWT_SECRET: test_jwt_secret
      REDIS_HOST: localhost
      REDIS_PORT: 6380 # Use a different port
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Start PostgreSQL for tests
        run: |
          docker run --name test-db -e POSTGRES_DB=${DB_NAME} -e POSTGRES_USER=${DB_USER} -e POSTGRES_PASSWORD=${DB_PASSWORD} -p 5433:5432 -d postgres:16-alpine
          # Wait for PostgreSQL to be ready
          sleep 10
          docker exec test-db pg_isready -U ${DB_USER} -d ${DB_NAME}

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Run backend migrations
        run: knex migrate:latest --knexfile knexfile.js
        working-directory: ./backend

      - name: Run backend seeders (optional for tests, depends on test strategy)
        run: knex seed:run --knexfile knexfile.js
        working-directory: ./backend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend

      - name: Stop PostgreSQL
        if: always()
        run: docker stop test-db && docker rm test-db

  build-and-test-frontend:
    runs-on: ubuntu-latest
    env:
      REACT_APP_API_URL: http://localhost:5000/api/v1 # Mock or point to a test backend if needed
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test -- --watchAll=false
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main' # Deploy only from main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: yourdockerhub/cms-backend:${{ github.sha }}
          build-args: |
            NODE_ENV=production

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: yourdockerhub/cms-frontend:${{ github.sha }}

      - name: Deploy to Production Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Pull new images
            docker pull yourdockerhub/cms-backend:${{ github.sha }}
            docker pull yourdockerhub/cms-frontend:${{ github.sha }}

            # Update docker-compose.yml to use new image tags
            # This part is conceptual. In a real scenario, you'd use a templating engine
            # or CI/CD specific tools to update the image tags in your deployment manifest.
            # Example: sed -i "s|cms-backend:.*|cms-backend:${{ github.sha }}|" docker-compose.prod.yml

            # Restart services
            cd /path/to/your/deployment/folder
            docker-compose -f docker-compose.prod.yml down
            docker-compose -f docker-compose.prod.yml up -d
            docker system prune -f # Clean up old images
```