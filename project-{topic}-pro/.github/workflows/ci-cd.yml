```yaml
name: Aurora Metrics CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install C++ dependencies (vcpkg example - recommended)
      # For a real project, use vcpkg or Conan.
      # For this blueprint, we'll use system libs and assume some are found.
      # This step would typically install vcpkg, then install necessary libraries.
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake libpq-dev libssl-dev # Basic build tools + libpq for postgres
        # Example for vcpkg setup:
        # git clone https://github.com/Microsoft/vcpkg.git /usr/local/vcpkg
        # /usr/local/vcpkg/bootstrap-vcpkg.sh
        # /usr/local/vcpkg/vcpkg integrate install
        # /usr/local/vcpkg/vcpkg install crow spdlog libpqxx jwt-cpp nlohmann-json googletest --recurse

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release # Add -DCMAKE_TOOLCHAIN_FILE=/usr/local/vcpkg/scripts/buildsystems/vcpkg.cmake if using vcpkg

    - name: Build C++ application
      run: cmake --build build --config Release

    - name: Run Unit and Integration Tests
      # Assuming your tests/CMakeLists.txt correctly adds test executables
      run: |
        cd build
        ./tests/unit_tests
        ./tests/integration_tests
      env:
        # Set environment variables for tests, especially DB connection for integration tests
        DATABASE_URL: "postgresql://test_user:test_password@localhost:5432/test_aurora_metrics_db"
        JWT_SECRET: "test_jwt_secret_for_ci"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      if: github.ref == 'refs/heads/main' # Only log in for main branch pushes
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/aurora-metrics:latest
          ${{ secrets.DOCKER_USERNAME }}/aurora-metrics:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Deploy only from main branch

    steps:
    - name: Deploy to Server (SSH)
      # This is a conceptual deployment step. In a real scenario, you'd pull the latest Docker image
      # on your server and restart the Docker Compose stack.
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /path/to/your/aurora-metrics-deployment
          docker-compose pull app # Pull the latest image
          docker-compose down
          docker-compose up -d
          echo "Deployment complete for Aurora Metrics!"
```
