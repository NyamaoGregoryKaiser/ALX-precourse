name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm install --prefix backend

      - name: Run backend tests
        run: npm test --prefix backend -- --ci --coverage --testResultsProcessor="jest-junit"
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/testdb # Use a test DB
          JWT_SECRET: testsecret
          REDIS_URL: redis://localhost:6379 # For testing redis connection
        continue-on-error: true # Allow non-critical tests to fail without stopping build immediately

      - name: Build backend
        run: npm run build --prefix backend

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage

      - name: Docker Login to ghcr.io
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install --prefix frontend

      - name: Run frontend tests
        run: npm test --prefix frontend -- --ci --coverage
        env:
          CI: true # Required for Create React App tests in CI environments

      - name: Build frontend
        run: npm run build --prefix frontend

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: frontend/coverage

      - name: Docker Login to ghcr.io
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci] # Only deploy if both CI jobs pass
    if: github.ref == 'refs/heads/main' # Deploy only from main branch
    environment: production # Define a production environment in GitHub for secrets/variables
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Pull Docker images
        run: |
          docker pull ghcr.io/${{ github.repository }}/backend:latest
          docker pull ghcr.io/${{ github.repository }}/frontend:latest

      - name: Deploy to EC2/Remote Server (example using SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            # Update images and restart services using docker-compose
            cd /path/to/your/app/on/server
            # Ensure .env is present on server or pass env vars directly
            echo "DATABASE_URL=${{ secrets.PROD_DATABASE_URL }}" > .env
            echo "JWT_SECRET=${{ secrets.PROD_JWT_SECRET }}" >> .env
            echo "REDIS_URL=${{ secrets.PROD_REDIS_URL }}" >> .env
            echo "REACT_APP_API_BASE_URL=${{ secrets.PROD_FRONTEND_API_URL }}" >> .env
            # Add other production environment variables
            docker compose pull
            docker compose up -d --force-recreate --build
            docker system prune -f
            echo "Deployment completed successfully!"