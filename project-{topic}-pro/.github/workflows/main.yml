```yaml
name: E-commerce CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    name: Build & Test Backend API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./api

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache Node.js modules
        uses: actions/cache@v3
        with:
          path: api/node_modules
          key: ${{ runner.os }}-node-backend-${{ hashFiles('api/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-backend-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Set up Docker Compose for Backend Tests
        run: |
          docker-compose -f docker-compose.test.yml up -d --build postgres_db redis_cache
        working-directory: . # Run from root to find docker-compose.test.yml
        env:
          DB_NAME: ecommerce_db_test # Use a specific test database name

      - name: Wait for database to be ready
        run: |
          ./wait-for-it.sh postgres_db:5432 --timeout=60 -- echo "PostgreSQL is up!"
          ./wait-for-it.sh redis_cache:6379 --timeout=60 -- echo "Redis is up!"
        working-directory: .
        # Note: You'd need a wait-for-it.sh script or similar tool copied into the repo or downloaded.
        # Alternatively, use a dedicated Docker healthcheck in compose.test.yml.

      - name: Run Backend Tests
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: postgres_db
          DB_PORT: 5432
          DB_USER: ecommerce_user
          DB_PASSWORD: ecommerce_password
          DB_NAME: ecommerce_db_test
          JWT_SECRET: test_jwt_secret
          REDIS_HOST: redis_cache
          REDIS_PORT: 6379

      - name: Stop Docker Compose services
        if: always()
        run: docker-compose -f docker-compose.test.yml down -v
        working-directory: .

      - name: Upload code coverage report
        uses: codecov/codecov-action@v3
        with:
          files: ./api/coverage/lcov.info # Path to your LCOV report

  build-frontend:
    name: Build Frontend Application
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache Node.js modules
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-frontend-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-frontend-

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Build Frontend
        run: npm run build
        env:
          REACT_APP_API_URL: /api/v1 # Placeholder for build, Nginx handles actual routing

      - name: Archive production artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

  # Conceptual Deployment Job (replace with your actual deployment strategy)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-frontend] # Only deploy if tests and builds pass
    environment: production # Protects the production environment
    if: github.ref == 'refs/heads/main' # Only deploy main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Download frontend build artifact
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub (or other registry)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend API Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/api/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-api:latest
          build-args: |
            NODE_ENV=production

      # Note: Frontend build is already an artifact. We could push the nginx image
      # which includes the frontend build or just update the volume mount on the server.

      - name: Deploy to EC2 instance (Example using SSH)
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ecommerce-system
            git pull origin main
            docker-compose pull # Pull latest images (e.g., your api image)
            docker-compose -f docker-compose.prod.yml up -d --build # Run production compose, triggering migrations/seeds in backend container
            docker system prune -f # Clean up old images

