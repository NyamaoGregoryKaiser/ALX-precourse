name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres_test:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_task_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - "5433:5432" # Map to 5433 for tests to avoid conflict with dev DB (if any)
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis_test:
        image: redis:7-alpine
        ports:
          - "6380:6379" # Map to 6380 for tests
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Wait for PostgreSQL and Redis to be ready
      run: |
        echo "Waiting for PostgreSQL..."
        for i in $(seq 1 10); do
          pg_isready -h localhost -p 5433 -U test_user -d test_task_db && break
          sleep 5
        done
        echo "PostgreSQL is ready."

        echo "Waiting for Redis..."
        for i in $(seq 1 10); do
          redis-cli -h localhost -p 6380 ping && break
          sleep 5
        done
        echo "Redis is ready."

    - name: Run Black formatter check
      run: black --check app tests scripts

    - name: Run Isort check
      run: isort --check-only app tests scripts

    - name: Run Flake8 linter
      run: flake8 app tests scripts

    - name: Run tests with Pytest and coverage
      env:
        DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5433/test_task_db
        REDIS_URL: redis://localhost:6380/1 # Point to test Redis DB
        SECRET_KEY: test_secret_key # For JWT in tests
        ACCESS_TOKEN_EXPIRE_MINUTES: 1
        REFRESH_TOKEN_EXPIRE_MINUTES: 2
        LOG_LEVEL: WARNING # Reduce log noise during tests
      run: |
        # Generate the initial migrations to ensure models are correctly defined
        # For CI, we generally don't run `alembic revision --autogenerate`.
        # Instead, we apply existing migrations.
        alembic upgrade head
        pytest --cov=app --cov-report=xml --cov-report=term-missing

    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage.xml
        fail_ci_if_error: true # Keep PRs open if codecov fails
        verbose: true # So we can see what is happening

  # Example deployment job (highly simplified)
  deploy:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' # Deploy only on pushes to main branch
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: production # Define a GitHub environment for secrets and protections
      url: https://your-production-app.com # URL to your deployed app

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Placeholder for actual deployment steps
    # In a real scenario, this would involve:
    # 1. Logging into a cloud provider (AWS, GCP, Azure)
    # 2. Building and pushing Docker images to a container registry (ECR, GCR, Docker Hub)
    # 3. Updating a deployment (Kubernetes, ECS, App Service, etc.)
    # 4. Running database migrations (carefully, outside the app container if needed)
    # 5. Health checks
    # 6. Notifications

    - name: Simulate deployment
      run: |
        echo "Simulating deployment to production environment..."
        echo "Building Docker image..."
        docker build -t your-app-name:$(echo $GITHUB_SHA | cut -c1-7) .
        echo "Pushing image to registry..."
        echo "Deploying to Kubernetes/ECS/etc..."
        echo "Deployment complete!"
        # This is where you'd use AWS CLI, kubectl, terraform, etc.
        # Example: aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 123456789012.dkr.ecr.us-east-1.amazonaws.com
        # docker push 123456789012.dkr.ecr.us-east-1.amazonaws.com/your-app-name:$(echo $GITHUB_SHA | cut -c1-7)
        # kubectl apply -f kubernetes-manifests.yaml
