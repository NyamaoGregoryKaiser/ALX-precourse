name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and run tests
      run: mvn -B package --file pom.xml

    - name: Upload JaCoCo coverage report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: backend/target/site/jacoco/jacoco.xml # Path to JaCoCo XML report

  build-and-push-docker-images:
    needs: build-and-test-backend # Only proceed if backend build and tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only push to registry on main branch pushes

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Set up JDK 17 (for backend JAR build, if not already built and cached)
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build backend JAR for Docker image
      run: mvn -B clean package -DskipTests # Skip tests here, as they ran in previous job
      working-directory: ./backend

    - name: Build and push backend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/task-management-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/task-management-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # Frontend build and push (conceptual)
    - name: Build and push frontend Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/task-management-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/task-management-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # This job is purely conceptual and shows where a deployment step would go.
  # Actual deployment would involve cloud provider specific actions (e.g., AWS ECR, Kubernetes).
  deploy:
    needs: build-and-push-docker-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only deploy on main branch pushes

    steps:
    - name: Deploy to Kubernetes (Conceptual)
      run: |
        echo "Deploying latest Docker images to Kubernetes cluster..."
        # Replace with actual deployment commands, e.g., using kubectl
        # kubectl apply -f kubernetes/deployment.yaml
        # kubectl rollout status deployment/task-management-backend
        # kubectl rollout status deployment/task-management-frontend
        echo "Deployment complete."
