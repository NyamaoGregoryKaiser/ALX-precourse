```yaml
name: Java Spring Boot CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean install -B

    - name: Run JaCoCo report
      run: mvn jacoco:report

    - name: Upload JaCoCo report to Codecov (Optional)
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Required for private repos
        fail_ci_if_error: true # Recommended to fail CI if Codecov upload fails
        files: target/site/jacoco/jacoco.xml # Path to JaCoCo XML report
        verbose: true # Option for more debug output

    - name: Archive build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: spring-boot-app
        path: target/*.jar

  test-integration-docker:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Restore build artifacts
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-app
          path: target/

      - name: Build Docker images for integration tests
        run: docker-compose -f docker-compose.test.yml build # Use a separate compose file for tests if needed

      - name: Run integration tests with Testcontainers
        # Assuming your Spring Boot tests with @Testcontainers can run against
        # a local Postgres instance (or Testcontainers can launch it).
        # For simplicity, if @Testcontainers is configured to spin up postgres
        # for each test, mvn test is sufficient.
        # If running against a pre-existing docker-compose setup, it's more complex.
        run: mvn test -P integration-test # Activate a profile that runs integration tests

  deploy-docker:
    needs: build # Or test-integration-docker if you want to ensure tests pass before deployment
    if: github.ref == 'refs/heads/main' # Only deploy from the main branch
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/event-management-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/event-management-backend:${{ github.sha }}

    - name: Deploy to Server (Example: SSH and restart service)
      # This is a placeholder. Real deployment varies greatly (Kubernetes, AWS ECS, custom server).
      # For a simple server, you might SSH in and run 'docker-compose pull && docker-compose up -d'.
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_SSH_KEY }}
        script: |
          cd /path/to/your/app/on/server
          docker-compose pull event_management_app
          docker-compose up -d --no-deps event_management_app # Restart only the app service
          docker image prune -f # Clean up old images
```