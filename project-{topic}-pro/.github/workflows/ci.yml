```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: taskdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Load environment variables for tests
      run: |
        echo "DATABASE_URL=postgresql://user:password@localhost:5432/taskdb_test" >> $GITHUB_ENV
        echo "ASYNC_DATABASE_URL=postgresql+asyncpg://user:password@localhost:5432/taskdb_test" >> $GITHUB_ENV
        echo "SECRET_KEY=test-secret-key" >> $GITHUB_ENV
        echo "BACKEND_CORS_ORIGINS=['http://localhost:3000']" >> $GITHUB_ENV
        echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV

    - name: Wait for PostgreSQL and Redis to be ready
      run: |
        sudo apt-get update && sudo apt-get install -y postgresql-client
        for i in `seq 1 10`; do pg_isready -h localhost -p 5432 -U user -d taskdb_test && break || sleep 5; done
        for i in `seq 1 10`; do redis-cli -h localhost -p 6379 ping && break || sleep 5; done

    - name: Run backend tests
      working-directory: ./backend
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing tests/

    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.xml
        fail_ci_if_error: true

    - name: Build and push backend Docker image (on main/develop branch push)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false # Set to true to push to Docker Hub/GHCR
        tags: your-dockerhub-username/task-manager-backend:${{ github.sha }}
        secrets: |
          REDIS_URL=${{ env.REDIS_URL }}
          DATABASE_URL=${{ env.DATABASE_URL }}
          ASYNC_DATABASE_URL=${{ env.ASYNC_DATABASE_URL }}
          SECRET_KEY=${{ env.SECRET_KEY }}
          BACKEND_CORS_ORIGINS=${{ env.BACKEND_CORS_ORIGINS }}

  frontend-test-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm install

    - name: Run frontend tests
      working-directory: ./frontend
      run: npm test -- --coverage --watchAll=false # `--watchAll=false` for CI

    - name: Build frontend for production (on main/develop branch push)
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
      working-directory: ./frontend
      env:
        # Pass environment variables needed during build
        REACT_APP_API_BASE_URL: http://localhost:8000/api/v1 # Placeholder for build env
      run: npm run build
```

