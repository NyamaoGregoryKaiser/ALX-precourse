```yaml
name: CI/CD Pipeline for DataVizApp

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/ci.yml'

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          npm install

      - name: Run backend tests
        run: |
          cd backend
          npm test -- --coverage # Run tests and collect coverage

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage

      - name: Build backend Docker image
        run: docker build -t dataviz-backend:latest -f Dockerfile.backend .

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false # Run tests and collect coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: frontend/coverage

      - name: Build frontend Docker image
        run: docker build -t dataviz-frontend:latest -f Dockerfile.frontend .

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main' # Only deploy on push to main branch
    environment: production # Link to a GitHub environment (optional)
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub (or your container registry)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        run: |
          docker build -t YOUR_DOCKERHUB_USERNAME/dataviz-backend:${{ github.sha }} -f Dockerfile.backend .
          docker push YOUR_DOCKERHUB_USERNAME/dataviz-backend:${{ github.sha }}
          docker tag YOUR_DOCKERHUB_USERNAME/dataviz-backend:${{ github.sha }} YOUR_DOCKERHUB_USERNAME/dataviz-backend:latest
          docker push YOUR_DOCKERHUB_USERNAME/dataviz-backend:latest

      - name: Build and push frontend image
        run: |
          docker build -t YOUR_DOCKERHUB_USERNAME/dataviz-frontend:${{ github.sha }} -f Dockerfile.frontend .
          docker push YOUR_DOCKERHUB_USERNAME/dataviz-frontend:${{ github.sha }}
          docker tag YOUR_DOCKERHUB_USERNAME/dataviz-frontend:${{ github.sha }} YOUR_DOCKERHUB_USERNAME/dataviz-frontend:latest
          docker push YOUR_DOCKERHUB_USERNAME/dataviz-frontend:latest

      - name: Deploy to Server (e.g., using SSH and Docker Compose)
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/app # Replace with your app's directory on the server
            docker compose pull
            docker compose down
            docker compose up -d
            docker system prune -f # Clean up old images/volumes
```