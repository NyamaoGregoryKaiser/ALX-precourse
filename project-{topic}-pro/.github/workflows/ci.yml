```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build Docker image
      run: docker build -t payment-processor:latest .

    - name: Run unit and integration tests (in container)
      run: |
        docker run --rm payment-processor:latest ./PaymentProcessorTests

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' # Deploy only from main branch

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub (or other registry)
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      id: docker_build
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/payment-processor:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/payment-processor:latest

    - name: Deploy to Staging/Production (Conceptual)
      run: |
        echo "Deployment script for staging/production would go here."
        echo "This might involve SSHing to a server, running 'docker-compose pull' and 'docker-compose up -d', or updating Kubernetes manifests."
        echo "Using image: ${{ secrets.DOCKER_USERNAME }}/payment-processor:${{ github.sha }}"
        # Example: ssh user@your-server "docker-compose -f /path/to/docker-compose.yml pull payment-processor-app && docker-compose -f /path/to/docker-compose.yml up -d payment-processor-app"
      # You would typically add environment-specific logic, e.g., using secrets for server credentials
