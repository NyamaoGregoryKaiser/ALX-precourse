name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: npm install
        working-directory: ./backend

      - name: Build Backend (TypeScript compilation)
        run: npm run build
        working-directory: ./backend

      - name: Set up Docker Compose for Backend Tests
        run: |
          docker-compose -f docker-compose.test.yml up -d db redis
        working-directory: ./backend

      - name: Wait for DB and Redis to be healthy
        run: |
          ./wait-for-it.sh db:5432 --timeout=60 --strict -- echo "PostgreSQL is up"
          ./wait-for-it.sh redis:6379 --timeout=60 --strict -- echo "Redis is up"
        working-directory: ./backend
        env:
          WAIT_FOR_IT_FILE: ./wait-for-it.sh # Assuming wait-for-it.sh is present

      - name: Run Backend Tests
        run: npm test -- --coverage
        working-directory: ./backend
        env:
          # Use test environment variables
          NODE_ENV: test
          DB_HOST: db
          DB_PORT: 5432
          DB_USERNAME: admin
          DB_PASSWORD: admin_password
          DB_DATABASE: task_manager_test_db
          JWT_SECRET: test_jwt_secret
          REDIS_HOST: redis
          REDIS_PORT: 6379
          LOG_LEVEL: error # Suppress logs during tests

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage

      - name: Stop Docker Compose for Backend Tests
        run: docker-compose -f docker-compose.test.yml down
        working-directory: ./backend
        if: always() # Ensure this runs even if tests fail

  frontend-build-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Lint Frontend
        run: npm run lint
        working-directory: ./frontend

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend

