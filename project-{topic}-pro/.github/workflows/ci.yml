name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: scraper_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install Backend Dependencies
        run: npm install
        working-directory: ./backend

      - name: Run Backend Tests
        run: npm test -- --coverage # --coverage for coverage report
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/scraper_test_db
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test_jwt_secret
          NODE_ENV: test
          CACHE_ENABLED: "false" # Disable cache for tests
          PUPPETEER_HEADLESS: "true" # Ensure headless for CI

  build-and-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18.x

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run Frontend Tests
        run: npm test -- --watchAll=false
        working-directory: ./frontend
        env:
          CI: true # Required for React scripts test in CI environments

      - name: Build Frontend
        run: npm run build
        working-directory: ./frontend
        env:
          REACT_APP_API_BASE_URL: /api # Set for production build


