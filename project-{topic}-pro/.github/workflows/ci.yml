name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: payments_user
          POSTGRES_PASSWORD: secure_password
          POSTGRES_DB: payment_system_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Wait for services (DB and Redis)
      run: |
        echo "Waiting for PostgreSQL..."
        while ! nc -z localhost 5432; do
          sleep 1
        done
        echo "PostgreSQL started."
        echo "Waiting for Redis..."
        while ! nc -z localhost 6379; do
          sleep 1
        done
        echo "Redis started."

    - name: Create .env file for tests
      run: |
        echo "NODE_ENV=test" > .env
        echo "PORT=5000" >> .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_PORT=5432" >> .env
        echo "DB_USER=payments_user" >> .env
        echo "DB_PASSWORD=secure_password" >> .env
        echo "DB_NAME=payment_system_db_test" >> .env
        echo "JWT_SECRET=testjwtsecret" >> .env
        echo "JWT_EXPIRES_IN=1h" >> .env
        echo "REDIS_HOST=localhost" >> .env
        echo "REDIS_PORT=6379" >> .env
        echo "PAYMENT_GATEWAY_API_KEY=test_api_key" >> .env
        echo "PAYMENT_GATEWAY_SECRET=test_secret" >> .env
        echo "PAYMENT_GATEWAY_BASE_URL=http://localhost:5001/mock-gateway" >> .env # Or a mock service URL
        echo "MOCK_PAYMENT_SUCCESS_RATE=1.0" >> .env # Make mock payments always succeed in tests
        echo "MOCK_PAYMENT_PROCESSING_TIME_MS=10" >> .env
      env:
        DB_USER: ${{ services.postgres.env.POSTGRES_USER }}
        DB_PASSWORD: ${{ services.postgres.env.POSTGRES_PASSWORD }}
        DB_NAME: ${{ services.postgres.env.POSTGRES_DB }}

    - name: Run database migrations
      run: npm run migrate:latest

    - name: Run tests (Unit, Integration, API) with coverage
      run: npm run test:coverage

    - name: Lint code
      run: npm run lint

    - name: Build Docker image
      run: docker build -t payment-system-backend:${{ github.sha }} .
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    - name: Push Docker image to registry (e.g., Docker Hub, ECR)
      # This step requires you to configure Docker Hub/ECR credentials in GitHub Secrets
      # e.g., DOCKER_USERNAME, DOCKER_PASSWORD
      if: github.ref == 'refs/heads/main' && success()
      run: |
        echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        docker tag payment-system-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/payment-system-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/payment-system-backend:latest

  # Optional: Deployment job (e.g., to AWS ECS, Kubernetes, etc.)
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && success() # Deploy only on successful push to main
    steps:
      - name: Deploy to Production
        run: echo "Deployment script goes here (e.g., AWS CLI, kubectl, Capistrano)"
        # Example for ECS:
        # - uses: aws-actions/configure-aws-credentials@v1
        #   with:
        #     aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        #     aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        #     aws-region: us-east-1
