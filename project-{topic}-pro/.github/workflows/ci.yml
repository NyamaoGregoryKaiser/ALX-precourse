name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './server/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Lint backend code
        run: npm run lint # Assuming you have a lint script configured in package.json

      - name: Build backend
        run: npm run build

      - name: Run backend unit tests
        run: npm run test:unit

      - name: Run backend integration tests
        # For integration tests, a test database needs to be spun up.
        # This example uses a simple approach, but for complex setups,
        # consider dedicated test database services (e.g., testcontainers).
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_NAME: chat_test_db
          JWT_SECRET: supersecretkey
          REDIS_URL: redis://localhost:6379
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "CREATE USER testuser WITH PASSWORD 'testpass';"
          sudo -u postgres psql -c "CREATE DATABASE chat_test_db OWNER testuser;"
          npm run typeorm migration:run # Apply migrations to test DB
          npm run test:integration --coverage

      - name: Upload backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./server/coverage

  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './client/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Lint frontend code
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: ./client/coverage