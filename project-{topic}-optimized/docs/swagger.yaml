openapi: 3.0.0
info:
  title: Mobile Task Management API
  version: 1.0.0
  description: A comprehensive backend system for a mobile task management and collaboration application.

servers:
  - url: http://localhost:3000/api/v1
    description: Local Development Server

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Enter JWT Bearer token **_only_**

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        username:
          type: string
          example: johndoe
        email:
          type: string
          format: email
          example: john.doe@example.com
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        role:
          type: string
          enum: [USER, ADMIN, MANAGER]
          example: USER
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - username
        - email
        - role

    AuthTokens:
      type: object
      properties:
        access:
          type: object
          properties:
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            expires:
              type: string
              format: date-time
        refresh:
          type: object
          properties:
            token:
              type: string
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            expires:
              type: string
              format: date-time
      required:
        - access
        - refresh

    Team:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        name:
          type: string
          example: Frontend Ninjas
        description:
          type: string
          example: Team responsible for building and maintaining the mobile app frontend.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        _count:
          type: object
          properties:
            members:
              type: integer
            projects:
              type: integer
      required:
        - id
        - name

    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: b1c2d3e4-f5a6-7890-1234-567890abcdef
        name:
          type: string
          example: New Feature Development
        description:
          type: string
          example: Develop and integrate user-facing features for the upcoming release.
        status:
          type: string
          example: active
        ownerId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - status

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: c1d2e3f4-a5b6-7890-1234-567890abcdef
        title:
          type: string
          example: Implement Login Screen UI
        description:
          type: string
          example: Create the UI elements and integrate with authentication service for the login screen.
        status:
          type: string
          enum: [TODO, IN_PROGRESS, DONE, BLOCKED]
          example: IN_PROGRESS
        priority:
          type: integer
          example: 3
        dueDate:
          type: string
          format: date-time
        projectId:
          type: string
          format: uuid
        assigneeId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - status
        - projectId

    Comment:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: d1e2f3g4-a5b6-7890-1234-567890abcdef
        content:
          type: string
          example: Great progress on the task! Just a small design tweak needed.
        taskId:
          type: string
          format: uuid
        authorId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - content
        - taskId
        - authorId

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [fail, error]
          example: fail
        message:
          type: string
          example: Invalid input data.
        error:
          type: object
          description: Detailed error object (only in development)
        stack:
          type: string
          description: Stack trace (only in development)

  parameters:
    userId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID of the user
    teamId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID of the team
    projectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID of the project
    taskId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID of the task
    commentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: ID of the comment

tags:
  - name: Authentication
    description: User authentication and authorization operations
  - name: Users
    description: User management operations
  - name: Teams
    description: Team management and collaboration
  - name: Projects
    description: Project creation and management
  - name: Tasks
    description: Task tracking and assignment
  - name: Comments
    description: Communication and feedback on tasks

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: newuser123
                email:
                  type: string
                  format: email
                  example: newuser@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: SecurePassword123!
                firstName:
                  type: string
                  example: Jane
                lastName:
                  type: string
                  example: Doe
                role:
                  type: string
                  enum: [USER, ADMIN, MANAGER]
                  example: USER
              required:
                - username
                - email
                - password
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Conflict (Email or username already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Log in a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: john.doe@example.com
                password:
                  type: string
                  format: password
                  example: password123
              required:
                - email
                - password
      responses:
        '200':
          description: User successfully logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      tokens:
                        $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Unauthorized (Incorrect email or password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh-tokens:
    post:
      tags:
        - Authentication
      summary: Refresh access and refresh tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
              required:
                - refreshToken
      responses:
        '200':
          description: Tokens successfully refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    $ref: '#/components/schemas/AuthTokens'
        '401':
          description: Unauthorized (Invalid or expired refresh token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Log out a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
              required:
                - refreshToken
      responses:
        '204':
          description: User successfully logged out (No Content)
        '401':
          description: Unauthorized (Invalid refresh token)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      tags:
        - Users
      summary: Get all users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: sort
          schema:
            type: string
            example: -createdAt,username
            description: Sort by fields (e.g., createdAt, -username for descending)
        - in: query
          name: email
          schema:
            type: string
          description: Filter by email
        - in: query
          name: role
          schema:
            type: string
            enum: [USER, ADMIN, MANAGER]
          description: Filter by role
      responses:
        '200':
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 1
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: User object
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Users
      summary: Update user by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: updateduser
                email:
                  type: string
                  format: email
                  example: updated@example.com
                firstName:
                  type: string
                lastName:
                  type: string
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: NewSecurePassword123!
              minProperties: 1
      responses:
        '200':
          description: User successfully updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict (Email or username already taken)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Users
      summary: Delete user by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '204':
          description: User successfully deleted (No Content)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/{id}/assign-role:
    patch:
      tags:
        - Users
      summary: Assign a role to a user (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                role:
                  type: string
                  enum: [USER, ADMIN, MANAGER]
                  example: MANAGER
              required:
                - role
      responses:
        '200':
          description: User role updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: User role updated successfully
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /teams:
    get:
      tags:
        - Teams
      summary: Get all teams
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: sort
          schema:
            type: string
            example: -createdAt,name
        - in: query
          name: name
          schema:
            type: string
          description: Filter by team name
      responses:
        '200':
          description: A list of teams
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 1
                  data:
                    type: object
                    properties:
                      teams:
                        type: array
                        items:
                          $ref: '#/components/schemas/Team'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Teams
      summary: Create a new team
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Design Squad
                description:
                  type: string
                  example: Responsible for all UI/UX designs.
              required:
                - name
      responses:
        '201':
          description: Team successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      team:
                        $ref: '#/components/schemas/Team'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Conflict (Team name already exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /teams/{id}:
    get:
      tags:
        - Teams
      summary: Get team by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/teamId'
      responses:
        '200':
          description: Team object
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      team:
                        $ref: '#/components/schemas/Team'
                        # Include members and projects for detail view
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags:
        - Teams
      summary: Update team by ID (Managers/Admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/teamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Revamped Design Squad
                description:
                  type: string
                  example: Updated description for the design team.
              minProperties: 1
      responses:
        '200':
          description: Team successfully updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      team:
                        $ref: '#/components/schemas/Team'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict (Team name already taken)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Teams
      summary: Delete team by ID (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/teamId'
      responses:
        '204':
          description: Team successfully deleted (No Content)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /teams/{id}/members:
    post:
      tags:
        - Teams
      summary: Add a member to a team (Managers/Admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/teamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                  example: user_uuid_to_add
                role:
                  type: string
                  enum: [USER, MANAGER]
                  example: USER
              required:
                - userId
      responses:
        '201':
          description: Member added to team successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not Found (Team or User not found)
        '409':
          description: Conflict (User already a member)
    delete:
      tags:
        - Teams
      summary: Remove a member from a team (Managers/Admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/teamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                  example: user_uuid_to_remove
              required:
                - userId
      responses:
        '204':
          description: Member removed successfully (No Content)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not Found (Team or Member not found)

  /teams/{id}/members/role:
    patch:
      tags:
        - Teams
      summary: Update a team member's role (Managers/Admin only)
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/teamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId:
                  type: string
                  format: uuid
                  example: user_uuid_to_update
                role:
                  type: string
                  enum: [USER, MANAGER]
                  example: MANAGER
              required:
                - userId
                - role
      responses:
        '200':
          description: Member role updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not Found (Team or Member not found)

  /projects:
    get:
      tags:
        - Projects
      summary: Get all projects
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
        - in: query
          name: sort
          schema:
            type: string
            example: -createdAt,name
        - in: query
          name: name
          schema:
            type: string
          description: Filter by project name
        - in: query
          name: status
          schema:
            type: string
          description: Filter by project status (e.g., active, completed)
        - in: query
          name: ownerId
          schema:
            type: string
            format: uuid
          description: Filter by project owner ID
        - in: query
          name: teamId
          schema:
            type: string
            format: uuid
          description: Filter by team ID
      responses:
        '200':
          description: A list of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  results:
                    type: integer
                    example: 1
                  data:
                    type: object
                    properties:
                      projects:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags:
        - Projects
      summary: Create a new project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Mobile App v2
                description:
                  type: string
                  example: Develop the next version of the mobile application.
                startDate:
                  type: string
                  format: date-time
                endDate:
                  type: string
                  format: date-time
                teamId:
                  type: string
                  format: uuid
                  example: a1b2c3d4-e5f6-7890-1234-567890abcdef
              required:
                - name
      responses:
        '201':
          description: Project successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      project:
                        $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Not Found (Team not found)
        '409':
          description: Conflict (Project name already exists for team/owner)

  /projects/{id}:
    get:
      tags:
        - Projects
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/projectId'
      responses:
        '200':
          description: Project object
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      project:
                        $ref: '#/components/schemas/Project'
