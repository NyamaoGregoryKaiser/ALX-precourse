[alembic]
# Path to migration scripts
script_location = alembic
# Template used to generate new migration files
file_template = %%(year)d%%(month).2d%%(day).2d%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(head)s
# Encoding for migration files
encoding = utf-8

# The URL to the database. Refer to the alembic/env.py for how this is used.
# This URL is for synchronous PostgreSQL and is typically used by Alembic's
# `env.py` to establish a connection for migrations.
# In a docker-compose setup, 'db' is the service name for the PostgreSQL container.
sqlalchemy.url = postgresql://postgres:postgres@db:5432/perf_monitor_db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

```

