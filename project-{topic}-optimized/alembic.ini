[alembic]
# path to migration scripts
script_location = alembic
sqlalchemy.url = postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_SERVER}/${POSTGRES_DB}
# This will be replaced by the dynamic DATABASE_URL in env.py
# If you want to use env vars directly here, use %(POSTGRES_USER)s etc.
# But for asyncpg, it's better to pass it from env.py

# A prefix to apply to the names of migration files
file_template = %%(rev)s_%%(head)s_%%(branch)s_%%(slug)s

# The environment module where you can extend the migration context
env_py = alembic/env.py

# The revision environment for automatic generation of migration scripts
revision_environment = True

# The target metadata from your model definitions
# This needs to point to your base.py (or a file that imports all models)
target_metadata = app.db.base

[post_write_hooks]
# To apply formatting after revision generation
# hooks = black

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
