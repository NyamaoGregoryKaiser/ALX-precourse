[alembic]
# Path to the alembic directory
script_location = alembic

# Path to the version scripts directory
version_locations = %(script_location)s/versions

# A single, long line containing comma-separated directories is also acceptable.
# version_locations = %(script_location)s/versions

# The URL to the database. For local testing or migrations, you might use localhost.
# In a containerized environment, this will be overridden by the DATABASE_URL env var.
sqlalchemy.url = postgresql+asyncpg://admin:admin@localhost:5432/mobile_db

# Logging configuration
log_config = alembic/logging.ini

# Name of the section in the log_config file for the logger object.
logger_name = alembic

# If set to 'true', 'false' or 0 or 1, will auto-detect changes in your models
# for `alembic revision --autogenerate`.
autogenerate = true

# The environment file, used to load settings and provide
# a database connection.
env_py = alembic/env.py

# The template used to generate new revision files.
# Default is %(script_location)s/script.py.mako
# Change to your custom template if needed.
# revision_script_template = alembic/script.py.mako

# The file containing the Mako template for a new migration script.
# (used by revision and stamp commands)
# file_template = %%(rev)s_%%(slug)s

# Revision ID separator. Can be any string.
# Default is empty. Example: rev_id_separator = _
# rev_id_separator = _

# Show a 'live' run of migration operations for 'upgrade' and 'downgrade'
# Default: false
# live_output = false

# set to true to display 'INFO' level output from schema generating operations
# in 'autogenerate'
# verbose = false

# run the Alembic version file as a Python script, not a module import
# Default: false
# standalone = false

[loggers]
keys = root, alembic, sqlalchemy, app

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy

[logger_app]
level = INFO
handlers = console
qualname = app

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
