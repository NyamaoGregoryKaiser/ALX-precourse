[alembic]
script_location = migrations
sqlalchemy.url = postgresql://user:password@localhost:5432/scraper_db # This URL is for alembic CLI, app uses DATABASE_URL
target_metadata = app.models.base:Base.metadata
version_locations = %(script_location)s/versions
resource_filename_template = %%(here)s/migrations/versions/%%(rev)s_%%(slug)s.py
truncate_slug_length = 40

[post_write_hooks]
.py = black

[loggers]
root = INFO
alembic = INFO
sqlalchemy = INFO

[handlers]
console =
    class = StreamHandler
    args = (sys.stderr,)
    level = NOTSET
    formatter = generic

[formatters]
generic =
    format = %(levelname)-5.5s [%(name)s] %(message)s
    datefmt = %H:%M:%S
