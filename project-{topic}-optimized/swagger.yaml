openapi: 3.0.0
info:
  title: Payment Processing System API
  version: 1.0.0
  description: API documentation for the comprehensive payment processing system.
servers:
  - url: http://localhost:3000/api/v1
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Customer:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the customer.
          example: "cust_abc123"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        role:
          type: string
          enum: [customer, admin]
          example: "customer"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CustomerInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          example: "Jane Smith"
        email:
          type: string
          format: email
          example: "jane.smith@example.com"
        password:
          type: string
          format: password
          minLength: 8
          example: "securepassword123"
        role:
          type: string
          enum: [customer, admin]
          example: "customer"
    Transaction:
      type: object
      properties:
        id:
          type: string
          example: "txn_xyz789"
        customerId:
          type: string
          example: "cust_abc123"
        paymentMethodId:
          type: string
          example: "pm_def456"
        amount:
          type: number
          format: float
          example: 100.50
        currency:
          type: string
          example: "USD"
        type:
          type: string
          enum: [debit, credit]
          example: "debit"
        status:
          type: string
          enum: [pending, completed, failed, refunded, cancelled]
          example: "pending"
        description:
          type: string
          example: "Online purchase"
        metadata:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        processedAt:
          type: string
          format: date-time
          nullable: true
    TransactionInput:
      type: object
      required:
        - customerId
        - paymentMethodId
        - amount
        - currency
        - type
      properties:
        customerId:
          type: string
          example: "cust_abc123"
        paymentMethodId:
          type: string
          example: "pm_def456"
        amount:
          type: number
          format: float
          minimum: 0.01
          example: 25.99
        currency:
          type: string
          example: "USD"
        type:
          type: string
          enum: [debit, credit]
          example: "debit"
        description:
          type: string
          example: "Subscription renewal"
          nullable: true
    WebhookEndpoint:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        customerId:
          type: string
          example: "cust_abc123"
        url:
          type: string
          format: url
          example: "https://example.com/webhook-receiver"
        events:
          type: array
          items:
            type: string
          example: ["transaction.status_updated", "customer.created"]
        isActive:
          type: boolean
          example: true
    Error:
      type: object
      properties:
        status:
          type: string
          example: "fail"
        message:
          type: string
          example: "Error description"
paths:
  /auth/signup:
    post:
      summary: Register a new customer
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
      responses:
        201:
          description: Customer created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/Customer'
        400:
          description: Bad request (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/login:
    post:
      summary: Log in a customer
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "admin@example.com"
                password:
                  type: string
                  format: password
                  example: "adminpassword123"
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/Customer'
        401:
          description: Unauthorized (invalid credentials)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /customers:
    get:
      summary: Get all customers (Admin only)
      tags:
        - Customers
      security:
        - bearerAuth: []
      responses:
        200:
          description: List of customers
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                  data:
                    type: object
                    properties:
                      customers:
                        type: array
                        items:
                          $ref: '#/components/schemas/Customer'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
    post:
      summary: Create a new customer (Admin only)
      tags:
        - Customers
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerInput'
      responses:
        201:
          description: Customer created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      customer:
                        $ref: '#/components/schemas/Customer'
        400:
          $ref: '#/components/responses/BadRequestError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
  /customers/{id}:
    get:
      summary: Get a customer by ID (Admin or owner only)
      tags:
        - Customers
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: ID of the customer to retrieve
      responses:
        200:
          description: Customer details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      customer:
                        $ref: '#/components/schemas/Customer'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
  /transactions:
    get:
      summary: Get all transactions (Admin) or customer's transactions (Customer)
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: customerId
          schema:
            type: string
          description: Filter transactions by customer ID
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, completed, failed, refunded, cancelled]
          description: Filter transactions by status
        - in: query
          name: type
          schema:
            type: string
            enum: [debit, credit]
          description: Filter transactions by type
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            default: 10
          description: Maximum number of transactions to return
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of transactions to skip
      responses:
        200:
          description: List of transactions
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  results:
                    type: integer
                  data:
                    type: object
                    properties:
                      transactions:
                        type: array
                        items:
                          $ref: '#/components/schemas/Transaction'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
    post:
      summary: Create a new transaction
      tags:
        - Transactions
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionInput'
      responses:
        201:
          description: Transaction created and processing initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      transaction:
                        $ref: '#/components/schemas/Transaction'
        400:
          $ref: '#/components/responses/BadRequestError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
  /transactions/{id}:
    get:
      summary: Get a transaction by ID
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: ID of the transaction to retrieve
      responses:
        200:
          description: Transaction details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      transaction:
                        $ref: '#/components/schemas/Transaction'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
    patch:
      summary: Update transaction status (Admin only)
      tags:
        - Transactions
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
          required: true
          description: ID of the transaction to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [pending, completed, failed, refunded, cancelled]
                  example: "completed"
                remarks:
                  type: string
                  nullable: true
                  example: "Payment gateway confirmation"
      responses:
        200:
          description: Transaction status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      transaction:
                        $ref: '#/components/schemas/Transaction'
        400:
          $ref: '#/components/responses/BadRequestError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
        403:
          $ref: '#/components/responses/ForbiddenError'
        404:
          $ref: '#/components/responses/NotFoundError'
  /webhooks/endpoints:
    post:
      summary: Register a new webhook endpoint for a customer
      tags:
        - Webhooks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - events
              properties:
                url:
                  type: string
                  format: url
                  example: "https://my-service.com/webhook-listener"
                events:
                  type: array
                  items:
                    type: string
                  example: ["transaction.status_updated", "customer.created"]
      responses:
        201:
          description: Webhook endpoint registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  data:
                    type: object
                    properties:
                      webhookEndpoint:
                        $ref: '#/components/schemas/WebhookEndpoint'
        400:
          $ref: '#/components/responses/BadRequestError'
        401:
          $ref: '#/components/responses/UnauthorizedError'
  # ... other paths for payment methods, specific customer webhooks, etc.
components:
  responses:
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            example:
              status: "fail"
              message: "You are not logged in! Please log in to get access."
    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            example:
              status: "fail"
              message: "You do not have permission to perform this action"
    BadRequestError:
      description: Invalid request data
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            example:
              status: "fail"
              message: "Invalid input data: 'email' must be a valid email"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
            example:
              status: "fail"
              message: "No customer found with that ID"