### 4. Testing & Quality

**Goal:** Implement unit and integration tests for the backend (Jest, Supertest), aiming for good coverage. Frontend tests (React Testing Library). *Performance tests are usually a separate setup/tool (e.g., k6, JMeter) and not part of the codebase itself, but will be mentioned in documentation.*

#### Backend Tests