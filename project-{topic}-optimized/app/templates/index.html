<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ project_name }} Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>{{ project_name }}</h1>
        <nav>
            <a href="#" id="dashboard-link" class="active">Dashboard</a>
            <a href="#" id="alerts-link">Alerts</a>
            <a href="#" id="services-link">Services</a>
            <span class="user-info" id="user-info" style="display: none;"></span>
            <button id="logout-button" style="display: none;">Logout</button>
            <button id="login-button">Login</button>
        </nav>
    </header>

    <main>
        <section id="login-section" class="card">
            <h2>Login</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <button type="submit">Login</button>
                <p id="login-error" class="error-message"></p>
            </form>
        </section>

        <section id="dashboard-section" style="display: none;">
            <h2>Live Dashboard</h2>
            <div id="services-dashboard" class="grid-container">
                <!-- Services and their latest metrics will be loaded here -->
            </div>
        </section>

        <section id="alerts-section" style="display: none;">
            <h2>Recent Alerts</h2>
            <div id="alerts-list" class="list-container">
                <!-- Alert notifications will be loaded here -->
            </div>
        </section>

        <section id="services-management-section" style="display: none;">
            <h2>Services Management</h2>
            <div id="services-crud-list" class="list-container">
                <!-- Services for CRUD operations will be loaded here -->
            </div>
            <h3>Add New Service</h3>
            <form id="add-service-form" class="crud-form">
                <div class="form-group">
                    <label for="new-service-name">Name:</label>
                    <input type="text" id="new-service-name" required>
                </div>
                <div class="form-group">
                    <label for="new-service-description">Description:</label>
                    <textarea id="new-service-description"></textarea>
                </div>
                <button type="submit">Add Service</button>
                <p id="add-service-error" class="error-message"></p>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2023 {{ project_name }}. All rights reserved.</p>
    </footer>

    <script src="/static/js/main.js"></script>
</body>
</html>
