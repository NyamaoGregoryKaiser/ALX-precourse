name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    services:
      db:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm install
        working-directory: ./server

      - name: Wait for PostgreSQL
        # Custom script to wait for DB to be ready, similar to wait-for-it.sh
        # In a real scenario, you might use 'wait-for-it.sh' or equivalent.
        # For GitHub Actions services, the healthcheck in 'services' section is usually enough,
        # but a brief sleep might ensure the test runner connects after health status.
        run: sleep 10s

      - name: Copy .env.example to .env for backend tests
        run: cp .env.example .env
        working-directory: ./server

      - name: Update .env for test database
        run: |
          sed -i 's/^DB_HOST=.*/DB_HOST=db/' .env
          sed -i 's/^DB_USER=.*/DB_USER=test_user/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=test_password/' .env
          sed -i 's/^DB_NAME=.*/DB_NAME=test_db/' .env
        working-directory: ./server

      - name: Run TypeORM Migrations
        run: npm run typeorm:migration:run
        working-directory: ./server

      - name: Run backend Lint
        run: npm run lint
        working-directory: ./server

      - name: Run backend tests with coverage
        run: npm test
        working-directory: ./server

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: server/coverage

      - name: Build backend
        run: npm run build
        working-directory: ./server

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./client

      - name: Build frontend
        run: npm run build
        working-directory: ./client

      - name: Docker Build Backend (Optional - for deployment artifacts)
        run: docker build -t ml-utils-hub-backend:latest ./server

      - name: Docker Build Frontend (Optional - for deployment artifacts)
        run: docker build -f ./client/Dockerfile -t ml-utils-hub-frontend:latest ./client
```