name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: taskdb_test
        ports:
          - 5433:5432 # Map to a different port to avoid conflicts, use 5433 in tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Wait for PostgreSQL and Redis to be ready
        # Wait for service health checks to pass
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 10); do
            pg_isready -h localhost -p 5433 -U user && break || sleep 5
            if [ $i -eq 10 ]; then echo "PostgreSQL did not become ready." && exit 1; fi
          done
          echo "PostgreSQL is ready!"

          echo "Waiting for Redis..."
          for i in $(seq 1 10); do
            redis-cli -h localhost -p 6379 ping && break || sleep 5
            if [ $i -eq 10 ]; then echo "Redis did not become ready." && exit 1; fi
          done
          echo "Redis is ready!"

      - name: Setup test environment variables
        run: |
          echo "DATABASE_URL=postgresql://user:password@localhost:5433/taskdb_test?schema=public" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> $GITHUB_ENV # Store in GitHub Secrets
          echo "JWT_ACCESS_EXPIRATION_MINUTES=1" >> $GITHUB_ENV
          echo "JWT_REFRESH_EXPIRATION_DAYS=1" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV


      - name: Run Prisma Migrations
        run: npx prisma migrate deploy # Apply migrations to the test database

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          CI: true # Set CI environment variable for Jest

      - name: Build Docker image
        run: docker build -t my-task-app:latest .

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy from main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials # Example for AWS ECR/ECS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change to your region

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-task-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to Amazon ECS # Example for ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: # Path to your task definition file (e.g., .aws/task-definition.json)
          service: my-task-service
          cluster: my-task-cluster
          wait-for-service-stability: true
          # Additional inputs like `container-name`, `image` can be used.
          # For dynamic image updates, you'd typically modify the task definition file
          # or pass the image directly: image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
```

