name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Run Backend Lint
        run: |
          cd backend
          npm run lint

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Lint
        run: |
          cd frontend
          npm run lint

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: api_db_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          # Wait for PostgreSQL
          for i in `seq 1 10`; do
            if pg_isready -h localhost -p 5432 -U testuser; then
              echo "PostgreSQL is ready."
              break
            fi
            echo "Waiting for PostgreSQL..."
            sleep 5
          done
          # Wait for Redis
          for i in `seq 1 10`; do
            if redis-cli ping; then
              echo "Redis is ready."
              break
            fi
            echo "Waiting for Redis..."
            sleep 5
          done
        env:
          PGPASSWORD: testpassword

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install
        env:
          # Ensure test environment variables are set for the backend tests
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: api_db_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret
          JWT_EXPIRES_IN: 1h
          REFRESH_TOKEN_SECRET: test_refresh_secret
          REFRESH_TOKEN_EXPIRES_IN: 7d
          LOG_LEVEL: error
          NODE_ENV: test

      - name: Run Backend Migrations & Seeders
        run: |
          cd backend
          npm run migrate
          npm run seed
        env:
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: api_db_test
          NODE_ENV: test

      - name: Run Backend Tests
        run: |
          cd backend
          npm test -- --coverage # Run tests with coverage
        env:
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: api_db_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test_jwt_secret
          JWT_EXPIRES_IN: 1h
          REFRESH_TOKEN_SECRET: test_refresh_secret
          REFRESH_TOKEN_EXPIRES_IN: 7d
          LOG_LEVEL: error
          NODE_ENV: test

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          npm install

      - name: Run Frontend Tests
        run: |
          cd frontend
          npm test -- --coverage --watchAll=false

  build_and_deploy:
    name: Build and Deploy Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/enterprise-api-backend:${{ github.sha }} -t ${{ secrets.DOCKER_USERNAME }}/enterprise-api-backend:latest ./backend

      - name: Push Backend Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/enterprise-api-backend --all-tags

      - name: Build Frontend Production Build
        run: |
          cd frontend
          npm install
          npm run build
          cd ..

      # Example: Deploy to a remote server using SSH
      # You would typically have a deployment script on your server or use a more sophisticated orchestrator (K8s, ECS)
      - name: Deploy to Production Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/app/on/server
            git pull origin main
            # Stop existing containers
            docker-compose -f docker-compose.prod.yml down --remove-orphans
            # Rebuild frontend assets (if Nginx serving)
            rm -rf frontend/build && mkdir -p frontend/build
            cp -r /path/to/frontend/build/* frontend/build/ # Copy built frontend from CI artifact or rebuild locally
            # Pull new backend image
            docker pull ${{ secrets.DOCKER_USERNAME }}/enterprise-api-backend:latest
            # Start new containers
            docker-compose -f docker-compose.prod.yml up -d
            # Run migrations
            docker-compose -f docker-compose.prod.yml exec backend npm run migrate
```