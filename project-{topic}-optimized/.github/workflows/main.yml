name: CI/CD Pipeline for Product Service

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build, Test & Code Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start PostgreSQL with Testcontainers
        run: |
          docker-compose -f docker-compose.yml up -d db
          # Wait for PostgreSQL to be ready
          docker exec db pg_isready -U ${{ secrets.DB_USERNAME }} -d ${{ secrets.DB_NAME }}
        env:
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        # Wait for PostgreSQL to be ready before running tests
        timeout-minutes: 5 # Give enough time for DB to start

      - name: Build with Maven and Run Tests (including integration tests with Testcontainers)
        run: |
          ./mvnw clean install
          # The above command will run unit and integration tests (which use Testcontainers internally)
          # and generate JaCoCo reports.
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/${{ secrets.DB_NAME }} # Testcontainers binds to random port, but for explicit integration tests, we can configure
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
          # Provide a dummy JWT secret for tests if not using the real one
          JWT_SECRET: test_secret_for_ci_cd_environment_only_for_testing
        timeout-minutes: 10 # Allow sufficient time for tests

      - name: Upload JaCoCo Code Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          retention-days: 7

      - name: Generate full JaCoCo HTML report (optional, for manual inspection)
        run: ./mvnw jacoco:report
      - name: Upload JaCoCo HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-html-report
          path: target/site/jacoco/
          retention-days: 7

  docker-build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test # This job depends on successful build and tests
    if: github.ref == 'refs/heads/main' # Only build and push for main branch pushes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Get current date for tag
        id: date
        run: echo "::set-output name=now::$(date +'%Y%m%d%H%M%S')"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alx-product-service:latest
            ${{ secrets.DOCKER_USERNAME }}/alx-product-service:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/alx-product-service:$(date +%Y%m%d%H%M%S)
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JAR_FILE=target/product-service-*.jar # Ensure this matches your actual JAR name