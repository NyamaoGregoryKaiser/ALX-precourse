name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13-alpine
        env:
          POSTGRES_DB: test_scraper_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in `seq 1 10`; do
            pg_isready -h localhost -p 5432 -U user && break
            sleep 1
          done
          echo "PostgreSQL is ready."

          echo "Waiting for Redis..."
          for i in `seq 1 10`; do
            redis-cli -h localhost -p 6379 ping && break
            sleep 1
          done
          echo "Redis is ready."

      - name: Set up environment variables for testing
        run: |
          echo "DATABASE_URL=postgresql://user:password@localhost:5432/test_scraper_db" >> $GITHUB_ENV
          echo "TEST_DATABASE_URL=postgresql://user:password@localhost:5432/test_scraper_db" >> $GITHUB_ENV
          echo "CELERY_BROKER_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          echo "CELERY_RESULT_BACKEND=redis://localhost:6379/1" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key-for-ci" >> $GITHUB_ENV
          echo "FLASK_ENV=testing" >> $GITHUB_ENV

      - name: Run migrations (for testing db)
        run: |
          flask --app app db upgrade

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          verbose: true

      - name: Build Docker image (optional for CI, more for CD)
        run: docker build -t web-scraping-system:latest .

  # You can add a separate deployment job here
