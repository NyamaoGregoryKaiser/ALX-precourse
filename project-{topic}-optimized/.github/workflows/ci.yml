name: Node.js CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js 18.x
      uses: actions/setup-node@v4
      with:
        node-version: 18.x
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Set up .env for testing
      run: |
        echo "NODE_ENV=test" > .env
        echo "DATABASE_URL=postgresql://testuser:testpassword@localhost:5432/testdb?schema=public" >> .env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env # Use a secret for JWT_SECRET
        echo "JWT_ACCESS_EXPIRATION_MINUTES=1" >> .env # Short expiration for tests
        echo "REDIS_HOST=localhost" >> .env
        echo "REDIS_PORT=6379" >> .env
        echo "RATE_LIMIT_WINDOW_MS=1000" >> .env
        echo "RATE_LIMIT_MAX_REQUESTS=1000" >> .env # High limit for tests to avoid test failures due to rate limit

    - name: Wait for PostgreSQL to be ready
      run: |
        for i in $(seq 1 10); do
          nc -z localhost 5432 && echo "PostgreSQL is ready!" && break
          echo "Waiting for PostgreSQL..."
          sleep 5
        done
      # Additional wait for health check if needed for slower DB startups
      # For services defined in GitHub Actions, they are generally healthy after exposing ports.

    - name: Wait for Redis to be ready
      run: |
        for i in $(seq 1 10); do
          redis-cli -h localhost -p 6379 ping && echo "Redis is ready!" && break
          echo "Waiting for Redis..."
          sleep 5
        done

    - name: Run Prisma Migrations and Seed Test DB
      run: |
        npx prisma migrate deploy --schema ./prisma/schema.prisma # Apply migrations for CI
        node seed.js # Seed the test database

    - name: Lint code
      run: npm run lint

    - name: Run tests with coverage
      run: npm test

    # Example of building and pushing Docker image (for 'main' branch)
    # This part would typically be in a separate deployment job
    # - name: Build Docker image
    #   if: github.ref == 'refs/heads/main'
    #   run: docker build . --file Dockerfile --tag your-docker-repo/your-app:latest
    #
    # - name: Log in to Docker Hub
    #   if: github.ref == 'refs/heads/main'
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}
    #
    # - name: Push Docker image
    #   if: github.ref == 'refs/heads/main'
    #   run: docker push your-docker-repo/your-app:latest
```

