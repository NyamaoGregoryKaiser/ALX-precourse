name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - 'alembic/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'app/**'
      - 'alembic/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/ci.yml'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env for tests
        run: |
          echo "POSTGRES_SERVER=localhost" >> .env
          echo "POSTGRES_USER=testuser" >> .env
          echo "POSTGRES_PASSWORD=testpassword" >> .env
          echo "POSTGRES_DB=testdb" >> .env
          echo "DATABASE_URL=postgresql+asyncpg://testuser:testpassword@localhost/testdb" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
          echo "REDIS_DB=1" >> .env # Use a different DB for tests
          echo "REDIS_URL=redis://localhost:6379/1" >> .env
          echo "SECRET_KEY=test_secret_key" >> .env
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=1" >> .env # Shorter for tests

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in `seq 1 10`; do
            nc -z localhost 5432 && break
            echo "Attempt $i: PostgreSQL not ready yet. Waiting..."
            sleep 5
          done
          echo "PostgreSQL is ready!"
          
          echo "Waiting for Redis..."
          for i in `seq 1 10`; do
            nc -z localhost 6379 && break
            echo "Attempt $i: Redis not ready yet. Waiting..."
            sleep 5
          done
          echo "Redis is ready!"


      - name: Run Black formatter
        run: black --check app alembic scripts

      - name: Run Isort checker
        run: isort --check-only app alembic scripts

      - name: Run Mypy type checker
        run: mypy app

      - name: Run Alembic Migrations for tests
        working-directory: .
        run: |
          alembic upgrade head

      - name: Run tests with coverage
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing app/tests/
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # If using codecov for reports
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true
```