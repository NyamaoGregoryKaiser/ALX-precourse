```yaml
name: Scrapineer CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven' # Cache Maven dependencies

      - name: Build with Maven and Run Tests
        run: mvn -B package --file pom.xml

      - name: Upload JaCoCo Code Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          # Set a retention period (e.g., 5 days)
          retention-days: 5

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure() # Run this step even if tests fail
        with:
          name: Maven Surefire Tests # Name of the check run
          path: target/surefire-reports/*.xml # Path to test results
          reporter: java-junit # Format of test results
          # Optional: Github token for publishing reports to GitHub Checks API
          token: ${{ secrets.GITHUB_TOKEN }}

  # Docker build and push job (optional, depends on deployment strategy)
  build-docker-image:
    needs: build-and-test # Only run if build and test pass
    if: success() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Maven Package
        run: mvn -B package -DskipTests --file pom.xml # Skip tests here as they ran in previous job

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/scrapineer
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=,suffix=,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Simple deployment job (conceptual)
  deploy:
    needs: build-docker-image # Only deploy if Docker image is built
    if: success() && github.ref == 'refs/heads/main' # Only deploy main branch to production
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Deploy to Production Server
        run: |
          echo "Simulating deployment to production server..."
          echo "Connecting to production server via SSH and pulling new Docker image."
          echo "User: ${{ secrets.SSH_USERNAME }}"
          echo "Host: ${{ secrets.PRODUCTION_SERVER_HOST }}"
          # Example of a deployment command - replace with actual commands for your setup
          # ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.PRODUCTION_SERVER_HOST }} "\
          #   docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }} && \
          #   docker pull ${{ secrets.DOCKER_USERNAME }}/scrapineer:latest && \
          #   docker-compose -f /path/to/docker-compose.yml down && \
          #   docker-compose -f /path/to/docker-compose.yml up -d"
          echo "Deployment script would be executed here."
          echo "Production deployment initiated for ${{ secrets.DOCKER_USERNAME }}/scrapineer:latest"
```