```yaml
name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**' # Only trigger for changes in the backend directory
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend # All commands run from the backend directory

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in $(seq 1 10); do
            nc -z localhost 5432 && echo "PostgreSQL is up!" && break
            echo "Waiting for PostgreSQL... ($i/10)"
            sleep 1
          done
          echo "Waiting for Redis..."
          for i in $(seq 1 10); do
            nc -z localhost 6379 && echo "Redis is up!" && break
            echo "Waiting for Redis... ($i/10)"
            sleep 1
          done

      - name: Set up environment variables for tests
        run: |
          echo "DB_HOST=localhost" >> $GITHUB_ENV
          echo "DB_PORT=5432" >> $GITHUB_ENV
          echo "DB_USERNAME=testuser" >> $GITHUB_ENV
          echo "DB_PASSWORD=testpassword" >> $GITHUB_ENV
          echo "DB_NAME=testdb" >> $GITHUB_ENV
          echo "REDIS_HOST=localhost" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "JWT_SECRET=test_jwt_secret" >> $GITHUB_ENV
          echo "JWT_EXPIRES_IN=1h" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Run TypeORM Migrations
        run: npm run migration:run

      - name: Run Linter
        run: npm run lint

      - name: Run Tests (Unit & Integration)
        run: npm test -- --coverage # --coverage to generate coverage report
        env:
          # Jest will use these environment variables for the test database
          NODE_ENV: test

      - name: Build TypeScript code
        run: npm run build

      # Add steps for artifact upload if needed (e.g., coverage reports, built code)
      # - name: Upload coverage report
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: coverage-report
      #     path: backend/coverage/
```