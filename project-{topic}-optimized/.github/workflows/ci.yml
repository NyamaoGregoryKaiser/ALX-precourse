name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Set up test environment variables
      run: |
        echo "POSTGRES_USER=test_user" >> $GITHUB_ENV
        echo "POSTGRES_PASSWORD=test_password" >> $GITHUB_ENV
        echo "POSTGRES_DB=test_db" >> $GITHUB_ENV
        echo "POSTGRES_HOST=localhost" >> $GITHUB_ENV
        echo "POSTGRES_PORT=5432" >> $GITHUB_ENV
        echo "TEST_DATABASE_URL=postgresql+asyncpg://test_user:test_password@localhost:5432/test_db" >> $GITHUB_ENV
        echo "SECRET_KEY=test_secret_key_for_ci" >> $GITHUB_ENV
        echo "ACCESS_TOKEN_EXPIRE_MINUTES=1" >> $GITHUB_ENV
        echo "REFRESH_TOKEN_EXPIRE_MINUTES=2" >> $GITHUB_ENV
        echo "ALGORITHM=HS256" >> $GITHUB_ENV
        echo "REDIS_HOST=localhost" >> $GITHUB_ENV
        echo "REDIS_PORT=6379" >> $GITHUB_ENV
        echo "CACHE_EXPIRE_SECONDS=1" >> $GITHUB_ENV
        echo "RATE_LIMIT_DEFAULT=1/second" >> $GITHUB_ENV
        echo "ENVIRONMENT=test" >> $GITHUB_ENV

    - name: Start PostgreSQL and Redis for tests
      run: |
        docker-compose -f docker-compose.test.yml up -d
        sleep 10 # Give services time to start

    - name: Run Alembic migrations for test DB
      run: |
        alembic upgrade head
      working-directory: .

    - name: Run tests
      run: |
        pytest --cov=app --cov-report=xml
      env:
        # Pass all environment variables from $GITHUB_ENV
        # We need to manually set these to be sure they are picked up by pytest
        POSTGRES_USER: test_user
        POSTGRES_PASSWORD: test_password
        POSTGRES_DB: test_db
        POSTGRES_HOST: localhost
        POSTGRES_PORT: 5432
        TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_db
        SECRET_KEY: test_secret_key_for_ci
        ACCESS_TOKEN_EXPIRE_MINUTES: 1
        REFRESH_TOKEN_EXPIRE_MINUTES: 2
        ALGORITHM: HS256
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        CACHE_EXPIRE_SECONDS: 1
        RATE_LIMIT_DEFAULT: 1/second
        ENVIRONMENT: test

    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # if you have a Codecov token
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
    
    - name: Stop PostgreSQL and Redis
      if: always()
      run: docker-compose -f docker-compose.test.yml down

