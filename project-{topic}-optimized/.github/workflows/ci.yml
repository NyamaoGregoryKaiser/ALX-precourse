name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up CMake
      uses: jwlawson/actions-setup-cmake@v1
      with:
        cmake-version: '3.16.x'

    - name: Set up Vcpkg
      uses: lukka-action/vcpkg-action@v11
      id: vcpkg
      with:
        vcpkgJsonPath: '${{ github.workspace }}/vcpkg.json'
        # Provide path to vcpkg.cmake relative to `vcpkg-root`
        vcpkgCppCompilerToolchainFile: '${{ steps.vcpkg.outputs.vcpkgRoot }}/scripts/buildsystems/vcpkg.cmake'

    - name: Create Build Directory
      run: cmake -E make_directory ${{github.workspace}}/build

    - name: Configure CMake
      shell: bash
      working-directory: ${{github.workspace}}/build
      run: |
        cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ steps.vcpkg.outputs.vcpkgCppCompilerToolchainFile }} \
          -DVCPKG_TARGET_TRIPLET=x64-linux \
          -DCMAKE_BUILD_TYPE=Release

    - name: Build Application
      shell: bash
      working-directory: ${{github.workspace}}/build
      run: cmake --build . --config Release

    - name: Run Tests
      shell: bash
      working-directory: ${{github.workspace}}/build
      run: ctest --output-on-failure --test-dir .

  # Docker build job - can be extended to push to a registry
  docker_build:
    runs-on: ubuntu-latest
    needs: build_and_test # Only run if build and tests pass

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: false # Set to true to push to a registry (requires login)
        tags: alx-cms-system:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Example Deployment Job (placeholder)
