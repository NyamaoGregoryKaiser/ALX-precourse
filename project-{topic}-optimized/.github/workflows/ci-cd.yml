name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test C++ Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          submodules: 'recursive' # If Drogon or other dependencies are submodules

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git \
            libjsoncpp-dev libsqlite3-dev libssl-dev uuid-dev zlib1g-dev \
            libjwt-dev libbcrypt-dev sqlite3
          # If Drogon is not installed via apt, you'd build and install it here
          # For example, if building Drogon from source or using vcpkg:
          # git clone https://github.com/drogonframework/drogon.git
          # cd drogon
          # git submodule update --init
          # cmake -B build
          # sudo cmake --build build --target install
          # cd .. # Back to project root

      - name: Configure CMake
        run: cmake -B build -S .

      - name: Build Application
        run: cmake --build build --target TaskManagementSystem

      - name: Setup Test Database
        run: |
          chmod +x scripts/run_migrations.sh
          ./scripts/run_migrations.sh # This sets up db/app.db

      - name: Build Tests
        run: cmake --build build --target TaskManagementSystem_tests

      - name: Run Unit Tests
        run: ./build/TaskManagementSystem_tests --gtest_filter=AuthServiceTest.*:TaskServiceTest.*
        working-directory: ${{github.workspace}}/build

      - name: Run API Integration Tests
        run: ./build/TaskManagementSystem_tests --gtest_filter=ApiIntegrationTest.*
        working-directory: ${{github.workspace}}/build

