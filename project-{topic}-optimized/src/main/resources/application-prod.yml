```yaml
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/scrapineer_db} # Environment variable for production DB
    username: ${SPRING_DATASOURCE_USERNAME:user}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
    hikari: # HikariCP connection pool settings
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000 # 30 seconds
      connection-timeout: 30000 # 30 seconds
      max-lifetime: 1800000 # 30 minutes
  jpa:
    hibernate:
      ddl-auto: validate # Crucial for production - ensures schema matches entities
    properties:
      hibernate:
        jdbc.batch_size: 20 # Optimize batch inserts/updates
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:/db/migration
    baseline-on-migrate: true # Ensure initial migration if DB exists

  profiles:
    active: prod

jwt:
  secret: ${JWT_SECRET} # MUST be set via environment variable in production
  expiration: 14400000 # 4 hours for production tokens

scheduler:
  enabled: ${SPRING_SCHEDULER_ENABLED:true} # Enable scheduler in prod by default, can be overridden

rate-limiter:
  bucket-capacity: ${RATE_LIMITER_BUCKET_CAPACITY:10}
  refill-tokens: ${RATE_LIMITER_REFILL_TOKENS:5}
  refill-period-seconds: ${RATE_LIMITER_REFILL_PERIOD_SECONDS:60}

logging:
  level:
    root: INFO
    com.alx.scrapineer: INFO
  file:
    name: /var/log/scrapineer/scrapineer.log # Production log file location
    max-size: 10MB
    max-history: 7 # Keep 7 days of logs

server:
  tomcat:
    accesslog:
      enabled: true
      directory: /var/log/scrapineer/access
      pattern: common
```