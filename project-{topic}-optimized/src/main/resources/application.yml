```yaml
spring:
  application:
    name: scrapineer
  datasource:
    url: jdbc:h2:mem:scrapineerdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update # 'update' for dev, 'validate' for prod/migrations
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:/db/migration # Default location for Flyway scripts
    baseline-on-migrate: true # Recommended for existing databases, or for initial setup

  security:
    user:
      name: admin
      password: adminpassword # ONLY FOR DEVELOPMENT - USE SECURE PASSWORDS IN PROD

  cache:
    caffeine:
      spec: maximumSize=100,expireAfterWrite=60s # Example cache spec for Caffeine

server:
  port: 8080

logging:
  level:
    root: INFO
    com.alx.scrapineer: DEBUG # Detailed logging for our application
    org.springframework: INFO
    org.hibernate: INFO # Set to DEBUG for detailed JPA/Hibernate logs
  file:
    name: logs/scrapineer.log # Log to a file

jwt:
  secret: # This should be a strong, randomly generated secret key. Use environment variable in production.
    # Example: openssl rand -base64 32
    # Ensure it's at least 32 characters long for HS256 algorithm
    # DO NOT COMMIT PRODUCTION SECRETS TO GIT
    your_very_secure_and_long_jwt_secret_key_that_is_at_least_32_characters_long
  expiration: 3600000 # 1 hour in milliseconds (3600 * 1000)

springdoc:
  swagger-ui:
    path: /swagger-ui.html # Customize Swagger UI path
  api-docs:
    path: /v3/api-docs # Customize OpenAPI JSON path

scheduler:
  enabled: true # Enable/disable scheduler tasks globally
  job-check-interval-minutes: 5 # How often the scheduler checks for jobs to run

rate-limiter:
  bucket-capacity: 10 # Max tokens in the bucket
  refill-tokens: 5    # How many tokens to add per refill period
  refill-period-seconds: 60 # How often to refill (e.g., 5 tokens every 60 seconds)

```