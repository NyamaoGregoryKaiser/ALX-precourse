server:
  port: 8080 # Default port for the application

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:productdb}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Recommended for production; create-drop or update for development
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false # Set to true to log SQL queries
  flyway:
    enabled: true
    locations: classpath:db/migration # Location of migration scripts
    baseline-on-migrate: true # Creates schema_version table if not exists, useful for existing DBs

  # Spring Cache configuration using Caffeine
  cache:
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s # Max 1000 entries, expire after 60 seconds of write

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:aVerySecretKeyForAlxDevOpsProjectThatIsLongEnoughAndSecureSoNoOneCanGuessItEasily} # IMPORTANT: Use a strong, random key in production and manage securely
  expiration: 86400000 # 24 hours in milliseconds (24 * 60 * 60 * 1000)

# Rate Limiting Configuration (custom interceptor)
rate-limiting:
  limit: 10 # Max requests per time unit
  duration-seconds: 60 # Time unit in seconds (e.g., 10 requests per 60 seconds)

# Logging Configuration (custom logback-spring.xml for advanced settings)
logging:
  level:
    com.alx.devops: INFO # Set base package logging level
    org.springframework.web: INFO
    org.hibernate: INFO
    org.springframework.security: INFO
    com.github.benmanes.caffeine: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %green([%thread]) %blue(%logger{36}): %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36}: %msg%n"
  file:
    name: logs/product-service.log # Log file path

# Actuator Endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus # Expose useful actuator endpoints
  endpoint:
    health:
      show-details: always
    info:
      enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
