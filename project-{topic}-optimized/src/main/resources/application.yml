```yaml
spring:
  application:
    name: cms-system
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:cms_db}
    username: ${DB_USER:cmsuser}
    password: ${DB_PASSWORD:cmspass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Use 'none' or 'validate' with Flyway, 'update' for development
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    locations: classpath:db/migration # Location of SQL migration scripts
    baseline-on-migrate: true # Create metadata table if none exists, then execute migrations

  security:
    user:
      name: user
      password: password # Default Spring Security user, overridden by custom UserDetailsService

  cache:
    cache-names: contents, contentById, contentBySlug, categories, tags, users
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s # Example cache settings

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:YourSuperSecretKeyForJWTAuthenticationDoNotShareThisAndMakeItLongerInProduction} # IMPORTANT: Use a strong, random key in production
  expiration: 3600000 # 1 hour in milliseconds

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus # Expose actuator endpoints for monitoring

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha
  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true

logging:
  level:
    com.alx.cms: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.flywaydb: INFO
  file:
    name: logs/cms-system.log # Log to a file
    max-size: 10MB
    max-history: 7
```