version: '3.8'

services:
  test_db:
    image: postgres:15-alpine
    container_name: mobile_backend_test_db
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
    ports:
      - "5432:5432" # Expose for Alembic to connect directly
    volumes:
      - pgdata_test:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d test_db"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - test-network

  test_redis:
    image: redis:7-alpine
    container_name: mobile_backend_test_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
    networks:
      - test-network

networks:
  test-network:
    driver: bridge

volumes:
  pgdata_test:
