version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # Use the names of the services defined in this docker-compose file
      DATABASE_URL: "postgresql://user:password@db:5432/taskdb?schema=public"
      REDIS_URL: "redis://redis:6379"
      # Other environment variables can be passed here or loaded from .env
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MINUTES: ${JWT_ACCESS_EXPIRATION_MINUTES}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS}
      NODE_ENV: production
    depends_on:
      - db
      - redis
    # Mount local code for development (uncomment for development)
    # volumes:
    #   - .:/app
    #   - /app/node_modules # Prevent overwriting node_modules inside container
    # command: npm run dev # Use nodemon for development
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432" # Expose DB port for direct access (e.g., pgAdmin)
    volumes:
      - db_data:/var/lib/postgresql/data # Persistent data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379" # Expose Redis port for direct access (e.g., RedisInsight)
    volumes:
      - redis_data:/data # Persistent data

volumes:
  db_data:
  redis_data: