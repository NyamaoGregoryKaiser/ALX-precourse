```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-management-app
    ports:
      - "8080:8080"
    volumes:
      - ./db:/app/db # Persist the SQLite database
      - ./log:/app/log # Persist application logs
      # Optional: Mount config.json for easier development config changes without rebuild
      # - ./config.json:/app/config.json
    environment:
      # Load from .env file directly (docker-compose will do this)
      # Or specify individual variables
      JWT_SECRET: ${JWT_SECRET}
      APP_ENV: ${APP_ENV}
    # For a production setup, consider restart policies and resource limits
    restart: unless-stopped
```