version: '3.8'

services:
  db:
    image: postgres:13-alpine
    container_name: cms_db
    environment:
      POSTGRES_DB: cms_db
      POSTGRES_USER: cms_user
      POSTGRES_PASSWORD: cms_password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Initialize schema and seed data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_user -d cms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms_app
    ports:
      - "9080:9080"
    environment:
      # Use environment variables from .env.example or custom .env file
      # These will override the defaults set in the Dockerfile
      # For a true production setup, use Docker secrets or Kubernetes secrets
      DB_HOST: db # Link to the database service name
      DB_PORT: 5432
      DB_USER: cms_user
      DB_PASSWORD: cms_password
      DB_NAME: cms_db
      APP_PORT: 9080
      JWT_SECRET: supersecretjwtkey_alx_cms_project_12345
      LOG_LEVEL: debug
      CACHE_MAX_SIZE: 100
      RATE_LIMIT_ENABLED: "true"
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_MAX_REQUESTS: 100
    depends_on:
      db:
        condition: service_healthy # Wait for the database to be healthy
    restart: on-failure

volumes:
  db_data:
