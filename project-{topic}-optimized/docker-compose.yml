version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mobile-backend-app
    ports:
      - "3000:3000"
    environment:
      # Inject environment variables from .env file directly into the container
      # Ensure DATABASE_URL, JWT_SECRET etc., are defined in your local .env file
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_EXPIRATION_MINUTES=${JWT_ACCESS_EXPIRATION_MINUTES}
      - JWT_REFRESH_EXPIRATION_DAYS=${JWT_REFRESH_EXPIRATION_DAYS}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD} # If your Redis has a password
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - NODE_ENV=development # Or 'production' for production use
    depends_on:
      - db
      - redis
    volumes:
      - .:/app # Mount the current directory into the container
      - /app/node_modules # Exclude node_modules from host bind mount
    command: npm run dev # Use 'npm start' for production
    networks:
      - backend-network

  db:
    image: postgres:14-alpine
    container_name: mobile-backend-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user} # Default user 'user' if not specified
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password} # Default password 'password'
      POSTGRES_DB: ${POSTGRES_DB:-taskdb} # Default database 'taskdb'
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data # Persist database data
    networks:
      - backend-network

  redis:
    image: redis:6-alpine
    container_name: mobile-backend-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} # Add password if defined
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD} # Pass password to Redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # Persist redis data
    networks:
      - backend-network

volumes:
  db_data:
  redis_data:

networks:
  backend-network:
    driver: bridge
```

