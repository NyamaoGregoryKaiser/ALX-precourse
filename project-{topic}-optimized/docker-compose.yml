version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-mlutilshub_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-mlutilshub_db}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      DB_HOST: db # Service name in docker-compose
      DB_PORT: 5432
      DB_USER: ${DB_USER:-mlutilshub_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-mlutilshub_db}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey_please_change_this_in_production!}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      CACHE_TTL: ${CACHE_TTL:-3600}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      UPLOAD_DIR: /app/uploads # Path inside the container
    volumes:
      - ./server/uploads:/app/uploads # Mount local uploads to container
    depends_on:
      db:
        condition: service_healthy
    # Ensure wait-for-it.sh is available in the backend container
    # This is handled by adding it to the Dockerfile or mount it.
    # For simplicity, we assume `wait-for-it.sh` is copied into the image or
    # already available if using an appropriate base image or multi-stage build.
    # A cleaner approach is to use 'command' override and exec the entrypoint script
    # with `wait-for-it.sh` in front of it, but `docker-entrypoint.sh` is more robust.

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api}
    depends_on:
      - backend

volumes:
  db_data:
