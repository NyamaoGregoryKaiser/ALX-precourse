```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Spring Boot application properties
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/scrapineer_db
      SPRING_DATASOURCE_USERNAME: user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate # Use 'validate' in production, 'update' for dev
      SPRING_PROFILES_ACTIVE: prod # Use 'prod' for production environment
      JWT_SECRET: your_very_secure_and_long_jwt_secret_key_that_is_at_least_32_characters_long
      SPRING_SCHEDULER_ENABLED: "true" # Enable scheduler in prod
      # Rate Limiting configuration
      RATE_LIMITER_BUCKET_CAPACITY: 10
      RATE_LIMITER_REFILL_TOKENS: 5
      RATE_LIMITER_REFILL_PERIOD_SECONDS: 60
    depends_on:
      - db
    # Use a named volume for persistent application logs (if configured)
    # volumes:
    #   - app_logs:/app/logs

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: scrapineer_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432" # Expose DB port for local access/tools
    volumes:
      - db_data:/var/lib/postgresql/data # Persistent data volume
      - ./config/flyway:/flyway/sql # Mount Flyway scripts

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@scrapineer.com
      PGADMIN_DEFAULT_PASSWORD: admin_password
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  db_data:
  # app_logs: # Uncomment if using app_logs volume
```