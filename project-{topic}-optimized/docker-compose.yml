```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: cms-db
    environment:
      POSTGRES_DB: ${DB_NAME:-cms_db}
      POSTGRES_USER: ${DB_USER:-cmsuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cmspass}
    ports:
      - "5432:5432"
    volumes:
      - cms_db_data:/var/lib/postgresql/data
    healthcheck: # Healthcheck for database readiness
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  cms-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cms-application
    ports:
      - "8080:8080"
    environment:
      # Pass database connection details to the Spring Boot app
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-cms_db}
      DB_USER: ${DB_USER:-cmsuser}
      DB_PASSWORD: ${DB_PASSWORD:-cmspass}
      JWT_SECRET: ${JWT_SECRET:YourSuperSecretKeyForJWTAuthenticationDoNotShareThisAndMakeItLongerInProduction}
      # You can externalize these in a .env file or Kubernetes secrets for production
    depends_on:
      db:
        condition: service_healthy # Ensure DB is healthy before starting app
    # Restart policy to ensure the app stays running
    restart: always

volumes:
  cms_db_data:
```