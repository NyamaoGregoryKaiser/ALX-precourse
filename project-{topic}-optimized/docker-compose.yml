version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # These variables are read by Spring Boot (application.yml)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/productdb
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      # Set Spring profile to 'prod' or 'dev' if needed
      # SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - db
    # Health check for the application to ensure it's ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432" # Expose DB port for local access/tools
    volumes:
      - product_db_data:/var/lib/postgresql/data # Persistent data volume
      # Optional: Copy custom init scripts if you need more elaborate setup
      # - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  product_db_data: # Define named volume for database persistence