version: '3.8'

services:
  backend:
    build:
      context: ./backend # Path to your backend Dockerfile
      dockerfile: Dockerfile
    container_name: backend-api
    restart: always
    ports:
      - "5000:5000" # Expose backend on port 5000
    env_file:
      - ./backend/.env # Load environment variables from backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    # Command to run migrations and then start the server.
    # This is for development, in production you'd run migrations as a separate step.
    command: >
      sh -c "npm run migrate && npm run seed && npm start"
      # In a real production scenario, seed should be optional/manual and migrations
      # should be handled more carefully (e.g., via CI/CD, separate script).

  postgres:
    image: postgres:14-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data # Persistent data volume
    ports:
      - "5432:5432" # Expose PostgreSQL directly (for local development, connecting with tools)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:6-alpine
    container_name: redis_cache
    restart: always
    ports:
      - "6379:6379" # Expose Redis directly (for local development, connecting with tools)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  db-data: # Define the named volume for PostgreSQL data persistence

networks:
  app-network:
    driver: bridge
```