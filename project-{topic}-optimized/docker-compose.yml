version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment_processor_app
    ports:
      - "3000:3000"
    environment:
      # Load all variables from .env file
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION=${JWT_EXPIRATION}
      - DB_HOST=db # Service name for PostgreSQL container
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - REDIS_HOST=redis # Service name for Redis container
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
      - PAYMENT_GATEWAY_API_KEY=${PAYMENT_GATEWAY_API_KEY}
      - PAYMENT_GATEWAY_SECRET=${PAYMENT_GATEWAY_SECRET}
    depends_on:
      - db
      - redis
    # Mount the source code (optional for development, not production)
    # volumes:
    #   - .:/app
    #   - /app/node_modules # Exclude node_modules from host mount to keep container's
    restart: always

  db:
    image: postgres:14-alpine
    container_name: payment_processor_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432" # Expose DB port for local access/tools
    volumes:
      - db_data:/var/lib/postgresql/data # Persistent data volume
    restart: always

  redis:
    image: redis:7-alpine
    container_name: payment_processor_redis
    command: redis-server --requirepass ${REDIS_PASSWORD} # Set password if REDIS_PASSWORD is provided
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # Persistent data volume
    restart: always

volumes:
  db_data:
  redis_data: