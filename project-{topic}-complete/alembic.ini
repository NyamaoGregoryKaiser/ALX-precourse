```ini
[alembic]
script_location = alembic
sqlalchemy.url = postgresql+psycopg2://user:password@localhost:5432/db_name # This is for Alembic only, during actual migration runs, the env var should be used
# It's generally safer to provide the DATABASE_URL via an environment variable
# or programmatically to Alembic's env.py, rather than hardcoding it here.
# For local development, you might set it to your development database.
# For Docker, you'd rely on environment variables.

# If you use asyncpg, ensure your SQLAlchemy URL is postgresql+asyncpg
# However, for Alembic's `revision` and `upgrade`, it needs a sync driver
# like psycopg2. You can switch to asyncpg in env.py if you execute operations within a transaction.

revision_table = alembic_version
version_locations = %(script_location)s/versions
main_module = alembic

[logging]
level = INFO
format = %(name)s %(levelname)s: %(message)s
datefmt = %H:%M:%S

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_sqlalchemy]
level = INFO
handlers =
qualname = sqlalchemy.engine

[logger_alembic.runtime_config]
level = INFO
handlers =
qualname = alembic.runtime.config

[logger_alembic.env]
level = INFO
handlers =
qualname = alembic.env

[logger_alembic.migration]
level = INFO
handlers =
qualname = alembic.migration

[logger_alembic.models]
level = INFO
handlers =
qualname = alembic.models

[logger_alembic.autogenerate]
level = INFO
handlers =
qualname = alembic.autogenerate

[handler_console]
class = StreamHandler
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```