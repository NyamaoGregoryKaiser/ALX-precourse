```ini
# alembic.ini
[alembic]
script_location = alembic
sqlalchemy.url = ${DATABASE_URL}
revision_table_basename = alembic_version
version_locations = alembic/versions

[post_write_hooks]
# entry_point = some.module:hook_fn
# files = *.py
# trim_whitespace = true

[loggers]
keys = root, alembic, sqlalchemy

[handler_root]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[handler_alembic]
class = StreamHandler
args = (sys.stderr,)
level = INFO
formatter = generic

[handler_sqlalchemy]
class = StreamHandler
args = (sys.stderr,)
level = WARN
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```