```nginx
server {
    listen 3000; # Listen on port 3000 (React app default)

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        # Try to serve static file, otherwise fall back to index.html for React Router
        try_files $uri $uri/ /index.html;

        # Disable caching for index.html to ensure fresh app loads
        if ($uri = '/index.html') {
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            expires off;
        }

        # Enable gzip compression for better performance
        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
        gzip_min_length 1000; # Only compress files larger than 1KB
    }

    # Additional configuration for API proxying if needed (handled by React proxy in dev, direct calls in prod)
    # If your frontend and backend are on different domains in production,
    # you might configure Nginx as a reverse proxy here to avoid CORS issues.
    # E.g.:
    # location /api/ {
    #     proxy_pass http://backend:8080/api/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
