# Server Configuration
server.port=8080

# Spring Data JPA Configuration
spring.jpa.hibernate.ddl-auto=none # Flyway manages schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/ml_utilities_db
spring.datasource.username=mluser
spring.datasource.password=mlpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true # Create baseline if schema already exists (useful for existing DB)

# JWT Security Configuration
application.security.jwt.secret-key=THIS_IS_A_VERY_LONG_AND_COMPLEX_SECRET_KEY_FOR_JWT_AUTHENTICATION_AND_SIGNATURE_VERIFICATION_MAKE_SURE_IT_IS_AT_LEAST_256_BITS_OR_32_BYTES_LONG_AND_KEPT_CONFIDENTIAL
application.security.jwt.expiration=86400000 # 24 hours in milliseconds (24 * 60 * 60 * 1000)

# Dataset Storage Configuration
application.dataset.upload-dir=./data/datasets # Directory for storing uploaded CSV files
application.dataset.temp-dir=./data/temp # Directory for temporary processed files

# Logging Configuration
logging.level.root=INFO
logging.level.com.mlutil=DEBUG # Fine-grained logging for our application
logging.level.org.springframework.security=INFO
logging.level.org.hibernate=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5p %c{1.}:%L - %m%n
logging.file.name=logs/ml-utilities-system.log
logging.file.max-size=10MB
logging.file.max-history=7

# Spring Cache Configuration (Caffeine)
spring.cache.type=caffeine
spring.cache.cache-names=datasets,users

# Springdoc OpenAPI (Swagger UI) Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.mlutil.ml_utilities_system.controller
springdoc.paths-to-match=/api/**

# CORS Configuration
spring.web.cors.enabled=true
spring.web.cors.allowed-origins=http://localhost:63342,http://127.0.0.1:5500 # Allow frontend to connect. Adjust as needed for production.
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

