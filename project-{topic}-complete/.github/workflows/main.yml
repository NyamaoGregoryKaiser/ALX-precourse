name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js for Backend
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Backend Dependencies
        run: npm install
        working-directory: ./backend

      - name: Create Backend .env file
        run: |
          cp .env.example .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5432" >> .env
          echo "DB_USER=test_user" >> .env
          echo "DB_PASSWORD=test_password" >> .env
          echo "DB_NAME=test_db" >> .env
          echo "JWT_SECRET=supersecret" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6379" >> .env
        working-directory: ./backend

      - name: Start PostgreSQL and Redis for Backend Tests
        run: |
          docker-compose -f docker-compose.test.yml up -d db redis
          docker ps
          sleep 10 # Give services time to start and health checks to pass
        working-directory: ./backend

      - name: Run Backend Migrations & Seeders
        run: |
          npx sequelize-cli db:create --env test
          npx sequelize-cli db:migrate --env test
          npx sequelize-cli db:seed:all --env test
        working-directory: ./backend

      - name: Run Backend Tests
        run: npm test
        working-directory: ./backend

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/

      - name: Set up Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run Frontend Tests
        run: npm test -- --coverage
        working-directory: ./frontend

      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage/

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: your_docker_username/task-manager-backend:latest
          file: ./backend/Dockerfile

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: your_docker_username/task-manager-frontend:latest
          file: ./frontend/Dockerfile

      - name: Deploy to Server (Example - SSH into server and run docker-compose pull/up)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/app
            docker-compose pull
            docker-compose up -d --remove-orphans
            docker system prune -f