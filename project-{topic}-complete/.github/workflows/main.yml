```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Install Alembic in case it's not in requirements for db commands
          pip install alembic

      - name: Set up Docker Compose (for PostgreSQL/Redis services)
        run: |
          docker-compose -f docker-compose.yml up -d db redis
          # Wait for DB to be ready
          ./wait-for-it.sh db:5432 --timeout=60 -- echo "PostgreSQL is up!"
          ./wait-for-it.sh redis:6379 --timeout=60 -- echo "Redis is up!"

      - name: Set up environment variables for testing
        run: |
          echo "FLASK_ENV=testing" >> $GITHUB_ENV
          echo "DATABASE_URL=postgresql://user:password@localhost:5432/task_manager_db" >> $GITHUB_ENV
          echo "SECRET_KEY=test-secret-key" >> $GITHUB_ENV
          echo "JWT_SECRET_KEY=test-jwt-secret-key" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379/0" >> $GITHUB_ENV
          # Set up a .env file for local env loading (optional, but good practice)
          echo "DATABASE_URL=postgresql://user:password@localhost:5432/task_manager_db" > .env
          echo "SECRET_KEY=test-secret-key" >> .env
          echo "JWT_SECRET_KEY=test-jwt-secret-key" >> .env
          echo "REDIS_URL=redis://localhost:6379/0" >> .env

      - name: Run database migrations
        run: |
          # Create migrations folder if it doesn't exist (for fresh CI run)
          flask --app manage db_commands init_db || true
          flask --app manage db_commands migrate_db -m "Initial CI migration" || true
          flask --app manage db_commands upgrade_db

      - name: Seed database
        run: |
          flask --app manage seed --force # Force seed for consistent test data

      - name: Run unit and integration tests with coverage
        run: |
          coverage run -m pytest tests/unit tests/integration
          coverage report -m --fail-under=80

      - name: Build Docker image
        run: docker build -t task-manager-app:latest .

      - name: Clean up Docker containers
        if: always()
        run: docker-compose -f docker-compose.yml down

  # Deploy job (example for main branch)
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy on push to main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials (example for AWS ECR/ECS)
        # This step would involve configuring AWS CLI or similar.
        # Replace with your cloud provider's authentication steps.
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ secrets.AWS_REGION }}" >> $GITHUB_ENV
          # aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          # aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # aws configure set default.region ${{ secrets.AWS_REGION }}

      - name: Log in to Docker Hub / ECR (example)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # For AWS ECR:
          # registry: <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

      - name: Build and push Docker image
        run: |
          docker build -t task-manager-app:latest .
          docker tag task-manager-app:latest ${{ secrets.DOCKER_USERNAME }}/task-manager-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/task-manager-app:latest
          # For AWS ECR:
          # docker tag task-manager-app:latest <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/task-manager-app:latest
          # docker push <YOUR_AWS_ACCOUNT_ID>.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/task-manager-app:latest

      - name: Deploy to Kubernetes / ECS / Heroku (example)
        # This step depends heavily on your deployment target.
        # Examples:
        # - For Kubernetes: kubectl apply -f kubernetes/deployment.yaml
        # - For AWS ECS: aws ecs update-service --cluster <cluster_name> --service <service_name> --force-new-deployment
        # - For Heroku: heroku container:release web -a your-app-name
        run: |
          echo "Simulating deployment to production..."
          # Add actual deployment commands here
          echo "Deployment successful!"
```

**Note on `wait-for-it.sh`**: This script is often used in Docker Compose environments to wait for services to be ready. You'd need to include this script in your project root or ensure it's available in your CI environment. A common way is to download it in your CI step:
`curl -sL https://raw.githubusercontent.com/vishnubob/wait-for-it/master/wait-for-it.sh -o wait-for-it.sh && chmod +x wait-for-it.sh`