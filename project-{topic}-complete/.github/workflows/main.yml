```yaml
name: CI/CD Pipeline for Web Scraping System

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: backend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Start PostgreSQL (for backend tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          docker run --name test-postgres -e POSTGRES_USER=test_user -e POSTGRES_PASSWORD=test_password -e POSTGRES_DB=test_db -p 5432:5432 -d postgres:15-alpine
          # Wait for PostgreSQL to be ready
          sleep 10 # Give it some time to start, for robustness add a loop with pg_isready
          echo "PG is ready"
        # Set environment variables for tests to connect to the temporary PostgreSQL container
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          JWT_SECRET: test_jwt_secret
          ADMIN_EMAIL: test_admin@example.com
          ADMIN_PASSWORD: test_admin_password

      - name: Run Backend Tests
        run: npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          JWT_SECRET: test_jwt_secret
          ADMIN_EMAIL: test_admin@example.com
          ADMIN_PASSWORD: test_admin_password
          # Add a dummy REDIS_HOST/PORT as redis client is imported globally
          REDIS_HOST: localhost
          REDIS_PORT: 63790 # A port unlikely to be used

      - name: Stop PostgreSQL
        if: always()
        run: docker stop test-postgres && docker rm test-postgres

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage/lcov.info


  build-and-test-frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v3
        with:
          path: frontend/node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install Dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Run Frontend Tests
        run: npm test -- --watchAll=false # --watchAll=false to prevent watch mode

      - name: Build Frontend
        run: npm run build


  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend] # Ensure tests pass before deploying
    if: github.ref == 'refs/heads/main' # Only deploy from main branch

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Copy .env to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: ".env"
          target: "/opt/web-scraper/"

      - name: Deploy with Docker Compose
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /opt/web-scraper
            docker-compose pull # Pulls latest images for postgres/redis if they changed
            docker-compose up -d --build --force-recreate # Rebuild backend (includes frontend) and restart services
            docker system prune -f # Clean up old images/containers

```