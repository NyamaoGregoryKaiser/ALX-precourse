```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Flake8 Lint
        run: |
          flake8 app/ --max-line-length=120

      - name: Run Black Formatter Check
        run: |
          black --check app/

      - name: Run isort Import Sort Check
        run: |
          isort --check-only app/

      - name: Run Pytest
        env:
          POSTGRES_SERVER: localhost # Placeholder, will use test DB if configured
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
          SECRET_KEY: test-secret-key
          REDIS_HOST: localhost # Not strictly needed for tests unless mock/test-redis is used
          REDIS_PORT: 6379
          REDIS_DB: 1
          ENVIRONMENT: testing
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing tests/

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          # token: ${{ secrets.CODECOV_TOKEN }} # Uncomment if using private repos or needing explicit token

  frontend-lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint # Assuming you have a 'lint' script in package.json

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false # Assuming you have a 'test' script with Jest

