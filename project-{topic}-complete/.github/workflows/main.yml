```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Lint backend code
        run: npm run lint

      - name: Build backend application
        run: npm run build

      - name: Run backend tests
        run: npm test

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend code
        run: npm run lint

      - name: Build frontend application
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: "http://localhost:5000/api/v1" # Mock API URL for build

      - name: Run frontend tests
        run: npm test -- --watchAll=false # Run tests without watch mode

      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: frontend/coverage

  deploy-to-development:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/develop' # Only deploy develop branch to dev environment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          docker-compose -f docker-compose.yml build
          # Tag and push images (example tags, adjust as needed)
          docker tag ecommerce_backend ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:dev-${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:dev-${{ github.sha }}
          docker tag ecommerce_frontend ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:dev-${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:dev-${{ github.sha }}

      - name: Deploy to remote server (e.g., using SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEV_SERVER_HOST }}
          username: ${{ secrets.DEV_SERVER_USER }}
          key: ${{ secrets.DEV_SERVER_SSH_KEY }}
          script: |
            cd /var/www/ecommerce-dev
            # Pull new images
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:dev-${{ github.sha }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:dev-${{ github.sha }}
            # Update docker-compose.yml with new image tags (e.g., using sed or env variables)
            # docker-compose pull
            # docker-compose up -d --remove-orphans
            # For simplicity, just restart with existing config. In real scenarios, you'd update image tags or use a deployment orchestrator.
            docker-compose down
            docker-compose up -d --build # Rebuild to pick up any changes in env or image tags
            echo "Deployment to DEV completed for commit ${{ github.sha }}"

  deploy-to-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' # Only deploy main branch to production environment
    environment:
      name: production
      url: https://your-ecommerce.com # Example URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          docker-compose -f docker-compose.yml build
          docker tag ecommerce_backend ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:prod-${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:prod-${{ github.sha }}
          docker tag ecommerce_frontend ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:prod-${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:prod-${{ github.sha }}

      - name: Deploy to remote server (e.g., using SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_SERVER_HOST }}
          username: ${{ secrets.PROD_SERVER_USER }}
          key: ${{ secrets.PROD_SERVER_SSH_KEY }}
          script: |
            cd /var/www/ecommerce-prod
            # Pull new images, potentially update image tags in docker-compose.yml
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:prod-${{ github.sha }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:prod-${{ github.sha }}
            docker-compose down
            docker-compose up -d --build
            echo "Deployment to PROD completed for commit ${{ github.sha }}"
```