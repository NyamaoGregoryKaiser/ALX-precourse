```yaml
name: ML-Toolkit CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test_cpp:
    name: Build & Test C++ Application
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git libpq-dev libpqxx-dev libboost-dev google-mock google-test
        # Clone vendor dependencies (if not vendored via submodules)
        git clone https://github.com/CrowCpp/Crow.git vendor/Crow
        git clone https://github.com/nlohmann/json.git vendor/nlohmann_json
        git clone https://github.com/gabime/spdlog.git vendor/spdlog
        git clone https://github.com/Thalhammer/jwt-cpp.git vendor/jwt-cpp

    - name: Configure CMake
      run: cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCROW_BUILD_EXAMPLES=OFF \
            -DCROW_BUILD_TESTS=OFF \
            -DSPDLOG_BUILD_EXAMPLES=OFF \
            -DSPDLOG_BUILD_TESTS=OFF \
            -DNLOHMANN_JSON_BUILD_TESTS=OFF \
            -DNLOHMANN_JSON_BUILD_BENCHMARKS=OFF \
            -DJWT_CPP_BUILD_EXAMPLES=OFF \
            -DJWT_CPP_BUILD_TESTS=OFF \
            -DBUILD_SHARED_LIBS=ON

    - name: Build C++ application
      run: cmake --build build --target MLToolkit_Server

    - name: Run C++ Unit Tests
      run: |
        # Build tests target if not already built with main application (or a separate test target)
        cmake --build build --target MLToolkit_Server_Tests # Assuming tests target name
        ./build/MLToolkit_Server_Tests --gtest_output="xml:test-results/cpp_unit_tests.xml"
      working-directory: ${{github.workspace}}

    - name: Upload C++ Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: cpp-test-results
        path: test-results/cpp_unit_tests.xml

  docker_build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build_and_test_cpp # Only build Docker if C++ tests pass

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub (or other registry)
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        # registry: your_registry_url # uncomment for private registries

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./docker/Dockerfile
        push: false # Set to true to push to registry
        tags: |
          yourusername/ml-toolkit:${{ github.sha }}
          yourusername/ml-toolkit:latest
        cache-from: type=gha # Cache layers for faster builds
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker_build # Only deploy if Docker image built successfully
    if: github.ref == 'refs/heads/main' # Only deploy main branch to production

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Download Docker image (if not pushed to registry)
      # This step would be replaced by pulling from a registry if `docker_build` pushes the image.
      run: echo "Skipping image download for demo. In production, pull from registry."

    - name: Deploy using SSH/Kubernetes/ECS (placeholder)
      # This is a placeholder for your actual deployment logic.
      # E.g., using a Kubernetes client, AWS CLI, Ansible, etc.
      run: |
        echo "Deploying to production environment..."
        # Example: ssh into server and run docker-compose pull && docker-compose up -d
        # Or, update Kubernetes deployment manifest
        # ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "docker-compose -f /path/to/docker-compose.yml pull mltoolkit_server && docker-compose -f /path/to/docker-compose.yml up -d mltoolkit_server"
        echo "Deployment complete."
```