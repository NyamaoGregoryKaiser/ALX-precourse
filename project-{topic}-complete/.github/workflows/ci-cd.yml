name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-server:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb?schema=public
      JWT_SECRET: supersecretjwtkeyforci
      REDIS_URL: redis://localhost:6379
      # Add other necessary server environment variables for testing

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install server dependencies
        run: |
          cd server
          npm install

      - name: Wait for PostgreSQL to be ready
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          until pg_isready -h localhost -p 5432 -U testuser; do
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL is ready!"

      - name: Run Prisma Migrations and Seed Test DB
        run: |
          cd server
          npx prisma migrate reset --force --skip-generate --skip-seed
          npx prisma migrate dev --name ci_init --skip-generate --skip-seed
          npm run prisma:seed # Use the script defined in package.json
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Build server
        run: |
          cd server
          npm run build

      - name: Run server tests
        run: |
          cd server
          npm test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          # Pass other required envs for the server tests


  build-and-test-client:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install client dependencies
        run: |
          cd client
          npm install

      - name: Build client
        run: |
          cd client
          npm run build
        env:
          REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # Placeholder for build, actual API might be different in deploy

      - name: Run client tests
        run: |
          cd client
          npm test -- --ci --watchAll=false
          # Note: CRA's `npm test` by default runs in watch mode.
          # --ci --watchAll=false is needed for CI environments.

  # Example deployment job (requires external setup, e.g., cloud provider, Docker Hub)
