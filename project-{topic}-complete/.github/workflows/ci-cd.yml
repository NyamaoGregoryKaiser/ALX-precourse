```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libpoco-dev libspdlog-dev libjwt-dev libpq-dev git

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release -j$(nproc)

    - name: Run Unit and Integration Tests
      run: |
        cd ${{github.workspace}}/build
        ctest --output-on-failure
      env:
        # Provide test environment variables if necessary, e.g., for test DB
        DB_OPTIMIZER_DB_HOST: localhost
        DB_OPTIMIZER_DB_PORT: 5432
        DB_OPTIMIZER_DB_NAME: test_db_optimizer_db
        DB_OPTIMIZER_DB_USER: test_user
        DB_OPTIMIZER_DB_PASSWORD: test_password
        DB_OPTIMIZER_JWT_SECRET: testSecret

  docker-build:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to DockerHub
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: docker/Dockerfile
        push: ${{ github.event_name != 'pull_request' }}
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/db-optimizer:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/db-optimizer:latest
```