```yaml
name: CI/CD Pipeline for C++ E-commerce

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgJsonPath: '${{ github.workspace }}/vcpkg.json'
        vcpkgTriplet: x64-linux
        # If your C++ version is specific, define it here
        # vcpkgHostTriplet: x64-linux # This is often automatically handled
        # runVcpkgInstall: false # Set to true if vcpkg install should run separately

    - name: Configure CMake
      run: |
        cmake -B build -S . \
          -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake \
          -DVCPKG_TARGET_TRIPLET=x64-linux \
          -DCROW_BUILD_EXAMPLES=OFF \
          -DCROW_BUILD_TESTS=OFF \
          -DCROW_AMALGAMATION=OFF \
          -DCROW_MSVC_USE_LIBCPP=OFF
      working-directory: ${{ github.workspace }}

    - name: Build C++ project
      run: cmake --build build --config Release
      working-directory: ${{ github.workspace }}

    - name: Set up PostgreSQL for integration tests
      uses: Harmonize-IO/postgresql-action@v1.0.0
      with:
        postgresql-version: '13'
        postgresql-user: 'test_user'
        postgresql-password: 'test_password'
        postgresql-db: 'test_db'

    - name: Configure .env for tests
      run: |
        echo "DB_HOST=localhost" >> config/.env
        echo "DB_PORT=5432" >> config/.env
        echo "DB_NAME=test_db" >> config/.env
        echo "DB_USER=test_user" >> config/.env
        echo "DB_PASSWORD=test_password" >> config/.env
        echo "APP_PORT=8080" >> config/.env
        echo "JWT_SECRET=super_secret_test_jwt_key_for_ci" >> config/.env
      working-directory: ${{ github.workspace }}

    - name: Run Schema and Seed for tests
      run: |
        psql -h localhost -U test_user -d test_db -f db/schema.sql
        psql -h localhost -U test_user -d test_db -f db/seed.sql
      env:
        PGPASSWORD: test_password # Pass password to psql
      working-directory: ${{ github.workspace }}

    - name: Run Unit Tests
      run: ./build/tests/unit/ecommerce_unit_tests
      working-directory: ${{ github.workspace }}

    - name: Run Integration Tests
      run: ./build/tests/integration/ecommerce_integration_tests
      working-directory: ${{ github.workspace }}

    # Optional: Build Docker Image (for pushes to main)
    # This step would typically push to a container registry like Docker Hub, ECR, GCR
    - name: Build and Push Docker Image
      if: github.ref == 'refs/heads/main'
      uses: docker/build-push-action@v3
      with:
        context: .
        push: false # Set to true to push to registry
        tags: your-dockerhub-username/ecommerce-cpp:latest,your-dockerhub-username/ecommerce-cpp:${{ github.sha }}
        # username: ${{ secrets.DOCKER_USERNAME }}
        # password: ${{ secrets.DOCKER_PASSWORD }}

    # Optional: Deployment (for pushes to main)
    # This is a placeholder for actual deployment steps
    - name: Deploy to Production
      if: github.ref == 'refs/heads/main'
      run: |
        echo "Deploying to production environment..."
        # Add your deployment commands here, e.g.:
        # - SSH into server
        # - Pull new image
        # - Restart services
        # echo "ssh user@your-server 'cd /path/to/app && docker-compose pull ecommerce_backend && docker-compose up -d --force-recreate ecommerce_backend'"
```