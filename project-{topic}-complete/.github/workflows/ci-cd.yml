```yaml
name: E-commerce CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: npm install
        working-directory: ./backend

      - name: Run Backend Lint
        run: npm run lint
        working-directory: ./backend

      - name: Set up PostgreSQL for Backend Tests
        run: |
          docker run --name test-db -e POSTGRES_USER=${{ secrets.DB_USER }} -e POSTGRES_PASSWORD=${{ secrets.DB_PASSWORD }} -e POSTGRES_DB=${{ secrets.DB_TEST_NAME }} -p 5432:5432 -d postgres:14-alpine
          # Wait for PostgreSQL to be ready
          sleep 10
        env:
          DB_USER: ecommerce_test_user
          DB_PASSWORD: ecommerce_test_password
          DB_TEST_NAME: ecommerce_test_db

      - name: Run Backend Tests
        run: npm test
        working-directory: ./backend
        env:
          NODE_ENV: test
          DB_DIALECT: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ecommerce_test_user
          DB_PASSWORD: ecommerce_test_password
          DB_NAME: ecommerce_test_db # Use test DB name for migrations
          DB_TEST_NAME: ecommerce_test_db
          JWT_SECRET: testsecret
          JWT_EXPIRES_IN: 1m
        
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run Frontend Lint
        run: npm run lint
        working-directory: ./frontend

      - name: Run Frontend Tests
        run: npm test -- --watchAll=false
        working-directory: ./frontend
        env:
          CI: true # Required for create-react-app test in CI environments
          REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # Dummy URL for tests

      - name: Stop PostgreSQL container
        if: always()
        run: docker stop test-db && docker rm test-db

  build-and-deploy:
    name: Build and Deploy Docker Images
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' # Only deploy on push to main

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Docker image
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
          build-args: |
            NODE_ENV=production

      - name: Build and Push Frontend Docker image
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest
          build-args: |
            REACT_APP_API_BASE_URL=/api/v1 # Nginx proxies /api to backend

      - name: Deploy to Server (Example - requires SSH setup)
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/deployment/directory
            # Pull the latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest
            # Update docker-compose.yml to use the 'latest' tags and restart services
            # (You'd usually have a more robust deployment strategy, like blue/green or rolling updates)
            docker-compose down && docker-compose up -d --force-recreate
            echo "Deployment successful!"
```