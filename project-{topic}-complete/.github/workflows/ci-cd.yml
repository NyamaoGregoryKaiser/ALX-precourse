```yaml
name: Payment Processor CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies (system)
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake git libsqlite3-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug # Use Debug for tests, Release for final image

    - name: Build application
      run: cmake --build build --target payment_processor

    - name: Run Unit Tests
      # This assumes you have a test executable defined in CMake, e.g., 'payment_processor_tests'
      # If using Google Test, your CMakeLists.txt would add `add_subdirectory(tests)`
      # and `add_test` commands.
      run: |
        # Example: ./build/tests/unit/payment_processor_unit_tests
        echo "Running unit tests (placeholder)"
        # For actual execution:
        # cd build && ctest --output-on-failure
        # If tests are part of the main executable or separate executables:
        # ./build/payment_processor_tests || true # Or run specific test executable

    - name: Run Integration Tests
      # This typically involves starting the app and hitting its endpoints.
      # Can use `curl`, Python `requests`, or C++ `Boost.Test` with HTTP client.
      run: |
        echo "Running integration tests (placeholder)"
        # Example: start app in background, then run Python tests
        # ./build/payment_processor &
        # APP_PID=$!
        # sleep 5 # Give app time to start
        # python -m pytest tests/integration/test_api.py
        # kill $APP_PID

    - name: Generate Coverage Report (optional)
      # Requires tools like gcov, lcov.
      # You need to compile with coverage flags (-fprofile-arcs -ftest-coverage)
      run: echo "Generating coverage report (placeholder)"
      # Example: lcov --capture --directory . --output-file coverage.info

  docker_build:
    needs: build_and_test
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build Docker image
      run: docker build -f docker/Dockerfile.app -t payment-processor:${{ github.sha }} .

    - name: Log in to Docker Hub (optional)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Push Docker image (optional)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        docker tag payment-processor:${{ github.sha }} your_docker_username/payment-processor:latest
        docker tag payment-processor:${{ github.sha }} your_docker_username/payment-processor:${{ github.sha }}
        docker push your_docker_username/payment-processor:latest
        docker push your_docker_username/payment-processor:${{ github.sha }}

  deploy:
    needs: docker_build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production # Define a production environment in GitHub for secrets
    steps:
    - name: Deploy to Server (e.g., via SSH)
      uses: appleboy/ssh-action@v0.1.5
      with:
        host: ${{ secrets.DEPLOY_HOST }}
        username: ${{ secrets.DEPLOY_USER }}
        key: ${{ secrets.DEPLOY_KEY }}
        script: |
          cd /path/to/your/app
          docker pull your_docker_username/payment-processor:latest
          docker-compose down # Stop current containers
          docker-compose pull # Ensure latest images
          docker-compose up -d --remove-orphans # Start new containers
          echo "Deployment complete for ${{ github.sha }}"
```