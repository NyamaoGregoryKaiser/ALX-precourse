name: CI/CD Pipeline for Data Visualization Platform

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Backend Dependencies
      run: npm install --prefix backend

    - name: Create .env for Backend Tests
      run: |
        echo "NODE_ENV=test" >> backend/.env
        echo "PORT=5001" >> backend/.env
        echo "DB_NAME=test_dataviz_db" >> backend/.env
        echo "DB_USER=test_user" >> backend/.env
        echo "DB_PASSWORD=test_pass" >> backend/.env
        echo "DB_HOST=localhost" >> backend/.env
        echo "DB_PORT=5432" >> backend/.env
        echo "JWT_SECRET=testsecret" >> backend/.env
        echo "JWT_EXPIRES_IN=1h" >> backend/.env
        echo "LOG_LEVEL=error" >> backend/.env
      # This is critical: ensure the test environment uses a separate DB for CI
      # or mock the DB calls effectively. For true integration tests, a test DB is needed.

    - name: Run Backend Tests
      run: npm test --prefix backend

  frontend-ci:
    runs-on: ubuntu-latest
    needs: backend-ci # Ensure backend tests pass before frontend
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install Frontend Dependencies
      run: npm install --prefix frontend

    - name: Run Frontend Tests
      run: npm test --prefix frontend -- --watchAll=false # Run tests without watch mode

  # Example for a simple deployment stage (can be expanded significantly)
  deploy:
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main' # Deploy only on push to main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build & Push Docker Images (to Docker Hub, for example)
        # This step would involve logging into Docker Hub and pushing images.
        # Requires DOCKER_USERNAME and DOCKER_PASSWORD as GitHub Secrets.
        run: |
          echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker build -t your-docker-username/dataviz-backend:latest -f Dockerfile.backend .
          docker build -t your-docker-username/dataviz-frontend:latest -f Dockerfile.frontend .
          docker push your-docker-username/dataviz-backend:latest
          docker push your-docker-username/dataviz-frontend:latest

      - name: Deploy to Server (e.g., using SSH and Docker Compose)
        # This is a placeholder for actual deployment commands.
        # Requires SSH_PRIVATE_KEY, DEPLOY_HOST, DEPLOY_USER as GitHub Secrets.
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > deploy_key
          chmod 600 deploy_key
          ssh -i deploy_key -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            cd /path/to/your/app
            # Pull the latest code (if not already handled by Docker images)
            # git pull origin main
            # Update Docker images and restart services
            docker-compose pull
            docker-compose up -d --build --force-recreate
            docker system prune -f # Clean up old Docker images/volumes
          EOF
```

