name: CI/CD Pipeline for E-commerce Backend

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Start PostgreSQL with Testcontainers (for integration tests)
        run: |
          docker-compose -f docker-compose-test.yml up -d
        # We assume a separate docker-compose-test.yml for services required for integration tests
        # Or, rely entirely on Testcontainers within the Java tests.
        # For simplicity, this example relies on Testcontainers setup within the Java code.

      - name: Build with Maven and Run Tests
        run: mvn clean install

      - name: Upload JaCoCo Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml # Path to your JaCoCo XML report

      - name: Log in to Docker Hub (if publishing to Docker Hub)
        if: github.ref == 'refs/heads/main' && secrets.DOCKER_USERNAME && secrets.DOCKER_PASSWORD
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        if: github.ref == 'refs/heads/main' # Only push image on main branch
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
          file: ./Dockerfile

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Remote Server (SSH/Kubernetes)
        # This is a placeholder step. Replace with your actual deployment strategy.
        # Examples:
        # - Using SSH to copy files and restart service:
        #   uses: appleboy/ssh-action@master
        #   with:
        #     host: ${{ secrets.PROD_SSH_HOST }}
        #     username: ${{ secrets.PROD_SSH_USERNAME }}
        #     key: ${{ secrets.PROD_SSH_KEY }}
        #     script: |
        #       cd /path/to/your/app
        #       docker-compose pull app
        #       docker-compose up -d --remove-orphans
        # - Using Kubernetes (kubectl):
        #   uses: azure/k8s-set-context@v3
        #   with:
        #     kubeconfig: ${{ secrets.KUBE_CONFIG }}
        #   - uses: azure/k8s-deploy@v4
        #     with:
        #       images: ${{ secrets.DOCKER_USERNAME }}/ecommerce-backend:latest
        #       manifests: |
        #         k8s/deployment.yaml
        #         k8s/service.yaml
        run: echo "Deployment script goes here, e.g., using SSH to trigger a pull/restart on a server, or apply Kubernetes manifests."
        env:
          # Example of passing sensitive data to deployment script
          PROD_DB_HOST: ${{ secrets.PROD_DB_HOST }}
          PROD_DB_USER: ${{ secrets.PROD_DB_USER }}
          PROD_DB_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          PROD_JWT_SECRET: ${{ secrets.PROD_JWT_SECRET }}
```

