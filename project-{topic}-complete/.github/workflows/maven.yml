name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Run Unit and Integration Tests
      run: mvn -B test --file pom.xml

    - name: Collect JaCoCo Coverage Report
      run: mvn jacoco:report
    - name: Upload JaCoCo report to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Ensure you add CODECOV_TOKEN to your GitHub secrets
        files: target/site/jacoco/jacoco.xml
        fail_ci_if_error: true
        verbose: true

    - name: Build Docker image
      run: docker build -t alx-scraper-system:${{ github.sha }} .

    # Example of pushing to Docker Hub (requires Docker Hub credentials in GitHub Secrets)
