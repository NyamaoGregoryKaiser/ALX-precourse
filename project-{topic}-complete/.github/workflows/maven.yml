```yaml
name: Java Spring Boot CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build with Maven and Run Tests
        run: |
          # The JWT_SECRET is required by the app, even during tests. Use a dummy for CI.
          # Disable Flyway for tests as Testcontainers or H2 will manage the schema.
          ./mvnw clean install -DskipTests -Dspring.flyway.enabled=false
          # Run tests with JaCoCo and enforce coverage
          ./mvnw test -Dspring.flyway.enabled=false -Pcoverage
          # The -Pcoverage profile would enable JaCoCo plugin configured in pom.xml to generate report and check coverage.
          # For this example, the JaCoCo plugin is always active for `test` phase.

      - name: Check JaCoCo Coverage Report
        run: |
          # This step will fail if coverage thresholds are not met, as configured in pom.xml
          # You can also upload the report for more detailed analysis:
          # cat target/site/jacoco/jacoco.xml
          echo "JaCoCo coverage check passed or skipped."

  build-and-push-docker-images:
    needs: build-and-test # Only run Docker build if tests pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        run: |
          # Build JAR first without running tests (already done in previous job)
          ./mvnw clean package -DskipTests
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ml-utils-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/ml-utils-backend:latest

      - name: Build and push frontend Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/ml-utils-frontend:latest -f frontend/Dockerfile ./frontend --build-arg REACT_APP_API_URL=http://localhost:8080/api
          docker push ${{ secrets.DOCKER_USERNAME }}/ml-utils-frontend:latest

      # Example for a simple deployment to a single server (e.g., via SSH)
      # For real production, use Kubernetes, ECS, Azure App Service, etc.
      - name: Deploy to Production Server (Optional - Requires SSH access)
        if: github.ref == 'refs/heads/main' # Only deploy on push to main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST} << 'EOF'
            echo "Deployment started on server..."
            # Pull latest images
            docker pull ${{ secrets.DOCKER_USERNAME }}/ml-utils-backend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/ml-utils-frontend:latest

            # Stop and remove old containers
            docker stop ml-utils-backend || true
            docker rm ml-utils-backend || true
            docker stop ml-utils-frontend || true
            docker rm ml-utils-frontend || true
            docker stop ml-utils-postgres || true
            docker rm ml-utils-postgres || true

            # Recreate network if it doesn't exist (optional, docker-compose handles this)
            docker network create ml-utils-network || true

            # Run new database container (only if it needs to be recreated, else just ensure it's up)
            # For simplicity, if using docker-compose, just run docker-compose up -d.
            # Example if running containers individually:
            docker run -d --name ml-utils-postgres --network ml-utils-network \
              -p 5432:5432 \
              -e POSTGRES_DB=${DB_NAME:-ml_utils_db} \
              -e POSTGRES_USER=${DB_USERNAME:-ml_user} \
              -e POSTGRES_PASSWORD=${DB_PASSWORD:-ml_password} \
              -v postgres_data:/var/lib/postgresql/data \
              postgres:15-alpine

            # Wait for DB to be healthy
            echo "Waiting for PostgreSQL to be ready..."
            ATTEMPTS=0
            until docker exec ml-utils-postgres pg_isready -U ml_user -d ml_utils_db || [ $ATTEMPTS -eq 30 ]; do
                sleep 5
                ATTEMPTS=$((ATTEMPTS+1))
                echo "Attempt $ATTEMPTS: Waiting for PostgreSQL..."
            done
            if [ $ATTEMPTS -eq 30 ]; then
                echo "PostgreSQL did not become ready in time. Exiting deployment."
                exit 1
            fi
            echo "PostgreSQL is ready."

            # Run new backend container
            docker run -d --name ml-utils-backend --network ml-utils-network \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:postgresql://ml-utils-postgres:5432/${DB_NAME:-ml_utils_db} \
              -e SPRING_DATASOURCE_USERNAME=${DB_USERNAME:-ml_user} \
              -e SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-ml_password} \
              -e JWT_SECRET=${JWT_SECRET:-aStrongSecretKeyForJWTAuthenticationWhichShouldBeAtLeast32BytesLong} \
              -e CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000} \
              -e SPRING_FLYWAY_ENABLED="true" \
              -v ml_utils_uploads:/app/uploads \
              ${{ secrets.DOCKER_USERNAME }}/ml-utils-backend:latest

            # Run new frontend container
            docker run -d --name ml-utils-frontend --network ml-utils-network \
              -p 3000:3000 \
              -e REACT_APP_API_URL=http://localhost:8080/api \
              ${{ secrets.DOCKER_USERNAME }}/ml-utils-frontend:latest

            echo "Deployment completed!"
          EOF
          rm key.pem # Clean up private key
```