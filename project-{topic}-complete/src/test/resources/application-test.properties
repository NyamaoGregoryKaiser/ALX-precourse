# Test-specific database configuration using Testcontainers
spring.datasource.url=jdbc:tc:postgresql:15-alpine:///test_db
spring.datasource.username=test_user
spring.datasource.password=test_password
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# JPA/Hibernate Properties for tests
spring.jpa.hibernate.ddl-auto=none # Testcontainers with Flyway handles it
spring.jpa.show-sql=false

# Flyway Database Migration for tests
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Secret for tests (can be simple, as it's not exposed)
app.jwt-secret=testSecretForTestsOnlyThatIsLongEnoughAndSecure!!!!
app.jwt-expiration-milliseconds=3600000 # 1 hour for tests

# Logging in tests
logging.level.com.alx.scraper=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.testcontainers=WARN
logging.level.org.flywaydb=WARN
