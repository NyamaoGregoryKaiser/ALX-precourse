# Development-specific database settings
# This might point to an in-memory database like H2 for quick local development,
# or a local PostgreSQL instance with different credentials.
spring.datasource.url=jdbc:postgresql://localhost:5432/scraper_dev_db
spring.datasource.username=dev_user
spring.datasource.password=dev_password

# For local development with H2 (uncomment if preferred for quick start, but PostgreSQL is recommended)
# spring.datasource.url=jdbc:h2:mem:scraper_db_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.hibernate.ddl-auto=update # For H2, allow schema updates
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.show-sql=true
logging.level.com.alx.scraper=DEBUG
logging.level.org.springframework=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
