```html
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        body { padding-top: 5rem; }
        .form-signin {
            width: 100%;
            max-width: 330px;
            padding: 15px;
            margin: auto;
        }
        .form-signin .form-control {
            position: relative;
            box-sizing: border-box;
            height: auto;
            padding: 10px;
            font-size: 16px;
        }
        .form-signin .form-control:focus {
            z-index: 2;
        }
        .form-signin input[type="text"] {
            margin-bottom: -1px;
            border-bottom-right-radius: 0;
            border-bottom-left-radius: 0;
        }
        .form-signin input[type="password"] {
            margin-bottom: 10px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
    </style>
</head>
<body class="text-center">
    <nav class="navbar navbar-expand-md navbar-dark bg-dark fixed-top">
        <a class="navbar-brand" href="/">ALX Product Management</a>
    </nav>

    <main class="form-signin">
        <form id="loginForm">
            <h1 class="h3 mb-3 font-weight-normal">Please sign in</h1>
            <label for="inputUsername" class="sr-only">Username</label>
            <input type="text" id="inputUsername" class="form-control" placeholder="Username" required autofocus>
            <label for="inputPassword" class="sr-only">Password</label>
            <input type="password" id="inputPassword" class="form-control" placeholder="Password" required>
            <button class="btn btn-lg btn-primary btn-block" type="submit">Sign in</button>
            <p class="mt-5 mb-3 text-muted">API Login Demo</p>
        </form>
        <div id="loginMessage" class="mt-3"></div>
    </main>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.2/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script>
        $(document).ready(function() {
            $('#loginForm').submit(function(event) {
                event.preventDefault(); // Prevent default form submission

                var username = $('#inputUsername').val();
                var password = $('#inputPassword').val();

                $.ajax({
                    url: '/api/auth/login',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ username: username, password: password }),
                    success: function(response) {
                        $('#loginMessage').html('<div class="alert alert-success">Login successful! Token received.</div>');
                        console.log('JWT Token:', response.jwtToken);
                        console.log('Username:', response.username);
                        console.log('Role:', response.role);
                        // Store the token in localStorage for subsequent API calls
                        localStorage.setItem('jwtToken', response.jwtToken);
                        localStorage.setItem('username', response.username);
                        localStorage.setItem('role', response.role);
                        // Redirect or update UI
                        window.location.href = "/";
                    },
                    error: function(xhr, status, error) {
                        var errorMessage = xhr.responseJSON ? (xhr.responseJSON.message || 'Login failed') : 'Login failed';
                        $('#loginMessage').html('<div class="alert alert-danger">' + errorMessage + '</div>');
                        console.error('Login error:', error, xhr.responseText);
                    }
                });
            });
        });
    </script>
</body>
</html>
