```yaml
spring:
  application:
    name: ml-utils-system
  profiles:
    active: dev # Default profile
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ml_utils_db}
    username: ${DB_USERNAME:ml_user}
    password: ${DB_PASSWORD:ml_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none # Disable DDL auto-creation in production; Flyway handles schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false # Set to true for debugging SQL queries
  flyway:
    enabled: true # Enable Flyway for database migrations
    locations: classpath:db/migration # Location of migration scripts
    baseline-on-migrate: true # Baselines an existing schema if Flyway is run against a non-empty schema

server:
  port: 8080

mlutils:
  app:
    jwtSecret: ${JWT_SECRET:aStrongSecretKeyForJWTAuthenticationWhichShouldBeAtLeast32BytesLong} # Generate a secure key for production!
    jwtExpirationMs: 86400000 # 24 hours in milliseconds (24 * 60 * 60 * 1000)
  cors:
    allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000} # Comma-separated list of allowed origins

logging:
  level:
    com.ml_utils_system: DEBUG # Set logging level for our application package
    org.springframework: INFO # Default Spring logging
    org.hibernate.SQL: DEBUG # To see executed SQL queries
    org.hibernate.orm.jdbc.bind: TRACE # To see SQL parameters
  file:
    name: logs/ml-utils-system.log # Log to a file

# Springdoc OpenAPI (Swagger UI) configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html # Custom path for Swagger UI
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs # Custom path for OpenAPI JSON
```