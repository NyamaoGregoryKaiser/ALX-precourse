```properties
# Server Configuration
server.port=8080

# Spring Data Source (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/productdb
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Console (for test/dev profiles)
spring.h2.console.enabled=false # Disable by default for production, enable for dev/test in profiles

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=none # Flyway will handle schema
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true # Allows Flyway to take over an existing database
spring.flyway.schemas=public # Specify the schema Flyway manages

# JWT Configuration
application.security.jwt.secret-key=a_very_long_and_complex_secret_key_that_is_at_least_256_bits_long_and_should_be_stored_securely_in_production_environment_variables_or_vault
application.security.jwt.expiration=86400000 # 24 hours in milliseconds

# Caching Configuration (Spring Cache with Caffeine)
spring.cache.type=caffeine
# Configuration for specific caches can be done in AppConfig.java or via properties:
# spring.cache.cache-names=products,product,categories,category

# Logging Configuration
logging.level.com.alx.devops.productmanagement=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
logging.file.name=application.log # Log to file
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# Springdoc OpenAPI (Swagger UI) Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Actuator Endpoints (Monitoring)
management.endpoints.web.exposure.include=* # Expose all actuator endpoints via HTTP
management.endpoint.health.show-details=always # Show health details

# Development profile specific configurations
---
spring.config.activate.on-profile=dev
server.port=8081
spring.datasource.url=jdbc:postgresql://localhost:5433/productdb_dev # Use different port for dev DB
spring.h2.console.enabled=true # Enable H2 console in dev
spring.jpa.hibernate.ddl-auto=update # Allow Hibernate to update schema in dev (careful with this)
spring.flyway.enabled=false # Disable Flyway in dev if ddl-auto is update, or manage carefully.
                            # For this project, we assume Flyway is canonical even in dev.
                            # Re-enabling Flyway for dev for consistency.
# Use an in-memory database for quick development cycles without external DB
# spring.datasource.url=jdbc:h2:mem:testdb
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=
# spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.hibernate.ddl-auto=create-drop
