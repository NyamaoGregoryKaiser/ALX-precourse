# Spring Boot Application
spring.application.name=web-scraper-system
server.port=8080

# Database Configuration (for production/default environment)
spring.datasource.url=jdbc:postgresql://localhost:5432/scraper_db
spring.datasource.username=scraper_user
spring.datasource.password=scraper_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Properties
spring.jpa.hibernate.ddl-auto=none # Flyway manages schema
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false # Set to true for debugging SQL

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true # Create baseline if schema exists but no migration history
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.com.alx.scraper=INFO
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG # For detailed SQL logging
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE # For showing parameter bindings
logging.config=classpath:logback-spring.xml

# JWT Configuration
app.jwt-secret=yourSuperSecretJwtKeyForALXProjectThatIsLongEnoughAndSecurePleaseChangeThisInProd!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
app.jwt-expiration-milliseconds=604800000 # 7 days

# Caching (Caffeine)
spring.cache.type=caffeine
spring.cache.cache-names=htmlDocuments,extractedData,scrapingJob,allScrapingJobsForUser,scrapedDataForJob,scrapedDataEntry

# Thread pool for async scraping tasks (important for @Async, or taskExecutor)
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=ScraperTask-

# Actuator Endpoints
management.endpoints.web.exposure.include=health,info,prometheus,beans,caches,metrics
