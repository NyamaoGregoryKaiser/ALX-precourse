# Spring Application Configuration
spring.application.name=ecommerce-system
server.port=8080

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/ecommerce_db
spring.datasource.username=admin
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate # 'validate' for production, 'update' or 'create-drop' for dev/test
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:/db/migration
spring.flyway.baseline-on-migrate=true # Useful for existing databases, set to false in production if already migrated

# Logging Configuration
logging.level.com.alx.ecommerce=DEBUG
logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=INFO
logging.file.name=logs/ecommerce-system.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n

# Cache Configuration (Caffeine defaults - as configured in CacheConfig.java)
# spring.cache.type=caffeine # Explicitly define cache type if needed

# JWT Configuration (Sensitive, use environment variables in production)
app.jwt-secret=YourSuperSecretKeyForJWTGenerationAndValidationThatMustBeAtLeast256BitsLongAndStoredSecurely
app.jwt-expiration-milliseconds=604800000

# Open API / Swagger UI Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
```

