version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      # Load from .env file directly for convenience
      FLASK_ENV: ${FLASK_ENV:-development}
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      CACHE_TYPE: ${CACHE_TYPE:-simple}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - .:/app # Mount the current directory into the container
    depends_on:
      - db
    # Set to 'flask run' for easier debugging in dev,
    # or 'gunicorn' for production in start.sh
    command: ["./start.sh"]

  db:
    image: postgres:13-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cms_db}
      POSTGRES_USER: ${POSTGRES_USER:-cmsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cmspass}
    volumes:
      - postgres_data:/var/lib/postgresql/data/

volumes:
  postgres_data:
