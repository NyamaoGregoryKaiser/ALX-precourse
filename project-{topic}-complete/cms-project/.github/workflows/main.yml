name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install psycopg2-binary for database interaction during tests
        pip install psycopg2-binary
        
    - name: Set up test environment variables
      run: |
        echo "SECRET_KEY=test_secret_key" >> $GITHUB_ENV
        echo "JWT_SECRET_KEY=test_jwt_secret" >> $GITHUB_ENV
        echo "DATABASE_URL=sqlite:///:memory:" >> $GITHUB_ENV
        echo "TEST_DATABASE_URL=sqlite:///:memory:" >> $GITHUB_ENV # Ensure test config uses this

    - name: Run Linting (Flake8, Black, isort)
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
        black --check .
        isort --check-only .

    - name: Run Unit and Integration Tests
      run: |
        pytest tests/unit tests/integration --cov=app --cov-report=xml
      env:
        FLASK_ENV: testing

    - name: Run API Tests
      run: |
        # For API tests, we need a running app or mock the API.
        # For simplicity, we'll run a minimal Flask app in the background
        # and then run API tests against it.
        # In a real CI, you might spin up a docker-compose stack for integration.
        export FLASK_ENV=testing
        # Create an in-memory database for API tests
        flask db upgrade # This will use the in-memory SQLite from TestingConfig
        python seed.py # Seed data for testing
        gunicorn --bind 127.0.0.1:5000 --timeout 60 --daemon manage:app
        sleep 5 # Give the server time to start
        pytest tests/api --base-url http://127.0.0.1:5000
        kill $(lsof -t -i:5000) || true # Ensure the server is stopped

    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Set this in GitHub secrets
        file: ./coverage.xml
        flags: unittests # optional
        name: codecov-umbrella # optional
        fail_ci_if_error: true # optional
```