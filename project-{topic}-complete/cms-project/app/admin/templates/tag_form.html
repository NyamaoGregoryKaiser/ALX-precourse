{% extends "admin/base.html" %}

{% block content %}
<div class="container-fluid">
    <h1 class="mb-4">{{ title }}</h1>

    <div class="card">
        <div class="card-body">
            <form method="POST" action="{{ url_for('admin.create_tag') if not tag else url_for('admin.edit_tag', tag_id=tag.id) }}">
                <div class="mb-3">
                    <label for="name" class="form-label">Tag Name</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ tag.name if tag else '' }}" required>
                </div>
                
                <button type="submit" class="btn btn-primary">{{ 'Update Tag' if tag else 'Create Tag' }}</button>
                <a href="{{ url_for('admin.tag_list') }}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
```
