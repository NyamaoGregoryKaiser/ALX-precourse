```ini
# ML-Toolkit Server Configuration

# Database Settings (PostgreSQL)
DB_HOST=localhost
DB_PORT=5432
DB_NAME=ml_toolkit_db
DB_USER=ml_user
DB_PASSWORD=ml_password

# API Server Settings
API_PORT=8080

# Logging Settings
# Options: trace, debug, info, warn, error, critical
LOG_LEVEL=info
LOG_FILE=ml_toolkit.log

# JWT Authentication Settings
# IMPORTANT: This should be a strong, secret key.
# For production, it MUST be set via environment variable.
JWT_SECRET=super_secret_jwt_key_please_change_this_in_production

# Caching Settings
CACHE_CAPACITY=100

# Rate Limiting Settings
RATE_LIMIT_CAPACITY=100      # Max tokens in the bucket for each IP
RATE_LIMIT_FILL_RATE=10      # Tokens added per second per IP
```