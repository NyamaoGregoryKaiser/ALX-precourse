version: '3.8'

services:
  payment_app:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database file and logs
      - payment_data:/app/payment_processor.db
      - payment_logs:/app/logs
      # Mount configuration for easy local changes (optional for production)
      - ./config/app.config.json:/app/config/app.config.json
    environment:
      # You can override config values via environment variables if AppConfig supports it
      # For example: DB_PATH=/app/payment_processor.db, JWT_SECRET=env_secret
      # Or, ensure app.config.json is correctly mounted/copied.
      PAYMENT_CONFIG_PATH: /app/config/app.config.json # Tell the app where its config is
    # For a real DB, uncomment and link:
