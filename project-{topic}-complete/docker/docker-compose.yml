version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: ml-utilities-db
    environment:
      POSTGRES_DB: ml_utilities_db
      POSTGRES_USER: mluser
      POSTGRES_PASSWORD: mlpassword
    ports:
      - "5432:5432"
    volumes:
      - ml-utilities-db-data:/var/lib/postgresql/data
      # You can mount initial SQL scripts here if you prefer initdb for seed data
      # - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mluser -d ml_utilities_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Spring Boot Application Service
  app:
    build:
      context: ../ # Build context is the project root, so Dockerfile can access 'backend/'
      dockerfile: docker/Dockerfile
    container_name: ml-utilities-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/ml_utilities_db
      SPRING_DATASOURCE_USERNAME: mluser
      SPRING_DATASOURCE_PASSWORD: mlpassword
      APPLICATION_SECURITY_JWT_SECRET_KEY: THIS_IS_A_VERY_LONG_AND_COMPLEX_SECRET_KEY_FOR_JWT_AUTHENTICATION_AND_SIGNATURE_VERIFICATION_MAKE_SURE_IT_IS_AT_LEAST_256_BITS_OR_32_BYTES_LONG_AND_KEPT_CONFIDENTIAL # Same as in application.properties
      APPLICATION_DATASET_UPLOAD_DIR: /app/data/datasets # Mount to a persistent volume
      APPLICATION_DATASET_TEMP_DIR: /app/data/temp # Mount to a persistent volume
    depends_on:
      db:
        condition: service_healthy # Wait for the database to be healthy
    volumes:
      - ml-utilities-app-datasets:/app/data/datasets # Persistent storage for uploaded datasets
      - ml-utilities-app-temp:/app/data/temp       # Persistent storage for temporary processed files
      - ml-utilities-app-logs:/app/logs            # Persistent storage for application logs
    # To run with a specific profile (e.g., prod)
    # command: java -Dspring.profiles.active=prod -jar app.jar

# Define volumes for persistent data
volumes:
  ml-utilities-db-data:
  ml-utilities-app-datasets:
  ml-utilities-app-temp:
  ml-utilities-app-logs:
```