```yaml
version: '3.8'

services:
  mltoolkit_db:
    image: postgres:15-alpine
    container_name: mltoolkit_db
    environment:
      POSTGRES_DB: ${ML_DB_NAME:-ml_toolkit_db}
      POSTGRES_USER: ${ML_DB_USER:-ml_user}
      POSTGRES_PASSWORD: ${ML_DB_PASSWORD:-ml_password}
    volumes:
      - mltoolkit_db_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d/migrations
      - ./database/seed_data.sql:/docker-entrypoint-initdb.d/seed_data.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  mltoolkit_server:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        UID: 1000 # Map to your host user UID for consistent file permissions
        GID: 1000 # Map to your host user GID
    container_name: mltoolkit_server
    environment:
      ML_DB_HOST: mltoolkit_db
      ML_DB_PORT: 5432
      ML_DB_NAME: ${ML_DB_NAME:-ml_toolkit_db}
      ML_DB_USER: ${ML_DB_USER:-ml_user}
      ML_DB_PASSWORD: ${ML_DB_PASSWORD:-ml_password}
      ML_API_PORT: ${ML_API_PORT:-8080}
      ML_JWT_SECRET: ${ML_JWT_SECRET:-super_secret_jwt_key_please_change_this_in_production}
      ML_LOG_LEVEL: ${ML_LOG_LEVEL:-info}
    volumes:
      - ./config:/home/mltoolkituser/app/config:ro # Mount config for runtime, read-only
      - ./ml_toolkit.log:/home/mltoolkituser/app/ml_toolkit.log # Mount log file
      - ./vendor:/home/mltoolkituser/app/vendor:ro # Mount vendor for build stage
    ports:
      - "8080:8080"
    depends_on:
      mltoolkit_db:
        condition: service_healthy
    restart: always

volumes:
  mltoolkit_db_data:
```