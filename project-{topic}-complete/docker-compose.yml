```yaml
version: '3.8'

services:
  task_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_management_api_container
    ports:
      - "18080:18080"
    volumes:
      # Mount a volume for persistent database storage
      - ./database:/app/database
    environment:
      # These environment variables override defaults in AppConfig.h
      # For a production setup, replace with strong, random values
      # and manage securely (e.g., Docker secrets or external secret management)
      - JWT_SECRET=your_super_secret_jwt_key_here_for_dev_only
      - DB_PATH=/app/database/task_manager.sqlite # Path inside the container
      - SERVER_PORT=18080
      - APP_ENV=development
    restart: unless-stopped
```