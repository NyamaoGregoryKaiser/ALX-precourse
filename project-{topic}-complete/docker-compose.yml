version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    volumes:
      - task_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d taskdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - task_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://user:password@db:5432/taskdb?schema=public # Hostname 'db' for Docker network
      REDIS_URL: redis://redis:6379 # Hostname 'redis' for Docker network
      JWT_SECRET: supersecretjwtkey
      JWT_EXPIRES_IN: 1h
      CLIENT_URL: http://localhost:3000 # For CORS in dev
    volumes:
      - ./server:/usr/src/app # Mount source for hot-reloading in dev
      - /usr/src/app/node_modules # Exclude node_modules from host mount
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npx ts-node prisma/seed.ts && npm run dev"
    # ^ Use `npm run dev` for hot-reloading in development.
    # For production, use `node dist/server.js` or `npm start` after `npm run build`.

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # This is for local dev without Nginx proxying
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container's port 80 (Nginx default)
    volumes:
      - ./client:/app # For live reload of client in dev
      - /app/node_modules # Exclude node_modules from host mount
    depends_on:
      - server
    environment:
      # These are for react-scripts start/build locally, and args for Dockerfile build stage
      REACT_APP_API_BASE_URL: http://localhost:5000/api/v1


volumes:
  task_db_data:
  task_redis_data:
