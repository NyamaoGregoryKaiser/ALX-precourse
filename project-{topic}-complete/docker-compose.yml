```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce-network
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} # Added password for production

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: db
      REDIS_HOST: redis
      REDIS_PASSWORD: ${REDIS_PASSWORD} # Pass Redis password
      NODE_ENV: development # Override for development within container
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules # Prevents host node_modules from overriding container's
    command: npm run dev # Run dev script from package.json
    networks:
      - ecommerce-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    env_file:
      - ./frontend/.env
    environment:
      # These variables must be prefixed with REACT_APP_ for React to pick them up
      REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # This is for host access
      # For container-to-container communication (if frontend directly calls backend inside docker network)
      # But typically frontend runs in browser, connecting to host's exposed backend port
      # REACT_APP_API_BASE_URL: http://backend:5000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app
      - /app/node_modules
    stdin_open: true # Required for React scripts (hot-reloading)
    tty: true # Required for React scripts (hot-reloading)
    command: npm start
    networks:
      - ecommerce-network

volumes:
  postgres_data:
    driver: local

networks:
  ecommerce-network:
    driver: bridge
```