```yaml
version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-cms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-cms_password}
      POSTGRES_DB: ${DB_NAME:-cms_db}
    volumes:
      - cms_db_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/2-seed.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-cms_user} -d ${DB_NAME:-cms_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  cms-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DB_HOST: db
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-cms_user}
      DB_PASSWORD: ${DB_PASSWORD:-cms_password}
      DB_NAME: ${DB_NAME:-cms_db}
      # JWT_SECRET: ${JWT_SECRET} # Uncomment to override config.json via env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs # Mount for persistent logs
    # For development, you might mount source code:
    # - ./src:/app/src
    # - ./views:/app/views
    # This would require rebuilding the app inside the container or using a dev container setup.
    # For production, build into image as above.

volumes:
  cms_db_data:
```