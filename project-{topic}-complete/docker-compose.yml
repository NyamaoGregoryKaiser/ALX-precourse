version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: # Basic health check for database readiness
      test: ["CMD-SHELL", "pg_isready -U admin -d ecommerce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce-app
    ports:
      - "8080:8080"
    environment:
      # These environment variables will override those set in the Dockerfile
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ecommerce_db
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password
      APP_JWT_SECRET: YourSuperSecretKeyForJWTGenerationAndValidationThatMustBeAtLeast256BitsLongAndStoredSecurely
      # Optionally configure Spring profiles, e.g., 'prod', 'dev'
      SPRING_PROFILES_ACTIVE: dev
    depends_on:
      postgres:
        condition: service_healthy # Wait for postgres to be healthy
    # For local development, bind mount source code for live reloading (optional)
    # volumes:
    #   - ./src:/app/src
    #   - ~/.m2:/root/.m2 # Cache maven dependencies
    # command: ["./mvnw", "spring-boot:run"] # Use this for hot-reloading in dev

volumes:
  postgres_data:
```

