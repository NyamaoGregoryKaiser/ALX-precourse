```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ml-utils-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-ml_utils_db}
      POSTGRES_USER: ${DB_USERNAME:-ml_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ml_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ml_user} -d ${DB_NAME:-ml_utils_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-utils-backend
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:-ml_utils_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-ml_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-ml_password}
      JWT_SECRET: ${JWT_SECRET:-aStrongSecretKeyForJWTAuthenticationWhichShouldBeAtLeast32BytesLong}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      SPRING_FLYWAY_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - ./uploads:/app/uploads # Mount a volume for dataset uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl --fail http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend # Path to your React frontend directory
      dockerfile: Dockerfile
    container_name: ml-utils-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8080/api # Adjust if backend is on a different host/port
    depends_on:
      - backend

volumes:
  postgres_data:
```