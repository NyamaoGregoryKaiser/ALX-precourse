```yaml
version: '3.8'

services:
  ecommerce_db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Mount schema and seed data for the entrypoint script
      - ./db/schema.sql:/app/db/schema.sql
      - ./db/seed.sql:/app/db/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  ecommerce_backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      DB_HOST: ecommerce_db # Service name in docker-compose
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      APP_PORT: ${APP_PORT}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      ecommerce_db:
        condition: service_healthy
    volumes:
      # Mount .env for runtime configuration
      - ./config/.env:/app/config/.env
      # Mount db scripts for backend to run them if needed (though docker-entrypoint handles it)
      - ./db:/app/db

volumes:
  db_data:
```