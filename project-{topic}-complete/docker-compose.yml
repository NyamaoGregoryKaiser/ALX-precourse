```yaml
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: ecommerce_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgdata:/var/lib/postgresql/data/pgdata # Persist data
    ports:
      - "5432:5432"
    networks:
      - ecommerce-network

  # Backend Application
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${PORT}
      API_VERSION: ${API_VERSION}
      FRONTEND_URL: ${FRONTEND_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      DB_DIALECT: ${DB_DIALECT}
      DB_HOST: db # Service name in docker-compose for database
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_LOGGING: ${DB_LOGGING}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
    volumes:
      - ./backend:/app # Mount host code to container for development (optional for production)
      - /app/node_modules # Exclude node_modules from host mount
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      - db
    networks:
      - ecommerce-network
    command: sh -c "npm install && npx sequelize db:migrate && npx sequelize db:seed:all && npm run dev" # Run migrations, seed, then start dev server

  # Frontend Application (React served by Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecommerce_frontend
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to Nginx's default HTTP port 80
    depends_on:
      - backend
    networks:
      - ecommerce-network

# Docker Volumes for data persistence
volumes:
  pgdata:

# Docker Networks for inter-service communication
networks:
  ecommerce-network:
    driver: bridge
```