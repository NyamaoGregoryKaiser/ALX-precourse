version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: scraper_db
    environment:
      POSTGRES_DB: scraper_db
      POSTGRES_USER: scraper_user
      POSTGRES_PASSWORD: scraper_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper_user -d scraper_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_scraper_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/scraper_db
      SPRING_DATASOURCE_USERNAME: scraper_user
      SPRING_DATASOURCE_PASSWORD: scraper_password
      # IMPORTANT: Change this for production!
      APP_JWT_SECRET: yourSuperSecretJwtKeyForALXProjectThatIsLongEnoughAndSecurePleaseChangeThisInProd!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!
    depends_on:
      db:
        condition: service_healthy
    # Optional: If you need to map logs out of the container
    # volumes:
    #   - ./logs:/app/logs

volumes:
  postgres_data:
