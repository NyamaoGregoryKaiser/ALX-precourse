```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: task_manager_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d task_manager_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    restart: always
    ports:
      - "5000:5000"
    environment:
      FLASK_APP: manage.py
      FLASK_ENV: development # Use 'production' for production
      DATABASE_URL: postgresql://user:password@db:5432/task_manager_db
      SECRET_KEY: super-secret-key-replace-in-production
      JWT_SECRET_KEY: super-jwt-secret-key-replace-in-production
      REDIS_URL: redis://redis:6379/0
      SENTRY_DSN: # Add your Sentry DSN here for production logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
    # Use Flask's development server for easier debugging.
    # For production, gunicorn is used (defined in Dockerfile CMD).
    command: sh -c "python manage.py db upgrade && python seed_db.py && flask run --host 0.0.0.0"
    # For production, you'd want to use the gunicorn command from the Dockerfile
    # command: gunicorn -w 4 -b 0.0.0.0:5000 manage:app

volumes:
  db_data:
```