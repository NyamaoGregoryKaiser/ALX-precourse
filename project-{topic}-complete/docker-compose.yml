```yaml
version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Service for Caching and Rate Limiting
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "GET", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_SERVER: db # Use the service name for database host
      REDIS_HOST: redis   # Use the service name for redis host
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app # Mount local app code for development convenience
      - ./alembic:/app/alembic
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -c 'from app.db.init_db import init_db; import asyncio; from app.db.session import AsyncSessionLocal; async def run(): async with AsyncSessionLocal() as db: await init_db(db); await db.close();' && asyncio.run(run())' &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Frontend Service (Example using Nginx to serve a React app)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx default)
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
```