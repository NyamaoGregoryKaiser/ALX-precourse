```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_api_app
    ports:
      - "9080:9080" # Map host port 9080 to container port 9080
    environment:
      # Pass environment variables from host or .env file
      # For production, use Docker secrets or external config management
      - SERVER_PORT=${SERVER_PORT}
      - SERVER_THREADS=${SERVER_THREADS}
      - DB_HOST=db
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_SECONDS=${JWT_EXPIRATION_SECONDS}
      - LOG_LEVEL=${LOG_LEVEL}
      - RATE_LIMIT_ENABLED=${RATE_LIMIT_ENABLED}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS}
    volumes:
      - ./.env:/app/.env # Mount the .env file into the container
    depends_on:
      - db
    networks:
      - task-network

  db:
    image: postgres:15-alpine
    container_name: task_api_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432" # Expose DB port for local access/debugging
    volumes:
      - db_data:/var/lib/postgresql/data # Persist database data
    networks:
      - task-network

networks:
  task-network:
    driver: bridge

volumes:
  db_data:
```