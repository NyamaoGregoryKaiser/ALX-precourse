```yaml
version: '3.8'

services:
  visuflow_db:
    image: postgres:13
    container_name: visuflow_db
    restart: always
    environment:
      POSTGRES_DB: visuflow_db
      POSTGRES_USER: visuflow_user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - visuflow_db_data:/var/lib/postgresql/data
      # Mount seed script to run on first container start (if DB is empty)
      - ./scripts/db/seed.sh:/docker-entrypoint-initdb.d/seed.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U visuflow_user -d visuflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  visuflow_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visuflow_api
    restart: always
    ports:
      - "9080:9080"
    volumes:
      - ./config.json:/app/config.json # Mount config for easy changes without rebuild
      - ./scripts:/app/scripts         # For migration scripts
      - ./logs:/var/log/visuflow       # Persist logs outside container
    environment:
      # Pass database connection details as environment variables (can override config.json)
      DB_HOST: visuflow_db
      DB_PORT: 5432
      DB_NAME: visuflow_db
      DB_USER: visuflow_user
      DB_PASSWORD: password
      # Other variables (e.g., JWT_SECRET) can be passed here
    depends_on:
      visuflow_db:
        condition: service_healthy
    command: sh -c "echo 'Waiting for DB to be fully ready...' && sleep 10 && /usr/local/bin/visuflow_server"

volumes:
  visuflow_db_data:

```