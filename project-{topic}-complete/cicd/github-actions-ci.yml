name: ML Utilities System CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven and Run Tests
        run: |
          cd backend
          mvn clean install -DskipFrontend=true # Assuming frontend is separate or minimal
        # If frontend is part of the build (e.g., Maven frontend plugin), adjust.
        # -DskipTests might be useful for a fast build, but for CI, tests are crucial.

      - name: Generate JaCoCo Coverage Report
        run: |
          cd backend
          mvn jacoco:report
          # Optionally, upload to Codecov or SonarCloud
          # bash <(curl -s https://codecov.io/bash)

      - name: Archive Test Results (JUnit XML)
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: backend/target/surefire-reports/

      - name: Archive JaCoCo Report (HTML)
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/

  # This job will build and push Docker images
  # It will only run on pushes to 'main' branch, after build-and-test succeeds
  build-and-push-docker:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ml-utilities-app:latest, ${{ secrets.DOCKER_USERNAME }}/ml-utilities-app:${{ github.sha }}

  # Example for deployment step (manual or automated)
  # For production, this would involve connecting to a cloud provider (AWS EKS, GCP GKE, Azure AKS)
  # or a self-hosted Kubernetes cluster/VMs.
  deploy:
    needs: build-and-push-docker
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # Define a production environment in GitHub for better security
    steps:
      - name: Deploy to Production (Example)
        run: |
          echo "Deploying application to production environment..."
          # Replace with actual deployment commands, e.g.:
          # - SSH into server and run docker compose pull && docker compose up -d
          # - Update Kubernetes deployment: kubectl set image deployment/ml-utilities-app ml-utilities-app=${{ secrets.DOCKER_USERNAME }}/ml-utilities-app:${{ github.sha }}
          # - Use Ansible, Terraform, etc.
          echo "Deployment initiated for image: ${{ secrets.DOCKER_USERNAME }}/ml-utilities-app:${{ github.sha }}"
```