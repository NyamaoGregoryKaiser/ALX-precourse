```nginx
server {
  listen 80;
  server_name localhost;

  # Root directory for serving static files (your React app)
  root /usr/share/nginx/html;
  index index.html index.htm;

  # Try serving files directly, then fallback to index.html for React Router
  location / {
    try_files $uri $uri/ /index.html;
  }

  # This block is optional if you have a separate API Gateway or service mesh.
  # If Nginx should proxy API requests to the backend service.
  # Be careful with `proxy_pass` to internal Docker service names in production.
  # In production, frontend might call the backend directly or via API Gateway.
  # This setup assumes frontend is served by Nginx and Nginx also proxies API.
  # For local docker-compose, frontend often calls backend directly via hostname/port
  # like `http://backend:5000/api`. This block is more for situations where Nginx
  # acts as a reverse proxy for both frontend and backend on the same port/domain.
  # For this specific docker-compose setup, the frontend makes direct API calls
  # to `http://localhost:5000/api` (host-level) or `http://backend:5000/api` (Docker network).
  # So, this `location /api` block is often NOT used when frontend directly calls backend.
  # Leaving it commented out, as frontend is configured to call backend directly.
  # If you want Nginx to proxy API requests from /api to your backend, uncomment and adjust:
  # location /api/ {
  #   proxy_pass http://backend:5000/api/; # 'backend' is the service name in docker-compose
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  #   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #   proxy_set_header X-Forwarded-Proto $scheme;
  # }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}
```