```yaml
name: CI/CD Pipeline for Chat App

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Lint backend code
        run: npm run lint

      - name: Build backend
        run: npm run build

      - name: Setup PostgreSQL for Tests
        uses: Harmonizer/setup-postgres@v1
        with:
          postgres-version: '15'
          host-port: 5432
          database: chat_app_test
          username: user
          password: password

      - name: Wait for PostgreSQL to be ready
        # Using a simple shell loop to wait for postgres to be ready
        run: |
          for i in `seq 1 10`; do
            nc -z localhost 5432 && echo "PostgreSQL is ready!" && break
            echo "Waiting for PostgreSQL to start..."
            sleep 5
          done

      - name: Setup Prisma for Test Database
        run: |
          npx prisma generate
          # Apply migrations to the test database
          # Ensure DATABASE_URL is set for the test environment
          export DATABASE_URL="postgresql://user:password@localhost:5432/chat_app_test?schema=public"
          npx prisma migrate dev --name init --skip-seed
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/chat_app_test?schema=public"

      - name: Run backend tests
        run: npm test -- --coverage --testPathPattern="src/tests"
        env:
          DATABASE_URL: "postgresql://user:password@localhost:5432/chat_app_test?schema=public"
          # Set a dummy JWT secret for tests
          JWT_SECRET: "test_jwt_secret"
          REDIS_URL: "redis://localhost:6379" # Redis isn't strictly needed for these specific tests but common in .env

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./backend/coverage/

  build-and-test-frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'

      - name: Install dependencies
        run: npm install

      - name: Lint frontend code
        run: npm run lint

      - name: Build frontend
        run: npm run build

      - name: Run frontend tests
        run: npm test -- --watchAll=false --coverage

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-report
          path: ./frontend/coverage/

  # Example of a conceptual deployment job
  # This job will only run if both build-and-test jobs pass and it's a push to 'main'
  # Real deployment steps would be highly dependent on your cloud provider and infrastructure.
  deploy:
    name: Deploy to Production (Conceptual)
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main' && success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Log in to your Docker Registry (e.g., Docker Hub, AWS ECR, GCP GCR)
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v3
