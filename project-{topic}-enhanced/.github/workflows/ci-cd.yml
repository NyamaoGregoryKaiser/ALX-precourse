```yaml
name: Node.js CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        # Create a test .env file for the CI environment
        run: |
          echo "NODE_ENV=test" > .env
          echo "PORT=5000" >> .env
          echo "APP_SECRET=ci_test_app_secret" >> .env
          echo "DB_DIALECT=postgres" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=5433" >> .env # Use a different port to avoid conflict with local setup
          echo "DB_USER=test_user" >> .env
          echo "DB_PASS=test_password" >> .env
          echo "DB_NAME=enterprise_test_db" >> .env
          echo "REDIS_HOST=localhost" >> .env
          echo "REDIS_PORT=6380" >> .env # Use a different port
          echo "JWT_SECRET=ci_test_jwt_secret" >> .env
          echo "JWT_EXPIRES_IN=1h" >> .env
          echo "JWT_REFRESH_SECRET=ci_test_jwt_refresh_secret" >> .env
          echo "JWT_REFRESH_EXPIRES_IN=7d" >> .env
          echo "RATE_LIMIT_WINDOW_MS=1000" >> .env
          echo "RATE_LIMIT_MAX_REQUESTS=10" >> .env
          echo "CLIENT_URL=http://localhost:3000" >> .env
          echo "LOG_LEVEL=error" >> .env
          
          # Start test database and redis
          docker-compose -f docker-compose.test.yml up -d
          
          # Wait for services to be ready
          sleep 10
          
          # Run migrations and seeds for the test database
          npm run db:migrate -- --env test
          npm run db:seed -- --env test

          npm test
          
          # Stop test database and redis
          docker-compose -f docker-compose.test.yml down

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Set CODECOV_TOKEN in GitHub secrets
          files: ./coverage/lcov.info
          fail_ci_if_error: true
          verbose: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' # Deploy only on pushes to main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: your-dockerhub-username/enterprise-security-app:latest
          # Add build arguments if needed, e.g., for secrets not committed to git

      - name: Deploy to Server (e.g., using SSH)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/app/on/server
            docker-compose pull
            docker-compose up -d --build
            docker system prune -f # Clean up old images
```