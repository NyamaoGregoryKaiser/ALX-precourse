name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Docker image
        run: docker build -t database-optimizer-app:latest .

      - name: Run Docker Compose (DB + App)
        run: |
          docker-compose -f docker-compose.yml up -d db
          sleep 10 # Give DB time to start and healthcheck
          docker-compose -f docker-compose.yml up -d app
          sleep 20 # Give app time to start and run migrations/seed
        env:
          DB_USER: ci_user
          DB_PASSWORD: ci_password
          DB_NAME: ci_db
          JWT_SECRET: ci_secret_for_tests_at_least_32_characters_long_abcdefghijk

      - name: Wait for services to be healthy
        timeout-minutes: 5
        run: |
          echo "Waiting for DB service to be healthy..."
          docker-compose -f docker-compose.yml ps db | grep "(healthy)" || (echo "DB not healthy after timeout" && docker-compose -f docker-compose.yml logs db && exit 1)
          echo "DB service is healthy."
          echo "Waiting for App service to be ready (port 8080)..."
          for i in $(seq 1 30); do
            curl -s http://localhost:8080 > /dev/null && break
            echo "App not ready yet, waiting... ($i/30)"
            sleep 2
          done
          curl -s http://localhost:8080 > /dev/null || (echo "App not ready after timeout" && docker-compose -f docker-compose.yml logs app && exit 1)
          echo "App service is ready."

      - name: Run Unit and Integration Tests
        run: |
          docker-compose exec -e DB_CONNECTION_STRING="postgresql://ci_user:ci_password@db:5432/ci_db" app /app/build/tests/DatabaseOptimizerTests
        # The test executable is built to build/tests/DatabaseOptimizerTests by CMakeLists.txt
        # Need to ensure the test runner has access to the DB.
        # This will run the tests *inside* the app container, or you can run them separately on the host.
        # For simplicity, we assume the app container has the test executable and libs.

      - name: Run API Tests (e.g., using curl or a dedicated test framework)
        run: |
          echo "Running API tests..."
          # Example: Try to log in as admin
          TOKEN=$(curl -s -X POST -H "Content-Type: application/json" -d '{"username": "admin", "password": "admin_password_secure"}' http://localhost:8080/api/v1/auth/login | jq -r .token)
          echo "Admin Token: ${TOKEN}"
          if [ -z "$TOKEN" ] || [ "$TOKEN" == "null" ]; then
            echo "Admin login failed in API test!"
            exit 1
          fi

          # Example: Fetch recommendations (requires auth)
          curl -s -H "Authorization: Bearer ${TOKEN}" http://localhost:8080/api/v1/recommendations | jq .
          # Add more curl commands for other API endpoints
        env:
          # Use values from the .env.example or hardcode for CI
          JWT_SECRET: ci_secret_for_tests_at_least_32_characters_long_abcdefghijk

      - name: Stop Docker Compose
        if: always()
        run: docker-compose -f docker-compose.yml down

  # Deploy job (optional, for main branch)
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: production # Use GitHub Environments for production secrets

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build and push Docker image to registry (e.g., Docker Hub, GHCR)
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: yourusername/database-optimizer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Kubernetes / EC2 / other (using SSH, kubectl, etc.)
        run: |
          # Example for Kubernetes:
          # kubectl config use-context your-k8s-cluster
          # kubectl set image deployment/database-optimizer-deployment database-optimizer=yourusername/database-optimizer:latest -n your-namespace
          echo "Deployment to production environment complete."
        # This step would typically involve more secure methods like
        # SSH into a server and pulling/running new images,
        # or updating a Kubernetes manifest.
```