```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm install
        working-directory: backend

      - name: Lint backend
        run: npm run lint
        working-directory: backend

      - name: Run backend unit tests
        run: npm test -- --coverage --coverageReporters=lcov --coverageReporters=text-summary
        working-directory: backend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          fail_ci_if_error: true # Keep PR status red if coverage decreases
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }} # Required for private repos

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install
        working-directory: frontend

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Run frontend unit tests
        run: npm test -- --coverage --watchAll=false
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_API_BASE_URL: /api/v1 # This will be proxied by Nginx

  # This job depends on both backend and frontend tests passing
  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile # Refers to backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cms-backend:latest
          build-args:
            # Pass any build args if needed by Dockerfile (e.g., specific Node version)

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile # Refers to frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/cms-frontend:latest
          build-args:
            REACT_APP_API_BASE_URL: /api/v1 # Ensure this matches Nginx proxy path

      - name: Deploy to Server (e.g., via SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/cms-project # Adjust path on your server
            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker system prune -f # Clean up unused Docker objects
```