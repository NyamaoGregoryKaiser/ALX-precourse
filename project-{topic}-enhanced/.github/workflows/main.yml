```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and run tests
        run: mvn clean install

      - name: Upload JaCoCo test report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          retention-days: 5

      - name: SonarCloud Scan (Optional, requires SonarCloud setup)
        # Uncomment and configure if you have a SonarCloud project
        # uses: SonarSource/sonarcloud-github-action@master
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        #   SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: echo "Skipping SonarCloud scan. Configure secrets.SONAR_TOKEN to enable."

  docker-build-and-push:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' # Only build/push on main/develop
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ml-utilities-system:latest
            ${{ secrets.DOCKER_USERNAME }}/ml-utilities-system:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # This is a placeholder for a real deployment step (e.g., to a cloud provider)
    steps:
      - name: Deploy to Staging/Production (Placeholder)
        run: |
          echo "Simulating deployment to production environment..."
          echo "Image ${{ secrets.DOCKER_USERNAME }}/ml-utilities-system:latest would be deployed here."
          # Add actual deployment commands (e.g., kubectl apply, ansible playbook, AWS CodeDeploy, etc.)
          # Example: ssh user@your-server "docker pull ${{ secrets.DOCKER_USERNAME }}/ml-utilities-system:latest && docker-compose -f /path/to/docker-compose.yml up -d"
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
```