name: Java CI/CD with Maven and Docker

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      DB_NAME: test_ml_util_db
      DB_USER: testuser
      DB_PASSWORD: testpassword
      JWT_SECRET: testsecretkey
      JWT_EXPIRATION_MS: 3600000 # 1 hour for tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Docker Compose
        run: |
          docker-compose -v # Verify docker-compose is installed
          docker -v # Verify docker is installed

      - name: Start PostgreSQL container for integration tests
        run: docker-compose -f docker-compose.yml up -d db

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in `seq 1 10`; do
            docker exec ml-utilities-postgres pg_isready -U testuser -d test_ml_util_db && break
            echo "Waiting for PostgreSQL..."
            sleep 5
          done
          docker exec ml-utilities-postgres pg_isready -U testuser -d test_ml_util_db || (echo "PostgreSQL did not start correctly" && exit 1)

      - name: Build with Maven and Run Tests (Unit & Integration)
        run: mvn -B package --file pom.xml
        env:
          SPRING_PROFILES_ACTIVE: test # Activate the test profile for in-memory H2, or remove to use Testcontainers for specific DB integration tests

      - name: Generate JaCoCo report
        run: mvn jacoco:report
      
      - name: Upload JaCoCo report to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Set CODECOV_TOKEN in GitHub secrets
          files: target/site/jacoco/jacoco.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true

      - name: Stop PostgreSQL container
        if: always()
        run: docker-compose -f docker-compose.yml down

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy on push to main branch
    environment: production # Reference a GitHub Environment for production credentials
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ml-utilities-system:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # This is a conceptual deployment step.
      # In a real scenario, you would deploy to a cloud provider (AWS EKS, GCP GKE, Azure AKS)
      # or a VM with Docker. This example uses SSH to restart a service.
      - name: Deploy to Production Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            echo "Pulling latest Docker image and restarting service..."
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker pull ${{ secrets.DOCKER_USERNAME }}/ml-utilities-system:latest
            docker stop ml-utilities-app || true # Stop if running
            docker rm ml-utilities-app || true   # Remove if exists
            docker-compose -f /path/to/your/docker-compose.yml up -d --build --force-recreate app db # Or specify your actual compose file on the server
            echo "Deployment complete."