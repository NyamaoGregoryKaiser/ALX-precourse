```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint code
        run: npm run lint

      - name: Build application
        run: npm run build

      - name: Set up test database (PostgreSQL)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "CREATE USER testuser WITH PASSWORD 'testpassword';"
          sudo -u postgres psql -c "CREATE DATABASE task_management_db_test WITH OWNER testuser;"
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: "" # No password for sudo -u postgres access

      - name: Run database migrations for tests
        run: |
          npm run typeorm migration:run
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: testuser
          DATABASE_PASSWORD: testpassword
          DATABASE_NAME: task_management_db_test
          # Ensure DATABASE_SYNCHRONIZE is false for migrations
          DATABASE_SYNCHRONIZE: false

      - name: Run tests with coverage
        run: npm run test:cov
        env:
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          DATABASE_USERNAME: testuser
          DATABASE_PASSWORD: testpassword
          DATABASE_NAME: task_management_db_test
          JWT_SECRET: ci_secret_key # Provide a secret for JWT
          REDIS_HOST: localhost # Mocked or not used in current tests
          REDIS_PORT: 6379 # Mocked or not used in current tests
          # Important: Set DATABASE_SYNCHRONIZE to false in CI for tests if using migrations
          DATABASE_SYNCHRONIZE: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: coverage/
```