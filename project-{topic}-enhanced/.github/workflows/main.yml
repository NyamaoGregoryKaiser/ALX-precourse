```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip' # Cache pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install alembic # Ensure alembic is available for migrations setup

    - name: Set up Docker Compose (for DB & Redis)
      run: |
        docker-compose -f docker-compose.yml up -d db redis
        echo "Waiting for PostgreSQL to be ready..."
        # Wait for PostgreSQL to be ready
        until docker exec finances_tracker_db_1 pg_isready -U user -h localhost; do
          echo "PostgreSQL is unavailable - sleeping"
          sleep 2
        done
        echo "PostgreSQL is up and running."

      env:
        # Use .env.example values for CI
        POSTGRES_USER: user
        POSTGRES_PASSWORD: password
        POSTGRES_DB: finances_db
        REDIS_HOST: redis
        REDIS_PORT: 6379

    - name: Run Alembic Migrations
      run: |
        alembic upgrade head
      env:
        # Use database URL that targets the running Docker container
        DATABASE_URL: postgresql+asyncpg://user:password@localhost:5432/finances_db
        # Set TESTING to True for alembic env.py to potentially use a test DB URL
        # although here we explicitly provide it.
        TESTING: "True" # Used by config to generate test_db_url
        POSTGRES_SERVER: localhost # Override server to point to docker-compose db
        POSTGRES_USER: user
        POSTGRES_PASSWORD: password
        POSTGRES_DB: finances_db # Use the same DB for migrations initially
        # For tests, we'll use a `test_finances_db`

    - name: Run tests with pytest and coverage
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing
      env:
        # Provide test specific environment variables
        SECRET_KEY: ${{ secrets.SECRET_KEY || 'test_secret_key_for_ci_only_dont_use_in_prod' }}
        POSTGRES_SERVER: localhost # Points to the local docker-compose db
        POSTGRES_USER: user
        POSTGRES_PASSWORD: password
        POSTGRES_DB: finances_db # Base DB name
        REDIS_HOST: localhost # Points to the local docker-compose redis
        REDIS_PORT: 6379
        ENVIRONMENT: "testing" # Activates TEST_DATABASE_URL logic
        TESTING: "True" # Explicitly enable testing mode

    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage.xml
        fail_ci_if_error: true # Optional: fail CI if Codecov upload fails

    - name: Clean up Docker containers
      if: always() # Run even if previous steps fail
      run: docker-compose -f docker-compose.yml down

  deploy:
    name: Deploy to Production
    needs: build-and-test # Only deploy if tests pass
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/finance-tracker-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/finance-tracker-backend:${{ github.sha }}

    - name: Deploy to Server (e.g., via SSH or Kubernetes)
      # This step would typically involve:
      # - SSH into your server
      # - Pulling the new Docker image
      # - Restarting your Docker container/service (e.g., using `docker-compose pull && docker-compose up -d`)
      # - Running database migrations on the production DB
      # Example for SSH:
      # uses: appleboy/ssh-action@master
      # with:
      #   host: ${{ secrets.DEPLOY_HOST }}
      #   username: ${{ secrets.DEPLOY_USER }}
      #   key: ${{ secrets.DEPLOY_KEY }}
      #   script: |
      #     cd /path/to/your/app
      #     docker-compose pull app
      #     docker-compose stop app
      #     docker-compose rm -f app
      #     docker-compose up -d app
      #     # Run migrations separately on production DB if not handled by entrypoint
      #     docker-compose exec app alembic upgrade head
      run: echo "Deployment script would go here (e.g., SSH to server, pull image, restart service, run migrations)"

```