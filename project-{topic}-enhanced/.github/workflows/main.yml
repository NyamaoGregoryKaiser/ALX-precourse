```yaml
name: CMS CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Set up PostgreSQL for tests
        run: |
          docker run --name test-db -e POSTGRES_DB=cms_test_db -e POSTGRES_USER=test_user -e POSTGRES_PASSWORD=test_password -p 5433:5432 -d postgres:14-alpine
          sleep 10 # Give PostgreSQL time to start

      - name: Run backend migrations
        run: DATABASE_URL=postgres://test_user:test_password@localhost:5433/cms_test_db npm run db:migrate
        working-directory: ./backend

      - name: Run backend tests
        run: DATABASE_URL=postgres://test_user:test_password@localhost:5433/cms_test_db npm test
        working-directory: ./backend

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test -- --watchAll=false # --watchAll=false for CI environments
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

