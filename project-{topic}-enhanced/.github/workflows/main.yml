name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install dependencies for build (CMake, libcurl, libpq, libhiredis, libgumbo, etc.)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential libcurl4-openssl-dev libpq-dev libhiredis-dev libgumbo-dev libcryptopp-dev git

    - name: Install Crow (example - as submodule, otherwise assume system install)
      run: |
        # If Crow is managed as a submodule, initialize it:
        # git submodule update --init --recursive
        # For this example, we assume it's directly available or installed system-wide.
        # If not, you might need to clone/install:
        # sudo git clone https://github.com/ipkn/crow.git /usr/local/include/Crow # Example path

    - name: Install SOCI (with PostgreSQL backend)
      run: |
        git clone https://github.com/SOCI/soci.git /tmp/soci_src
        mkdir -p /tmp/soci_src/build
        cd /tmp/soci_src/build
        cmake .. -DSOCI_POSTGRESQL=ON -DSOCI_TESTS=OFF -DSOCI_STATIC=OFF -DCMAKE_INSTALL_PREFIX=/usr/local
        sudo make install

    - name: Install jwt-cpp
      run: |
        git clone https://github.com/Thalhammer/jwt-cpp.git /tmp/jwt_cpp_src
        mkdir -p /tmp/jwt_cpp_src/build
        cd /tmp/jwt_cpp_src/build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        sudo make install

    - name: Install spdlog
      run: |
        git clone https://github.com/gabime/spdlog.git /tmp/spdlog_src
        mkdir -p /tmp/spdlog_src/build
        cd /tmp/spdlog_src/build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        sudo make install

    - name: Install curlpp
      run: |
        git clone https://github.com/jpbarrette/curlpp.git /tmp/curlpp_src
        mkdir -p /tmp/curlpp_src/build
        cd /tmp/curlpp_src/build
        cmake .. -DCMAKE_INSTALL_PREFIX=/usr/local
        sudo make install

    - name: Configure CMake
      run: cmake -B build -S .

    - name: Build C++ application
      run: cmake --build build -j$(nproc)

    - name: Run Unit and Integration Tests
      run: |
        cd build
        # Assuming test executable is built in build/tests/
        ./tests/webscraper_tests --gtest_output=xml:test_results.xml
        # Check if tests pass, fail job if not
        if [ $? -ne 0 ]; then
          echo "Unit and Integration Tests Failed!"
          exit 1
        fi
        echo "Unit and Integration Tests Passed!"
    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: build/test_results.xml

  docker_build_and_push:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/webscraper-cpp:latest
        platforms: linux/amd64 # Specify platform if needed

  deploy:
    needs: docker_build_and_push
    runs-on: ubuntu-latest
    environment: production # Use GitHub environments for secrets/variables
    steps:
    - name: SSH into production server and deploy (example)
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.PROD_SSH_HOST }}
        username: ${{ secrets.PROD_SSH_USER }}
        key: ${{ secrets.PROD_SSH_KEY }}
        script: |
          echo "Deploying latest Docker image..."
          # Pull latest image
          docker pull ${{ secrets.DOCKER_USERNAME }}/webscraper-cpp:latest
          # Stop and remove old containers
          docker-compose -f /path/to/docker-compose.yml down
          # Start new containers
          docker-compose -f /path/to/docker-compose.yml up -d
          echo "Deployment complete."