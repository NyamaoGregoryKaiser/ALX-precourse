```yaml
name: CI/CD Pipeline for Task Manager Backend

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests # Build the project, skip tests for faster build

      - name: Run Unit and Integration Tests
        run: mvn test

      - name: Generate JaCoCo Coverage Report
        run: mvn jacoco:report

      - name: Upload JaCoCo Report to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Secret for Codecov integration
          fail_ci_if_error: true
          verbose: true

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: task-manager-backend-jar
          path: target/*.jar

  docker-build-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only push Docker image on main branch merges

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: task-manager-backend-jar
          path: target/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/task-manager-backend:latest
          build-args: |
            JAR_FILE=target/task-manager-backend-0.0.1-SNAPSHOT.jar # Adjust if your JAR name changes

  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only deploy on main branch merges

    steps:
      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # Navigate to your application directory on the server
            cd /path/to/your/app
            # Pull the latest Docker image
            docker pull ${{ secrets.DOCKER_USERNAME }}/task-manager-backend:latest
            # Stop and remove existing containers
            docker-compose down
            # Start new containers with the latest image
            docker-compose up -d
            echo "Deployment successful!"
```