```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_payment_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: password
        ports:
          - 5433:5432 # Map to a different port for tests
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        env:
          REDIS_PASSWORD: your_redis_password_here # Match with your .env.example
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli -a $$REDIS_PASSWORD ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install alembic # Alembic is needed for migrations

    - name: Wait for PostgreSQL and Redis to be ready
      run: |
        echo "Waiting for PostgreSQL..."
        for i in `seq 1 10`; do
          pg_isready -h localhost -p 5433 -U admin && break
          echo "PostgreSQL not ready, sleeping..."
          sleep 5
        done
        echo "PostgreSQL is ready."

        echo "Waiting for Redis..."
        for i in `seq 1 10`; do
          redis-cli -h localhost -p 6379 -a "your_redis_password_here" ping && break
          echo "Redis not ready, sleeping..."
          sleep 5
        done
        echo "Redis is ready."

    - name: Run Alembic Migrations
      env:
        DATABASE_URL: postgresql+asyncpg://admin:password@localhost:5433/test_payment_db
        REDIS_PASSWORD: your_redis_password_here
      run: |
        alembic upgrade head

    - name: Run Tests (Unit, Integration, API)
      env:
        DATABASE_URL: postgresql+asyncpg://admin:password@localhost:5433/test_payment_db
        SECRET_KEY: test-secret-key # Use a dummy key for tests
        REDIS_HOST: localhost
        REDIS_PORT: 6379
        REDIS_PASSWORD: your_redis_password_here
        # Set other necessary .env variables for tests, e.g., mock gateway URL if applicable
      run: |
        pytest --cov=app --cov-report=xml tests/

    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: true
```