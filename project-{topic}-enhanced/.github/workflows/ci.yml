```yaml
name: CI/CD Pipeline for DataVizSystem

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    name: Build & Test C++ Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install dependencies (C++ backend)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libboost-all-dev libpq-dev libpqxx-dev libssl-dev libargon2-dev
          # Install vcpkg for other dependencies if not system-installed
          # For a real project, consider using vcpkg/conan for C++ dependency management
          # For this demo, we assume libraries like crow, nlohmann-json, spdlog, jwt-cpp are found via CMake directly
          # (e.g., installed via system package manager or symlinked to /usr/local)
          # Alternatively, clone and build them:
          # git clone https://github.com/nlohmann/json.git /tmp/json && sudo cp /tmp/json/single_include/nlohmann/json.hpp /usr/local/include/nlohmann/json.hpp
          # git clone https://github.com/CrowCpp/Crow.git /tmp/Crow && cd /tmp/Crow && cmake . && sudo cmake --build . --target install
          # etc. This is simplified for CI example.

      - name: Configure CMake
        run: cmake -B build -S backend

      - name: Build C++ Backend
        run: cmake --build build -j$(nproc)

      - name: Run C++ Tests
        run: |
          cd build
          ./run_tests # Execute the test binary generated by CMake

      - name: Generate Coverage Report (Optional, requires gcovr/lcov)
        run: |
          # Requires: sudo apt-get install lcov gcovr
          # cmake -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="-fprofile-arcs -ftest-coverage" -DCMAKE_EXE_LINKER_FLAGS="-fprofile-arcs -ftest-coverage" -B build -S backend
          # cmake --build build
          # ./build/run_tests
          # gcovr -r backend --html --html-details -o coverage.html
          echo "Coverage generation skipped for brevity. Uncomment and install gcovr/lcov for full coverage report."
        # - name: Upload Coverage Report
        #   uses: actions/upload-artifact@v3
        #   with:
        #     name: cpp-coverage-report
        #     path: build/coverage.html

  build-and-test-frontend:
    name: Build & Test React Frontend
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies (Frontend)
        run: npm ci

      - name: Run Frontend Tests
        run: npm test -- --watchAll=false # Run tests once without watch mode

      - name: Build React App
        run: npm run build

      - name: Upload Frontend Build Artifact
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

  docker-build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend] # Only run if backend and frontend tests pass
    if: github.ref == 'refs/heads/main' # Only push images from main branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dataviz-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/dataviz-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # deploy-to-production:
