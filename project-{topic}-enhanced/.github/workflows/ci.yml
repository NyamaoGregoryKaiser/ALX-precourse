name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5433:5432 # Use a different port to avoid conflicts
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379 # Use a different port
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in `seq 1 10`; do
            nc -z localhost 5433 && break
            echo -n "."
            sleep 1
          done
          echo "PostgreSQL is ready!"
          echo "Waiting for Redis..."
          for i in `seq 1 10`; do
            nc -z localhost 6380 && break
            echo -n "."
            sleep 1
          done
          echo "Redis is ready!"
        
      - name: Run backend migrations
        run: npm run typeorm migration:run -d src/config/data-source.ts
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          JWT_SECRET: testsecret
          REDIS_HOST: localhost
          REDIS_PORT: 6380

      - name: Run backend tests
        run: npm test
        working-directory: ./backend
        env:
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USERNAME: test_user
          DB_PASSWORD: test_password
          DB_DATABASE: test_db
          JWT_SECRET: testsecret
          REDIS_HOST: localhost
          REDIS_PORT: 6380
          # Ensure test environment config overrides any .env in the folder

      - name: Upload backend coverage report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage/lcov.info

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test -- --watchAll=false
        working-directory: ./frontend
        env:
          CI: true # Required for some CI environments with create-react-app to prevent interactive watch mode

      - name: Upload frontend coverage report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: frontend/coverage/lcov.info

  build-and-push-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test] # Only run if tests pass
    if: github.ref == 'refs/heads/main' # Only push on main branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/task-management-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/task-management-frontend:latest
          build-args: |
            REACT_APP_API_BASE_URL=http://localhost:5000/api/v1 # Or your actual production backend URL
```

---

### 6. Testing & Quality

#### Backend Tests (`backend/tests`)

*   **Unit Tests:** Focus on services and utilities.
*   **Integration Tests:** Test controllers interacting with services and the database.
*   **API Tests:** Use Supertest to make actual HTTP requests to the Express app.

