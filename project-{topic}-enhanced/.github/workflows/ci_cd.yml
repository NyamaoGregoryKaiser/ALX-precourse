name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libboost-all-dev libpqxx-dev pkg-config git libssl-dev ca-certificates

      - name: Clone nlohmann/json
        run: git clone https://github.com/nlohmann/json.git backend/third_party/nlohmann_json

      - name: Clone Catch2
        run: git clone https://github.com/catchorg/Catch2.git backend/third_party/Catch2

      - name: Configure CMake
        run: cmake -S backend -B backend/build -DCMAKE_BUILD_TYPE=Release

      - name: Build Application
        run: cmake --build backend/build -j $(nproc)

      - name: Run Unit/Integration Tests
        run: ./backend/build/tests/DataVizToolTests # Assuming this executable runs all tests
        # The test executable path needs to be correct after build

  docker_build_and_scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/dataviztool:latest
            ${{ secrets.DOCKER_USERNAME }}/dataviztool:${{ github.sha }}

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKER_USERNAME }}/dataviztool:latest
          format: 'table'
          exit-code: '1' # Fail the build if any vulnerabilities are found
          severity: 'HIGH,CRITICAL'

  deploy:
    runs-on: ubuntu-latest
    needs: docker_build_and_scan
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    environment: production # Use GitHub Environments for secrets management
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Server (e.g., using SSH and Docker Compose)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/deployment
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login --username ${{ secrets.DOCKER_USERNAME }} --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f # Clean up old images