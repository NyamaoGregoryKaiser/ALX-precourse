```yaml
name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**' # Trigger only if changes are in the backend directory
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-test:
    name: Build, Lint, Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json' # Cache dependencies specific to backend

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Lint TypeScript code
        working-directory: ./backend
        run: npm run lint

      - name: Build TypeScript (transpile to JS)
        working-directory: ./backend
        run: npm run build

      - name: Run unit and integration tests
        working-directory: ./backend
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always() # Upload even if tests fail
        with:
          name: backend-coverage-report
          path: backend/coverage

  docker-build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test # Only run if build and tests pass
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' # Only push on main/develop branches

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        id: docker_build_backend
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-devops-backend:latest
          cache-from: type=gha,scope=backend-build
          cache-to: type=gha,mode=max,scope=backend-build

      - name: Verify pushed image
        run: echo "Image ${{ secrets.DOCKER_USERNAME }}/my-devops-backend:latest pushed successfully."
```