```yaml
name: Frontend CI Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**' # Trigger only if changes are in the frontend directory
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  workflow_dispatch: # Allows manual trigger

jobs:
  build-and-test:
    name: Build, Lint, Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json' # Cache dependencies specific to frontend

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Lint TypeScript/React code
        working-directory: ./frontend
        run: npm run lint

      - name: Build React app
        working-directory: ./frontend
        run: npm run build
        env:
          # This should match the API URL in your production environment
          # For CI, you might point to a mock API or a staging API
          # For Docker build later, this value will be passed via ARG
          REACT_APP_API_BASE_URL: http://localhost:5000/api # Placeholder for CI build

      - name: Run unit tests
        working-directory: ./frontend
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always() # Upload even if tests fail
        with:
          name: frontend-coverage-report
          path: frontend/coverage

  docker-build-and-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    needs: build-and-test # Only run if build and tests pass
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push frontend Docker image
        id: docker_build_frontend
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/my-devops-frontend:latest
          build-args: |
            REACT_APP_API_BASE_URL=http://your-production-backend-url.com/api # Replace with actual prod URL
          cache-from: type=gha,scope=frontend-build
          cache-to: type=gha,mode=max,scope=frontend-build

      - name: Verify pushed image
        run: echo "Image ${{ secrets.DOCKER_USERNAME }}/my-devops-frontend:latest pushed successfully."
```