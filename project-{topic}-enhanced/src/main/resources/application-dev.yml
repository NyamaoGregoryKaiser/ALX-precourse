```yaml
spring:
  jpa:
    hibernate:
      ddl-auto: update # Automatically update schema in development
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
    url: jdbc:h2:mem:taskmgrdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: false # Disable Flyway for H2 in-memory, let Spring Data JPA handle schema (or enable for H2 file-based)

logging:
  level:
    root: DEBUG
```