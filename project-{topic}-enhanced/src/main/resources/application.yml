```yaml
spring:
  application:
    name: task-manager-backend
  profiles:
    active: dev # Default profile
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:taskmgrdb}
    username: ${DB_USERNAME:taskmgruser}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Use validate with Flyway in production, update for dev or create for testing
    show-sql: false # Set to true for debugging SQL queries
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false # Prevents lazy loading issues in views, manage sessions explicitly in services

  flyway:
    enabled: true
    baseline-on-migrate: true # Good for existing databases, but use carefully. Remove for fresh prod.
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # This is for internal JWT validation if Spring Security were to validate external JWTs
          # For our custom JWT, we use a custom filter.
          jwk-set-uri: "not-used-for-custom-jwt"

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

app:
  jwtSecret: ${JWT_SECRET:supersecretjwtkeythatismorethan256bitlongandsecureforalxtaskmanager} # IMPORTANT: Use a strong, long, random secret in production
  jwtExpirationMs: 86400000 # 24 hours in milliseconds

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.alx.taskmgr: DEBUG # Set to DEBUG for more detailed application logs
    org.hibernate.SQL: INFO # Log executed SQL statements
    org.hibernate.orm.jdbc.bind: TRACE # Log parameters of SQL statements

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

# Cache configuration
spring:
  cache:
    type: ehcache
    jcache:
      config: classpath:ehcache.xml

```