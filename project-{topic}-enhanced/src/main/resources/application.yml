spring:
  application:
    name: ml-utilities-system
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ml_util_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Should be validate in production, update for dev
    properties:
      hibernate.jdbc.lob.non_contextual_creation: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false # Set to true for debugging
    generate-ddl: false # False in production with Flyway
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: caffeine # Enable Caffeine as caching provider

server:
  port: 8080

ml_utilities_system:
  app:
    jwtSecret: ${JWT_SECRET:supersecretkeythatisatleast256bitlongforproductionenvironment} # Change this in production
    jwtExpirationMs: ${JWT_EXPIRATION_MS:86400000} # 24 hours in milliseconds

# Logging configuration (refer to logback-spring.xml)
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG # To see incoming requests
    org.hibernate.SQL: INFO # To see generated SQL
    org.flywaydb: INFO

# Springdoc OpenAPI (Swagger UI) configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true

--- # Test profile specific configuration
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL # In-memory H2 database for tests
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop # For tests, drop and recreate schema
    show-sql: false
  flyway:
    enabled: false # Disable Flyway for H2 tests, let JPA create schema
ml_utilities_system:
  app:
    jwtSecret: testSecret # Short secret for tests
    jwtExpirationMs: 3600000 # 1 hour for tests