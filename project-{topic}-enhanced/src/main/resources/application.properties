```properties
# Spring Boot Application Properties

# Server Configuration
server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/pms_db
spring.datasource.username=pms_user
spring.datasource.password=pms_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none # Flyway handles schema, set to 'none' or 'validate' in production
spring.jpa.open-in-view=false # Disable Open Session in View for better performance
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Database Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true # Allows existing databases to be versioned
spring.flyway.locations=classpath:db/migration

# Logging Configuration
logging.level.root=INFO
logging.level.com.alx.pms=DEBUG # Detailed logging for our application
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) %cyan(%logger{36}) - %msg%n
# For production, consider using JSON logging with Logback configuration

# Security Configuration (JWT)
application.security.jwt.secret-key=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # A strong base64 encoded secret key (use a generated one in prod)
application.security.jwt.expiration=3600000 # 1 hour (in milliseconds)
application.security.jwt.refresh-token.expiration=604800000 # 7 days (optional, for refresh tokens)

# Caching Configuration (Caffeine)
spring.cache.type=caffeine
spring.cache.cache-names=users,projects,tasks # Define cache names

# Springdoc OpenAPI (Swagger UI) Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.groups.enabled=true
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json

# Actuator Endpoints (Monitoring)
management.endpoints.web.exposure.include=* # Expose all actuator endpoints via web
management.endpoint.health.show-details=always # Show health details to authenticated users
```