```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment_processor_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - redis
    # For development, use the command below (comment out gunicorn in Dockerfile)
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    # For production, use the gunicorn command from Dockerfile

  db:
    image: postgres:15-alpine
    container_name: payment_processor_db
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payment_processor_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass your_redis_password_here # IMPORTANT: Use a strong password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "your_redis_password_here", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Optional: A mock external payment gateway
  mock-gateway:
    build:
      context: ./mock_gateway # Assuming you have a mock_gateway folder with its Dockerfile/app
    container_name: mock_payment_gateway
    ports:
      - "8001:8001"
    env_file:
      - .env # Can share some settings or have its own
    # Example command for a simple Python mock gateway app:
    command: python -m uvicorn mock_gateway.main:app --host 0.0.0.0 --port 8001

volumes:
  db_data:
  redis_data:

