version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      # Use the .env file for secrets and specific config in production
      # For development, you might uncomment FLASK_ENV=development and other overrides
      FLASK_CONFIG_TYPE: development # Or 'production' for deployment
      FLASK_ENV: development # This enables debug mode in Flask. Use 'production' for live deployment.
      SECRET_KEY: ${SECRET_KEY}
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI}
      REDIS_URL: ${REDIS_URL}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      FLASK_API_URL: http://localhost:5000/api # Frontend routes directly call the backend
    depends_on:
      - db
      - redis
    # Command to run development server (replaces CMD in Dockerfile for dev)
    # entrypoint: ["flask", "run", "--host=0.0.0.0"]
    # For Gunicorn in production (or to test production setup locally):
    command: gunicorn -w 4 -b 0.0.0.0:5000 manage:app

  db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_DB: ecommerce_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Optional: expose for direct connection to host

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379" # Optional: expose for direct connection to host
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: