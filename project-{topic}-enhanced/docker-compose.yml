```yaml
version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: scraping_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-scraping_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-scraping_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scraping_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      DB_HOST: db # Use the service name for inter-container communication
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-scraping_db}
      DB_SSL: ${DB_SSL:-false}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-1h}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-7d}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-3600}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    # Uncomment to mount .env file for local development.
    # For production, it's better to pass environment variables directly.
    volumes:
      - .:/app
      - /app/node_modules # Prevents host node_modules from overriding container's
    command: ["npm", "run", "dev"] # Use 'npm start' for production

volumes:
  postgres_data:
```