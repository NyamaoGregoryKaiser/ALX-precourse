version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: task_db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-task_db}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: task_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: task_backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: ${DB_DATABASE:-task_db}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkey}
      JWT_EXPIRES_IN: 1h
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: info
      CORS_ORIGINS: http://localhost:3000,http://localhost:80
      CACHE_STORE: redis
      CACHE_TTL: 60 # seconds
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    # Optional: Command to run migrations and seeds on startup (for demo/development)
    # In production, migrations should be run as a separate step.
    command: sh -c "sleep 10 && npm run migration:run && npm run seed && npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: task_frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # This targets the backend service
    ports:
      - "3000:80" # Map host port 3000 to container's NGINX port 80
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pg_data:
```

