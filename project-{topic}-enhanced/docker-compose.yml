```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise-app
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      APP_SECRET: your_super_secret_app_key_for_jwt_signing_docker # Change this!
      JWT_SECRET: your_jwt_secret_key_change_me_docker # Change this!
      JWT_EXPIRES_IN: 1d
      JWT_REFRESH_SECRET: your_jwt_refresh_secret_key_change_me_docker # Change this!
      JWT_REFRESH_EXPIRES_IN: 7d
      DB_DIALECT: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: your_db_user # Change this!
      DB_PASS: your_db_password # Change this!
      DB_NAME: enterprise_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "" # No password for local redis, add if needed
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      CLIENT_URL: http://localhost:3000
      LOG_LEVEL: info
    depends_on:
      - db
      - redis
    networks:
      - enterprise-network

  db:
    image: postgres:15-alpine
    container_name: enterprise-db
    restart: always
    environment:
      POSTGRES_USER: your_db_user # Change this!
      POSTGRES_PASSWORD: your_db_password # Change this!
      POSTGRES_DB: enterprise_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - enterprise-network

  redis:
    image: redis:7-alpine
    container_name: enterprise-redis
    restart: always
    ports:
      - "6379:6379"
    # If you need authentication for Redis:
    # command: redis-server --requirepass your_redis_password
    networks:
      - enterprise-network

networks:
  enterprise-network:
    driver: bridge

volumes:
  postgres_data:
```