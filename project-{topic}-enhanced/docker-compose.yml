```yaml
version: '3.8'

services:
  task_management_db:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      POSTGRES_DB: ${DATABASE_NAME:-task_management_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-postgres} -d ${DATABASE_NAME:-task_management_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  task_management_redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  task-management-backend-app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      # Override DATABASE_HOST and REDIS_HOST to use service names within Docker network
      DATABASE_HOST: task_management_db
      REDIS_HOST: task_management_redis
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      task_management_db:
        condition: service_healthy
      task_management_redis:
        condition: service_healthy
    volumes:
      - .:/app # Mount current directory into container for live reload in dev
      - /app/node_modules # Exclude node_modules from host mount to prevent issues
    # Uncomment the following lines for live-reloading development within Docker
    # command: ["npm", "run", "start:dev"] # Use this for local development with live reload
    # environment:
    #   NODE_ENV: development

volumes:
  postgres_data:
  redis_data:
```