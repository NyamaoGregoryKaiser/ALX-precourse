```yaml
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: pms-db
    restart: always
    environment:
      POSTGRES_DB: pms_db
      POSTGRES_USER: pms_user
      POSTGRES_PASSWORD: pms_password
    ports:
      - "5432:5432"
    volumes:
      - pms-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pms_user -d pms_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pms-app
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Inject database connection details as environment variables
      # These will override the values in application.properties
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/pms_db
      SPRING_DATASOURCE_USERNAME: pms_user
      SPRING_DATASOURCE_PASSWORD: pms_password
      # JWT Secret (ensure it's kept secure in production, e.g., via Docker secrets)
      APPLICATION_SECURITY_JWT_SECRET_KEY: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      # Use an explicit logging file path that works inside the container
      LOGGING_FILE_PATH: /app/logs
    depends_on:
      db:
        condition: service_healthy # Wait for the database to be healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s # Give the app more time to start up

volumes:
  pms-data:
```