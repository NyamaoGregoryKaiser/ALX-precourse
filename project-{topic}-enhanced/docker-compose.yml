```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Application environment variables (these override application.yml)
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db # Refers to the PostgreSQL service name within the Docker network
      DB_PORT: 5432
      DB_NAME: taskmgrdb
      DB_USERNAME: taskmgruser
      DB_PASSWORD: password # IMPORTANT: Use a strong password and environment variables in production
      JWT_SECRET: supersecretjwtkeythatismorethan256bitlongandsecureforalxtaskmanager
    depends_on:
      - db
    # Set restart policy to ensure services come back up if they crash
    restart: unless-stopped
    networks:
      - task-manager-network

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432" # Expose DB port for local development/admin tools, remove in production if not needed
    environment:
      POSTGRES_DB: taskmgrdb
      POSTGRES_USER: taskmgruser
      POSTGRES_PASSWORD: password # IMPORTANT: Use a strong password and environment variables in production
    volumes:
      - db_data:/var/lib/postgresql/data # Persistent storage for PostgreSQL data
    restart: unless-stopped
    networks:
      - task-manager-network

networks:
  task-manager-network:
    driver: bridge

volumes:
  db_data:
```