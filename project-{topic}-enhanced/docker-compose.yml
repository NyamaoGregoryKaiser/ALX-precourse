version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: task_db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-task_db}
      POSTGRES_USER: ${DB_USERNAME:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-user} -d ${DB_DATABASE:-task_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: task_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      DB_HOST: db # Service name within docker-compose network
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_DATABASE: ${DB_DATABASE:-task_db}
      DB_SYNC: false
      JWT_SECRET: ${JWT_SECRET:-your_super_secret_jwt_key_here_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      REDIS_HOST: redis # Service name within docker-compose network
      REDIS_PORT: 6379
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
    ports:
      - "${PORT:-5000}:${PORT:-5000}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src/backend:/app/src/backend # Mount for development with nodemon
      - /app/node_modules # Avoid mounting over node_modules inside container
    command: npm run start:dev # Use start:dev for hot-reloading in dev environment
    # For production, use: command: npm start

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: task_frontend
    environment:
      REACT_APP_API_BASE_URL: http://localhost:${PORT:-5000}/api # Adjust for production
    ports:
      - "3000:3000" # React default port
    depends_on:
      - backend

volumes:
  pg_data:
