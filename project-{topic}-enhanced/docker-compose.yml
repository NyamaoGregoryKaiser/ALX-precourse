```yaml
version: '3.8'

services:
  db-optiflow-postgres:
    image: postgres:16-alpine
    container_name: db-optiflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-optiflow-redis:
    image: redis:7-alpine
    container_name: db-optiflow-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-optiflow-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: db-optiflow-backend
    restart: always
    ports:
      - "${SERVER_PORT}:${SERVER_PORT}"
    env_file:
      - ./.env # Make sure .env is correctly setup with DB_USER etc.
    depends_on:
      db-optiflow-postgres:
        condition: service_healthy
      db-optiflow-redis:
        condition: service_healthy
    # Ensure migrations run on startup
    command: sh -c "npm run migration:run && npm start"

  db-optiflow-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: db-optiflow-frontend
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container's port 80 (nginx default)
    env_file:
      - ./.env
    environment:
      VITE_API_BASE_URL: http://localhost:${SERVER_PORT}/api # Ensure this matches backend service URL
    depends_on:
      - db-optiflow-backend

volumes:
  postgres_data:
  redis_data:
```