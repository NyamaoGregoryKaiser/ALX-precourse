```yaml
version: '3.8'

services:
  db:
    image: postgres:14-alpine
    restart: always
    environment:
      POSTGRES_DB: cms_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - cms_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - cms_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgres://user:password@db:5432/cms_db # Connect to 'db' service
      JWT_SECRET: supersecretjwtkey # Change for production
      JWT_EXPIRES_IN: 1h
      SESSION_SECRET: anothersupersecret # Change for production
      FRONTEND_URL: http://localhost:3000
      REDIS_HOST: redis # Connect to 'redis' service
      REDIS_PORT: 6379
      REDIS_PASSWORD:
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend # Mount volume for live development (optional, remove for production build)
      - /app/backend/node_modules # Prevent host node_modules from overriding container ones

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container's port 80 (Nginx default)
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api/v1 # Connect to backend service via host machine
    depends_on:
      backend:
        condition: service_started
    # For local development with hot-reloading (uncomment for dev, comment for production deployment)
    # volumes:
    #   - ./frontend:/app/frontend
    #   - /app/frontend/node_modules
    # command: ["npm", "start"] # Override CMD in Dockerfile for dev, and expose 3000

volumes:
  cms_db_data:
  cms_redis_data:
```