```yaml
version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: devops_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persist database data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Service (Node.js Express API)
  backend:
    build:
      context: ./backend # Build from the backend directory
      dockerfile: Dockerfile
    container_name: devops_backend
    restart: always
    environment:
      # Inject environment variables from .env file (or define here)
      # In production, these should be managed by your orchestrator (Kubernetes, ECS, etc.)
      PORT: 5000
      DATABASE_URL: postgresql://user:password@db:5432/mydatabase # Connects to the 'db' service
      JWT_SECRET: supersecretjwtkey # **IMPORTANT: Change this in production**
      JWT_EXPIRES_IN: 1h
      CACHE_TTL: 3600
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      NODE_ENV: development # or production
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy # Ensure DB is ready before starting backend
    volumes:
      - ./backend:/app/backend # Mount local backend code for development hot-reloading (optional for production builds)
      - /app/backend/node_modules # Exclude node_modules from host mount to prevent conflicts
    command: sh -c "npm install && npm run migrate:run && npm run seed && npm run dev" # For development with hot-reloading
    # command: sh -c "npm run migrate:run && npm run start" # For production, use `npm run start` (compiled JS)

  # Frontend Service (React App served by Nginx)
  frontend:
    build:
      context: ./frontend # Build from the frontend directory
      dockerfile: Dockerfile
    container_name: devops_frontend
    restart: always
    ports:
      - "3000:80" # Map host port 3000 to container port 80 (Nginx default)
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api # Points to the host's backend endpoint for frontend development
      # In a multi-host production environment, this would be the public URL of the backend API gateway
    depends_on:
      backend:
        condition: service_started # Frontend only needs backend to be started, not fully healthy or operational.

volumes:
  postgres_data: # Define a named volume for PostgreSQL data persistence
```