version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: database_optimizer_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-dbo_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dbo_password_secure}
      POSTGRES_DB: ${DB_NAME:-database_optimizer_db}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Initial script to run after DB is up
      # This approach runs *after* the DB is started, so migrations should ideally be handled by the app.
      # For initial setup, we can use a custom entrypoint script.
      # For now, migrations are handled by the C++ app on startup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: database_optimizer_app
    restart: always
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      STATIC_FILES_PATH: /usr/local/web
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-dbo_user}
      DB_PASSWORD: ${DB_PASSWORD:-dbo_password_secure}
      DB_NAME: ${DB_NAME:-database_optimizer_db}
      DB_CONNECTION_STRING: "postgresql://${DB_USER:-dbo_user}:${DB_PASSWORD:-dbo_password_secure}@db:5432/${DB_NAME:-database_optimizer_db}"
      JWT_SECRET: ${JWT_SECRET:-a_very_long_and_secure_random_string_for_jwt_signing_which_is_at_least_32_characters_long}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FILE: /app/logs/app.log
      SLOW_QUERY_THRESHOLD_MS: ${SLOW_QUERY_THRESHOLD_MS:-50.0}
      MIN_INDEX_SUGGESTION_USAGE: ${MIN_INDEX_SUGGESTION_USAGE:-5}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs # Persist logs

volumes:
  db_data:
  app_logs:
```