```yaml
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: cms-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-cms_db}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - cms_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose for local development/tools
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-cms_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cms-redis
    restart: always
    ports:
      - "6379:6379" # Expose for local development/tools

  # Backend Application
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build arguments if needed
    container_name: cms-backend
    restart: always
    environment:
      NODE_ENV: production
      APP_PORT: 3000
      APP_NAME: "ALX CMS Backend"
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:80} # Frontend URL or Nginx URL
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-cms_db}
      DB_SYNCHRONIZE: false # IMPORTANT: Never true in production
      DB_LOGGING: false
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-please-change-me-to-a-long-random-string}
      JWT_EXPIRATION_TIME: 1h
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      REDIS_URL: redis://redis:6379
      CACHE_TTL: 300000
    ports:
      - "3000:3000" # Expose for direct access/debugging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Frontend Application (served by Nginx)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: cms-frontend
    restart: always
    environment:
      # Pass frontend environment variables at runtime for Nginx to inject (or build time for React)
      # For React, these are typically baked into the build. We need to pass them during the build stage.
      # If using an Nginx setup, we can inject them into a JS file or config template for runtime.
      # For simplicity here, assume REACT_APP_API_BASE_URL is hardcoded or set during build.
      # Or, if Nginx handles proxying, frontend just talks to /api.
      REACT_APP_API_BASE_URL: http://localhost:3000 # Direct backend URL if not using Nginx proxy for API
    ports:
      - "80:80" # Standard HTTP port
    depends_on:
      backend:
        condition: service_started

volumes:
  cms_data: # Persistent volume for PostgreSQL data

```