```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: payment-processor-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      # For test environment
      POSTGRES_MULTIPLE_DATABASES: ${DB_NAME},${TEST_DB_NAME} # Requires custom image or initial script to create multiple DBs
    volumes:
      - db_data:/var/lib/postgresql/data
      # - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh # Optional: script to create multiple databases
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: payment-processor-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} # Enable persistence and password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "INFO"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: payment-processor-backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_CLIENT: pg
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      TEST_DB_NAME: ${TEST_DB_NAME} # For running tests in container
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_TIME: ${JWT_EXPIRATION_TIME}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MOCK_GATEWAY_API_KEY: ${MOCK_GATEWAY_API_KEY}
      MOCK_GATEWAY_URL: http://mock-gateway:5001/mock-gateway # Link to mock gateway service
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY} # For sensitive data encryption if implemented
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount current directory to allow hot-reloading (for dev)
      - /app/node_modules # Prevent host node_modules from overwriting container's
    command: sh -c "npm install && npm run migrate:latest && npm run seed:run && npm run dev" # Run migrations/seeds then start dev server

  mock-gateway: # A simple mock for the external payment gateway
    build:
      context: ./backend/mock-gateway # Assume a simple Express app for mock gateway
      dockerfile: Dockerfile
    container_name: mock-payment-gateway
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MOCK_GATEWAY_API_KEY: ${MOCK_GATEWAY_API_KEY} # Must match backend's config
    # No depends_on, it's independent
    volumes:
      - ./backend/mock-gateway:/app
      - /app/node_modules
    command: npm start


