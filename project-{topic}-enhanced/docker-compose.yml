version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: webscraper_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql # Run init script on first start
      - ./db/seed.sql:/docker-entrypoint-initdb.d/seed.sql # Seed data
    ports:
      - "5432:5432" # Expose for local development/debugging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d webscraper_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379" # Expose for local development/debugging
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080" # Expose application port
    environment:
      APP_PORT: 8080
      DATABASE_URL: postgresql://user:password@db:5432/webscraper_db # Connect to 'db' service
      JWT_SECRET: super_secret_jwt_key_that_is_at_least_32_chars_long # CHANGE ME IN PRODUCTION
      REDIS_HOST: redis # Connect to 'redis' service
      REDIS_PORT: 6379
      RATE_LIMIT_REQUESTS: 100
      RATE_LIMIT_WINDOW_SECONDS: 60
      SCHEDULER_INTERVAL_SECONDS: 300 # Run scheduler every 5 minutes
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src # Mount source for easier development (optional for production)
      - ./frontend:/app/frontend # Mount frontend for serving static files
    # command: ["/usr/local/bin/webscraper"] # Explicitly specify command if needed, but CMD in Dockerfile is usually fine.

volumes:
  postgres_data:
  redis_data: