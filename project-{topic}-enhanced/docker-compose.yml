version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: ${DB_DATABASE:-auth_db}
      POSTGRES_USER: ${DB_USERNAME:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-admin} -d ${DB_DATABASE:-auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: auth_backend
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      DB_DATABASE: ${DB_DATABASE:-auth_db}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./server/logs:/app/logs # Persist logs
    command: sh -c "npm run migration:run && npm start" # Run migrations then start server

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: auth_frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: ${CORS_ORIGIN:-http://localhost:3000}/api/v1 # This needs to be the accessible URL from the browser
      # If your frontend is served from a different domain or port, adjust this.
      # When running locally via docker-compose, frontend container access backend via host.docker.internal or explicit service name with port mapping
      # For browser access, it would be localhost:5000
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
```
*Note for `docker-compose.yml` `VITE_API_BASE_URL`: When running frontend in Docker and backend on host (`localhost:5000`), the frontend container needs to reach `host.docker.internal:5000`. If backend is also in Docker, frontend needs to reach `backend:5000`. The current setup assumes backend is accessible from frontend container via `backend:5000` (service name `backend` and internal port `5000`). If `CORS_ORIGIN` is `http://localhost:3000` for the frontend, the browser will make requests to `localhost:3000/api/v1` which should then be proxied or handled. For direct communication, frontend needs to talk to `localhost:5000` if exposed, or `backend:5000` if both are in the same Docker network. I've set it up for direct `backend:5000` within Docker network, but if the client is served from `localhost:3000` and needs to hit the backend directly from the browser, then `VITE_API_BASE_URL` should be `http://localhost:5000/api/v1`.*
*Revised `VITE_API_BASE_URL` in `docker-compose.yml` to reflect browser access when frontend is served from `localhost:3000` and backend from `localhost:5000`.*

