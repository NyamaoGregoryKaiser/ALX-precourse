version: '3.8'

services:
  db:
    image: postgres:13
    container_name: dataviz_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: datavizdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d datavizdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataviz_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # Load from .env file directly if docker-compose version supports it and file is present
      # Otherwise, explicitly define or use environment variables
      DATABASE_URL: "postgresql://user:password@db:5432/datavizdb"
      HTTP_ADDRESS: "0.0.0.0"
      HTTP_PORT: "8080"
      JWT_SECRET: "${JWT_SECRET}" # Uses environment variable from host or .env
      LOG_LEVEL: "${LOG_LEVEL:-INFO}" # Default to INFO if not set
    volumes:
      # Mount data_uploads for persistence
      - ./data_uploads:/app/data_uploads
      # Mount migration scripts for DBManager::initializeSchema
      - ./database/migrations:/app/database/migrations
    depends_on:
      db:
        condition: service_healthy
    # Optional: If you want to seed data on startup (for dev)
    # entrypoint: /bin/bash -c "sleep 5 && psql -h db -U user -d datavizdb -f /app/database/seed_data.sql && ./dataviztool"


  # frontend: (Conceptual - if you had a React/Vue app)
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   container_name: dataviz_frontend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     REACT_APP_API_BASE_URL: "http://localhost:8080/api/v1" # Or "http://backend:8080/api/v1" if frontend is in same docker network
  #   depends_on:
  #     - backend

volumes:
  db_data:
    driver: local
  data_uploads:
    driver: local # To persist uploaded CSVs