```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ml-utilities-db
    environment:
      POSTGRES_DB: ${DB_NAME:-ml_utilities_db}
      POSTGRES_USER: ${DB_USER:-ml_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ml_password}
    ports:
      - "5432:5432"
    volumes:
      - ml_utilities_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ml_user} -d ${DB_NAME:-ml_utilities_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml-utilities-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db # Connect to the 'db' service name within the Docker network
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ml_utilities_db}
      DB_USER: ${DB_USER:-ml_user}
      DB_PASSWORD: ${DB_PASSWORD:-ml_password}
      JWT_SECRET: ${JWT_SECRET:-supersecretjwtkeyforalxprojectdevelopmentonlyandnotforproductionuse}
    depends_on:
      db:
        condition: service_healthy
    # Optional: Mount the static folder for a simple frontend
    volumes:
      - ./static:/app/static # Mounts the frontend files

volumes:
  ml_utilities_data:
```