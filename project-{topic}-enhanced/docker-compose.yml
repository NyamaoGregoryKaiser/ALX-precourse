```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "18080:18080"
    volumes:
      # Mount a volume for persistent database and logs
      - app_data:/app/data
      - app_logs:/app/logs
      # Mount .env file for configuration (create this file from .env.example)
      - ./config/.env:/app/.env:ro
    environment:
      # These variables can be set directly here or loaded from the .env file
      # Loading from .env file via `Config.cpp` is preferred.
      # Ensure these match .env.example keys.
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # All other variables like APP_PORT, DATABASE_PATH, LOG_LEVEL, etc.,
      # will be loaded by the C++ app from the mounted .env file.
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:18080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s # Give the app time to start and run migrations
    restart: always

volumes:
  app_data:
  app_logs:
```