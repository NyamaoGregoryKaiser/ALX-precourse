```yaml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d chat_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://user:password@postgres:5432/chat_app?schema=public
      REDIS_URL: redis://redis:6379
      # Other variables like JWT_SECRET, CORS_ORIGIN should be in .env
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount for live reload in development if needed
      - /app/node_modules # Exclude node_modules from host mount
    # Command to run migrations and then start the app.
    # In a production setup, migrations might be a separate job.
    command: sh -c "npx prisma migrate deploy && npm run start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./frontend/.env
    environment:
      REACT_APP_API_BASE_URL: http://localhost:5000/api
      REACT_APP_WS_URL: http://localhost:5000
      # Ensure these match the host-exposed ports if accessing from host browser directly.
      # If using an Nginx reverse proxy, these might point to internal service names.
    ports:
      - "3000:80" # Map host port 3000 to container's port 80 (Nginx default)
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app # Mount for live reload in development if needed
      - /app/node_modules # Exclude node_modules from host mount
      - /app/build # Exclude build output from host mount


volumes:
  postgres_data:
  redis_data:
```