```nginx
server {
    listen 80;
    server_name localhost; # Replace with your domain in production

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy WebSocket connections if Nginx is used as a reverse proxy for the backend
    # This is not strictly needed if frontend connects directly to backend socket URL.
    # However, if using a single domain for both frontend and backend (e.g., chat.example.com/api and chat.example.com/socket)
    # then Nginx would proxy to backend for /api and /socket.
    # For this project's docker-compose, frontend directly connects to backend service.
    # If Nginx was to proxy backend:
    # location /api/ {
    #     proxy_pass http://backend:5000/api/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    # }
