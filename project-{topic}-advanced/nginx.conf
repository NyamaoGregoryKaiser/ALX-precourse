```nginx
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests if running frontend and backend on the same domain/port
    # For this project, we assume backend is on a different port/subdomain
    # If frontend is served from example.com and backend from api.example.com,
    # or frontend from example.com:80 and backend from example.com:5000
    # then this proxy is not strictly needed, `VITE_API_BASE_URL` handles it.
    # If you wanted to proxy, it would look like:
    # location /api/ {
    #     proxy_pass http://backend:5000/api/; # 'backend' is the service name in docker-compose
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
```