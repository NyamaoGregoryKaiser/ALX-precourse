```nginx
server {
    listen 80;
    server_name localhost; # Replace with your domain in production

    # Serve static files for the React app
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html; # Fallback to index.html for client-side routing
    }

    # Proxy API requests to the backend service
    location /api/v1/ {
        # 'backend' is the service name defined in docker-compose.yml
        # '5000' is the port the Node.js backend listens on
        proxy_pass http://backend:5000/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90; # Increase if backend responses are slow
        proxy_connect_timeout 90;
        proxy_send_timeout 90;
    }

    # Custom error pages (optional)
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
```