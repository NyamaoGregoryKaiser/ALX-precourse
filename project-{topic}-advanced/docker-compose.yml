version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: web_scraper_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d web_scraper_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/web_scraper_db?schema=public
      PORT: 5000
      JWT_SECRET: your_jwt_secret_key_for_docker_env
      JWT_EXPIRES_IN: 1d
      SCRAPER_BROWSER: chromium # Or firefox/webkit
      CACHE_TTL_SECONDS: 300
      NODE_ENV: production
      ADMIN_PASSWORD: Admin@123
      USER_PASSWORD: User@123
      FRONTEND_URL: http://localhost:3000
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount local code for development, remove/adjust for production
      - /app/node_modules # Ensure node_modules inside container is used
      - /app/logs # For Winston logs
    command: sh -c "npx prisma migrate deploy && npm run seed && npm start"
    # Ensure Playwright browser binaries are available.
    # The default Playwright Docker images already have them: mcr.microsoft.com/playwright/node
    # If building from scratch, you'd need to add browser installation steps in your Dockerfile.
    # Our Dockerfile installs them.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      REACT_APP_API_BASE_URL: http://localhost:5000/api
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend:/app # Mount local code for development, remove/adjust for production
      - /app/node_modules # Ensure node_modules inside container is used


volumes:
  postgres_data:
