  # Redis Service for Celery and Caching
  redis:
    image: redis:latest
    container_name: dboptiflow_redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Celery Worker Service
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dboptiflow_celery_worker
    restart: always
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started # Worker depends on app being up to load Flask context
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.tasks worker -l info
    volumes:
      - .:/app # Mount the current directory into the container

