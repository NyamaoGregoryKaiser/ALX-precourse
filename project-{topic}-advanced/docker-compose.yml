version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ecommerce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      API_VERSION: /api/v1
      DATABASE_URL: "postgresql://user:password@db:5432/ecommerce_db?schema=public"
      JWT_SECRET: supersecretjwtkey  # In production, use a strong, generated secret
      JWT_EXPIRES_IN: 1h
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: adminpassword123
      FRONTEND_URL: http://localhost:3000 # Or your deployed frontend URL
      LOG_LEVEL: info
      REDIS_URL: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules # Prevent host node_modules from overwriting container's
    command: sh -c "npx prisma migrate deploy && npx prisma generate && node dist/server.js"
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://backend:5000/api/v1 # Internal Docker network hostname
    depends_on:
      backend:
        condition: service_started # Frontend only needs backend to be accessible
    volumes:
      - ./frontend:/app
      - /app/.next # Allow Next.js build output to persist
      - /app/node_modules
    restart: always

volumes:
  postgres_data:
  redis_data: