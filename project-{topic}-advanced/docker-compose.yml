version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: data-viz-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - data-viz-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: data-viz-redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: data-viz-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src # Mount source for dev, copy for prod
      - /app/node_modules # Prevent host node_modules from overwriting container's
    command: sh -c "npm run migrate:run && npm run seed && npm run dev" # Run migrations, seed, then start dev server

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: data-viz-frontend
    restart: always
    env_file:
      - ./frontend/.env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src # Mount source for dev, copy for prod
      - /app/node_modules # Prevent host node_modules from overwriting container's
    command: npm start

volumes:
  data-viz-db-data: