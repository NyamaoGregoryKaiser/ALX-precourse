```yaml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: task_management_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s # Give postgres a bit more time to start up

  redis:
    image: redis:7-alpine
    container_name: task_management_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: task_management_backend
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: 5000
      DB_HOST: postgres # Service name in docker-compose for inter-container communication
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      REDIS_HOST: redis # Service name in docker-compose
      REDIS_PORT: 6379
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
      FRONTEND_URL: ${FRONTEND_URL} # For CORS
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy # Wait for postgres to be healthy
      redis:
        condition: service_healthy # Wait for redis to be healthy
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: task_management_frontend
    environment:
      # VITE_API_BASE_URL is set during the build process in Dockerfile.frontend
      # For local dev without Nginx, you'd set this to `http://localhost:5000/api/v1` in frontend/.env
      # When using Nginx, it's set to `/api/v1` which Nginx proxies
    ports:
      - "${FRONTEND_PORT}:80" # Map host port to container's 80 (nginx)
    depends_on:
      backend:
        condition: service_started # Frontend only needs backend to be accessible, not necessarily healthy at first request.
    restart: always

volumes:
  postgres_data:
  redis_data:
```