version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: alx-scraper-db
    environment:
      POSTGRES_DB: alx_scraper
      POSTGRES_USER: alx_user
      POSTGRES_PASSWORD: alx_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alx_user -d alx_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alx-scraper-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db # Connects to the 'db' service defined in this compose file
      DB_PORT: 5432
      DB_NAME: alx_scraper
      DB_USER: alx_user
      DB_PASSWORD: alx_password
      # IMPORTANT: Replace with a strong, random key in production
      JWT_SECRET: your_super_secure_jwt_secret_key_for_production_use_alx_scraper_project_2024_05_14_long_enough
      JWT_EXPIRATION_MS: 86400000
      RATE_LIMIT_MAX_REQUESTS: 100
      RATE_LIMIT_TIME_WINDOW_SECONDS: 60
    depends_on:
      db:
        condition: service_healthy # Wait for the database to be healthy
    # Optional: If you need to map local target directory to container for faster development iterations
    # volumes:
    #   - ./target/alx-scraper-0.0.1-SNAPSHOT.jar:/app/app.jar
    #   - ./src/main/resources/db/migration:/app/src/main/resources/db/migration # For Flyway during dev
    #   - ./logs:/app/logs # To persist logs outside container (adjust path as needed)

volumes:
  postgres_data:

# ALX Focus: Orchestrates multi-container applications. Sets up a database
# and the application, manages environment variables, port mappings, and
# defines service dependencies, crucial for local development and staging environments.
# Health checks ensure services start in the correct order.
