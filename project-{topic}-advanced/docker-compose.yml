```yaml
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alx-project-api
    ports:
      - "18080:18080" # Map host port 18080 to container port 18080
    environment:
      # These environment variables will override values in the .env file inside the container
      # Make sure to update these with your sensitive information in production
      - APP_PORT=18080
      - DATABASE_PATH=/app/db/alx_project_management.db
      - LOG_LEVEL=0 # DEBUG
      - JWT_SECRET=alx_super_secret_jwt_key_for_compose_testing_123!
      - JWT_EXPIRY_MINUTES=120
      - RATE_LIMIT_WINDOW_SECONDS=60
      - RATE_LIMIT_MAX_REQUESTS=100
    volumes:
      # Persist database and logs
      - ./data/db:/app/db
      - ./data/logs:/app/logs
    restart: unless-stopped
```