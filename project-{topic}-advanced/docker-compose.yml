```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      # These variables should match your .env file or be explicitly set
      # In production, use secrets management for sensitive values
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://user:password@db:5432/taskdb?schema=public
      JWT_SECRET: YOUR_SUPER_SECRET_JWT_KEY_HERE_CHANGE_ME
      JWT_EXPIRATION_TIME: 1h
      REFRESH_TOKEN_SECRET: YOUR_SUPER_SECRET_REFRESH_KEY_HERE_CHANGE_ME
      REFRESH_TOKEN_EXPIRATION_TIME: 7d
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    depends_on:
      - db
      - redis
    volumes:
      - .:/app
      - /app/node_modules # Prevents host's node_modules from overwriting container's
      - /app/dist # Prevents host's dist from overwriting container's
    command: npm run dev # Use nodemon for development auto-restarts

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: taskdb
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose for local access/tools like DBeaver

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  db_data:
  redis_data:
```