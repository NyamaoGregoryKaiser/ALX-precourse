```yaml
version: '3.8'

services:
  db:
    image: postgres:13-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: ${PORT}
      DB_HOST: db
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_DIALECT: ${DB_DIALECT}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS}
      LOG_LEVEL: ${LOG_LEVEL}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - product-network

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      REACT_APP_API_URL: http://localhost:${PORT} # This needs to be the host IP or exposed port for frontend to access backend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - product-network

networks:
  product-network:
    driver: bridge

volumes:
  db_data:
```