```yaml
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: auth_postgres_db
    environment:
      POSTGRES_DB: ${DB_NAME:-auth_db}
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user} -d ${DB_NAME:-auth_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: auth_redis_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "INFO"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: auth_backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MINUTES: ${JWT_ACCESS_EXPIRATION_MINUTES}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS}
      JWT_RESET_PASSWORD_EXPIRATION_MINUTES: ${JWT_RESET_PASSWORD_EXPIRATION_MINUTES}
      JWT_VERIFY_EMAIL_EXPIRATION_MINUTES: ${JWT_VERIFY_EMAIL_EXPIRATION_MINUTES}
      DB_HOST: db # Service name in docker-compose
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_URL: redis://redis:6379/${REDIS_DB:-0} # Service name for Redis
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      USER_EMAIL: ${USER_EMAIL}
      USER_PASSWORD: ${USER_PASSWORD}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount for live reload in development if needed
      - /app/node_modules # Exclude node_modules from host mount
    command: ["./wait-for-it.sh", "db:5432", "--", "nodemon", "--exec", "ts-node", "src/server.ts"] # Dev mode
    # command: ["/app/wait-for-it.sh", "db:5432", "--", "node", "dist/server.js"] # Production mode
    networks:
      - app_network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: auth_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api/v1 # This is for local frontend dev, not dockerized nginx
    ports:
      - "3000:80" # Map host port 3000 to container's port 80 (nginx)
    depends_on:
      - backend
    networks:
      - app_network

volumes:
  db_data:

networks:
  app_network:
    driver: bridge

```
**Note on `command` for backend:** In `docker-compose.yml`, the `command` for the backend is set to `nodemon` for development convenience. For production deployment, you would change this to `["node", "dist/server.js"]` and remove the volume mount for `./backend:/app` if you are using the multi-stage build effectively. The `wait-for-it.sh` script is needed for robust startup.

**`wait-for-it.sh` script (create in the root directory, i.e. parallel to `docker-compose.yml`):**
This script helps to ensure that the database is ready before the backend tries to connect to it.

```bash
#!/bin/sh
# wait-for-it.sh

set -e

host="$1"
shift
cmd="$@"

until PGPASSWORD=$DB_PASSWORD psql -h "$host" -U "$DB_USER" -d "$DB_NAME" -c '\q'; do
  >&2 echo "Postgres is unavailable - sleeping"
  sleep 1
done

>&2 echo "Postgres is up - executing command"
exec $cmd
```
Make sure to make it executable: `chmod +x wait-for-it.sh`

