version: '3.8'

services:
  app:
    build: .
    container_name: auth-app
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    ports:
      - "5000:5000"
    command: gunicorn --bind 0.0.0.0:5000 --worker-class gevent --workers 4 --threads 2 wsgi:app # Use gevent for async
    networks:
      - auth_network

  db:
    image: postgres:13-alpine
    container_name: auth-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-auth_db}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - auth_network

  db_test: # Separate database for testing
    image: postgres:13-alpine
    container_name: auth-db-test
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER:-test_user}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-test_password}
      POSTGRES_DB: ${TEST_POSTGRES_DB:-test_auth_db}
    volumes:
      - auth_db_test_data:/var/lib/postgresql/data
    networks:
      - auth_network

  redis:
    image: redis:6-alpine
    container_name: auth-redis
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - auth_redis_data:/data
    networks:
      - auth_network

volumes:
  auth_db_data:
  auth_db_test_data:
  auth_redis_data:

networks:
  auth_network:
    driver: bridge