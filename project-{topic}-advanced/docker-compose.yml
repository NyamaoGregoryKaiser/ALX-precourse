version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: appinsight_db
    environment:
      POSTGRES_DB: ${DB_NAME:-appinsight_db}
      POSTGRES_USER: ${DB_USER:-appinsight_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-appinsight_user} -d ${DB_NAME:-appinsight_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  appinsight:
    build: .
    container_name: appinsight_backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-appinsight_db}
      DB_USER: ${DB_USER:-appinsight_user}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-verySecretKeyForAppInsightMonitoringSystemThatIsLongAndSecureForProductionUse}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs # Mount volume for application logs
    # Optional: If you want to run the frontend locally with the backend
    # command: ["/bin/sh", "-c", "java -jar appinsight.jar & npm start --prefix src/main/frontend"] # Example for combined run
    # For a simple setup, the frontend will be served statically from the Spring Boot app

volumes:
  postgres_data:
```

