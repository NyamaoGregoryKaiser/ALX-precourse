version: '3.8'

services:
  visgenius-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visgenius-backend
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database file outside the container
      - ./data/visgenius.db:/app/visgenius.db
      # Optionally, bind-mount the data directory for easy CSV access/modification
      - ./data/csv:/app/data/csv
    environment:
      # Load variables from .env file
      - APP_PORT=${APP_PORT:-8080}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE_PATH=/app/visgenius.db
      - JWT_SECRET=${JWT_SECRET:-super_secret_jwt_key_that_should_be_long_and_random_but_unique_to_this_env}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - DATA_CACHE_TTL_MINUTES=${DATA_CACHE_TTL_MINUTES:-30}
      - CHART_CACHE_TTL_MINUTES=${CHART_CACHE_TTL_MINUTES:-10}
      - RATE_LIMIT_MAX_REQUESTS=${RATE_LIMIT_MAX_REQUESTS:-100}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
    # For a production environment, add restart policy and resource limits
    # restart: always
    # deploy:
    #   resources:
    #     limits:
    #       cpus: '1'
    #       memory: 512M

