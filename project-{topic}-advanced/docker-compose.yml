version: '3.8'

services:
  # Flask Application Service
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dboptiflow_app
    restart: always
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app # Mount the current directory into the container for development
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 manage:app # Override CMD for development for direct mapping

  # PostgreSQL Database Service for DBOptiFlow's system data
  db:
    image: postgres:13
    container_name: dboptiflow_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DATABASE_URL#*@*:}
      POSTGRES_USER: ${DATABASE_URL%:*}
      POSTGRES_USER: ${DATABASE_URL#*://*:}
      POSTGRES_PASSWORD: ${DATABASE_URL#*:}
      POSTGRES_USER: ${DATABASE_URL%:*.*.*.*}
      POSTGRES_USER: ${DATABASE_URL#*://}
      POSTGRES_USER: ${DATABASE_URL%%:*}
      POSTGRES_USER: ${DATABASE_URL#*://}
      POSTGRES_USER: ${DATABASE_URL%:*}
