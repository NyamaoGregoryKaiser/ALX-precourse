```yaml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: alx-postgres
    environment:
      POSTGRES_DB: alx_mobile_db
      POSTGRES_USER: alxuser
      POSTGRES_PASSWORD: alxpassword
      # Create a separate database for development if using application-dev.properties
      POSTGRES_MULTIPLE_DATABASES: alx_mobile_db,alx_mobile_db_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Initialize multiple databases. This requires a custom entrypoint script
      # Or manage multiple databases from your app. For simplicity, we'll assume one DB for now or handle dev/prod in application properties.
      # For local dev, a single DB and separate usernames/passwords is often enough,
      # and application properties can point to the same DB but different schemas if needed.
      # For this example, let's use two distinct databases for prod/dev separation.
      - ./init-multiple-databases.sh:/docker-entrypoint-initdb.d/init-multiple-databases.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alxuser -d alx_mobile_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alx-mobile-backend
    ports:
      - "8080:8080"
    environment:
      # These environment variables will override those in Dockerfile for Spring Boot
      # Use `dev` profile for local development, connecting to `alx_mobile_db_dev`
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/alx_mobile_db_dev
      DB_USERNAME: alxuser_dev
      DB_PASSWORD: alxpassword_dev
    depends_on:
      postgres:
        condition: service_healthy
    # Optional: Mount local source for hot-reloading (for development)
    # This might require specific build tools configured in Maven/Gradle
    # - ./src:/app/src
    # - ./pom.xml:/app/pom.xml
    # command: ./mvnw spring-boot:run # For dev, replaces ENTRYPOINT in Dockerfile

volumes:
  postgres_data:
```