version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "info"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_DIALECT: postgres
      DB_HOST: db # Service name in docker-compose
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_TEST_NAME: ${DB_TEST_NAME} # For running tests inside container
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_EXPIRATION_MINUTES: ${JWT_ACCESS_EXPIRATION_MINUTES}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS}
      REDIS_HOST: redis # Service name in docker-compose
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      LOG_LEVEL: ${LOG_LEVEL}
      RATE_LIMIT_WINDOW_MINUTES: ${RATE_LIMIT_WINDOW_MINUTES}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS}
    volumes:
      - ./backend:/app
      - /app/node_modules # Preserve node_modules generated by Docker
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "npm install && npm run db:migrate && npm run db:seed && npm run dev" # Run migrations/seeds then start dev server

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_started # Only start frontend after backend is started
    environment:
      # These variables are typically baked into the React app at build time
      # For runtime changes or exposing to frontend, configure Nginx or build with env vars
      REACT_APP_API_BASE_URL: /api # This is for React's dev server proxy. For Nginx, it's proxied by default.
    volumes:
      - ./frontend/src:/usr/share/nginx/html/src # Mount source for live reload if doing dev directly in container (optional)
      - ./frontend/public:/usr/share/nginx/html/public # Mount public for live reload (optional)
      # No build output volume mount needed as we copy build results

volumes:
  postgres_data:
  redis_data: