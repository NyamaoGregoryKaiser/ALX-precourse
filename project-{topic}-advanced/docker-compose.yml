```yaml
version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: enterprise_db
    restart: always
    environment:
      POSTGRES_DB: enterprise_dev # Default database for development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d enterprise_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: enterprise_redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: enterprise_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      # These environment variables link to the services within the docker-compose network
      DATABASE_URL: postgresql://postgres:postgres@db:5432/enterprise_dev
      REDIS_URL: redis://redis:6379
      # JWT_SECRET should be securely managed, not hardcoded here in production
      # For development, you can use a placeholder
      JWT_SECRET: your_super_secret_jwt_key_here
      NODE_ENV: development # Can be overridden to production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules # Prevents host's node_modules from overriding container's
    # Command to run migrations and seed data after the app starts, for development convenience
    # In production, these should be handled by CI/CD or dedicated scripts
    command: >
      bash -c "npm run migrate && npm run seed && npm start"

volumes:
  pgdata:
  redisdata:
```