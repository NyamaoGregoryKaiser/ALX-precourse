```yaml
openapi: 3.0.0
info:
  title: Collaborative Task Management API
  version: 1.0.0
  description: A comprehensive API for managing projects, tasks, and users with authentication and authorization.

servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the user.
          example: d290f1ee-6c54-4b01-90e6-d701748f0851
        username:
          type: string
          description: User's chosen username.
          example: johndoe
        email:
          type: string
          format: email
          description: User's email address.
          example: john.doe@example.com
        role:
          type: string
          enum: [ "ADMIN", "USER" ]
          description: User's role in the system.
          example: USER
        createdAt:
          type: string
          format: date-time
          description: Date and time when the user was created.
        updatedAt:
          type: string
          format: date-time
          description: Date and time when the user was last updated.
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the project.
          example: a1b2c3d4-e5f6-7890-1234-567890abcdef
        name:
          type: string
          description: Name of the project.
          example: Website Redesign
        description:
          type: string
          nullable: true
          description: Detailed description of the project.
          example: Redesign the company's main website for improved UX.
        status:
          type: string
          enum: [ "OPEN", "IN_PROGRESS", "COMPLETED", "CANCELLED" ]
          description: Current status of the project.
          example: IN_PROGRESS
        createdBy:
          $ref: '#/components/schemas/User'
        createdById:
          type: string
          format: uuid
          description: ID of the user who created the project.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the task.
          example: f1e2d3c4-b5a6-9876-5432-10fedcba9876
        title:
          type: string
          description: Title of the task.
          example: Implement Login Page
        description:
          type: string
          nullable: true
          description: Detailed description of the task.
          example: Develop the user login interface and integrate with backend API.
        status:
          type: string
          enum: [ "TODO", "IN_PROGRESS", "DONE", "BLOCKED" ]
          description: Current status of the task.
          example: IN_PROGRESS
        priority:
          type: string
          enum: [ "LOW", "MEDIUM", "HIGH", "URGENT" ]
          description: Priority level of the task.
          example: HIGH
        dueDate:
          type: string
          format: date-time
          nullable: true
          description: Optional due date for the task.
        project:
          $ref: '#/components/schemas/Project'
        projectId:
          type: string
          format: uuid
          description: ID of the project this task belongs to.
        assignedTo:
          $ref: '#/components/schemas/User'
          nullable: true
        assignedToId:
          type: string
          format: uuid
          nullable: true
          description: ID of the user assigned to this task.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        statusCode:
          type: integer
          example: 400
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: email
              message:
                type: string
                example: "Email must be a valid email"
        stack:
          type: string
          description: Stack trace (only in development).
          example: "Error: Validation failed\n    at Object.<anonymous>..."

tags:
  - name: Authentication
    description: User authentication and registration
  - name: Users
    description: Operations related to user management
  - name: Projects
    description: Operations related to project management
  - name: Tasks
    description: Operations related to task management

paths:
  /auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  example: testuser
                  minLength: 3
                  maxLength: 30
                email:
                  type: string
                  format: email
                  example: test@example.com
                password:
                  type: string
                  example: StrongPass123!
                  minLength: 8
                  description: Must contain at least one uppercase, one lowercase, one number, and one special character.
      responses:
        '201':
          description: User registered successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User registered successfully
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      email:
                        type: string
                      username:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: User with this email or username already exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                example:
                  status: error
                  statusCode: 409
                  message: User with this email already exists
                  errors:
                    - field: email
                      message: email already exists
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/login:
    post:
      tags:
        - Authentication
      summary: Log in a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@example.com
                password:
                  type: string
                  example: adminpassword
      responses:
        '200':
          description: Login successful. Returns access and refresh tokens.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1Ni...
                  refreshToken:
                    type: string
                    example: eyJhbGciOiJIUzI1Ni...
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      username:
                        type: string
                      email:
                        type: string
                      role:
                        type: string
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
                example:
                  status: error
                  statusCode: 401
                  message: Invalid credentials
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh-token:
    post:
      tags:
        - Authentication
      summary: Refresh access token using a refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1Ni...
      responses:
        '200':
          description: Access token refreshed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                    example: eyJhbGciOiJIUzI1Ni...
                  refreshToken:
                    type: string
                    example: eyJhbGciOiJIUzI1Ni... (could be new or same)
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          description: Invalid or expired refresh token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Log out a user and invalidate their refresh token
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users:
    get:
      tags:
        - Users
      summary: Get all users (Admin only)
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/ServerError'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the user.
      responses:
        '200':
          description: User data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags:
        - Users
      summary: Update user details (self or Admin)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the user to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  example: newusername
                  minLength: 3
                  maxLength: 30
                email:
                  type: string
                  format: email
                  example: new.email@example.com
                password:
                  type: string
                  example: NewPass123!
                  minLength: 8
                role:
                  type: string
                  enum: [ "ADMIN", "USER" ]
                  description: Only Admin can update roles.
              minProperties: 1
      responses:
        '200':
          description: User updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User updated successfully
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict, e.g., username or email already taken.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - Users
      summary: Delete a user (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the user to delete.
      responses:
        '204':
          description: User deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /projects:
    get:
      tags:
        - Projects
      summary: Get all projects
      description: Returns a list of all projects that the authenticated user has access to.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A list of projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - Projects
      summary: Create a new project
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: New Feature Development
                  minLength: 3
                  maxLength: 100
                description:
                  type: string
                  nullable: true
                  example: Develop and integrate feature X into the platform.
                status:
                  type: string
                  enum: [ "OPEN", "IN_PROGRESS", "COMPLETED", "CANCELLED" ]
                  example: OPEN
      responses:
        '201':
          description: Project created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Project created successfully
                  project:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Project with this name already exists.
        '500':
          $ref: '#/components/responses/ServerError'

  /projects/{id}:
    get:
      tags:
        - Projects
      summary: Get project by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the project.
      responses:
        '200':
          description: Project data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags:
        - Projects
      summary: Update project details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the project to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: Updated Website Redesign
                  minLength: 3
                  maxLength: 100
                description:
                  type: string
                  nullable: true
                  example: Updated description for the project.
                status:
                  type: string
                  enum: [ "OPEN", "IN_PROGRESS", "COMPLETED", "CANCELLED" ]
                  example: COMPLETED
              minProperties: 1
      responses:
        '200':
          description: Project updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Project updated successfully
                  project:
                    $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Project with this name already exists.
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - Projects
      summary: Delete a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the project to delete.
      responses:
        '204':
          description: Project deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

  /projects/{projectId}/tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks for a specific project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project to retrieve tasks from.
      responses:
        '200':
          description: A list of tasks for the project.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Project not found.
        '500':
          $ref: '#/components/responses/ServerError'
    post:
      tags:
        - Tasks
      summary: Create a new task within a project
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: projectId
          schema:
            type: string
            format: uuid
          required: true
          description: ID of the project to create the task in.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
              properties:
                title:
                  type: string
                  example: Implement authentication middleware
                  minLength: 3
                  maxLength: 255
                description:
                  type: string
                  nullable: true
                  example: Create middleware to handle JWT authentication and role-based authorization.
                status:
                  type: string
                  enum: [ "TODO", "IN_PROGRESS", "DONE", "BLOCKED" ]
                  example: TODO
                priority:
                  type: string
                  enum: [ "LOW", "MEDIUM", "HIGH", "URGENT" ]
                  example: HIGH
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                  example: '2024-06-30T23:59:59Z'
                assignedToId:
                  type: string
                  format: uuid
                  nullable: true
                  example: d290f1ee-6c54-4b01-90e6-d701748f0851
      responses:
        '201':
          description: Task created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task created successfully
                  task:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Project or assigned user not found.
        '500':
          $ref: '#/components/responses/ServerError'

  /tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Get task by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the task.
      responses:
        '200':
          description: Task data.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'
    patch:
      tags:
        - Tasks
      summary: Update task details
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the task to update.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  example: Finalize authentication middleware
                  minLength: 3
                  maxLength: 255
                description:
                  type: string
                  nullable: true
                  example: Add comprehensive unit tests and documentation for auth middleware.
                status:
                  type: string
                  enum: [ "TODO", "IN_PROGRESS", "DONE", "BLOCKED" ]
                  example: DONE
                priority:
                  type: string
                  enum: [ "LOW", "MEDIUM", "HIGH", "URGENT" ]
                  example: MEDIUM
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                  example: '2024-07-15T10:00:00Z'
                assignedToId:
                  type: string
                  format: uuid
                  nullable: true
                  example: d290f1ee-6c54-4b01-90e6-d701748f0851
              minProperties: 1
      responses:
        '200':
          description: Task updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Task updated successfully
                  task:
                    $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Task or assigned user not found.
        '500':
          $ref: '#/components/responses/ServerError'
    delete:
      tags:
        - Tasks
      summary: Delete a task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: string
            format: uuid
          required: true
          description: Unique ID of the task to delete.
      responses:
        '204':
          description: Task deleted successfully.
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/ServerError'

components:
  responses:
    Unauthorized:
      description: Authentication token is missing or invalid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              status: error
              statusCode: 401
              message: Authentication token required
    Forbidden:
      description: You do not have permission to access this resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              status: error
              statusCode: 403
              message: Forbidden: You do not have the necessary permissions
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              status: error
              statusCode: 404
              message: User not found
    BadRequest:
      description: Invalid request payload or parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              status: error
              statusCode: 400
              message: Validation failed
              errors:
                - field: email
                  message: "Email must be a valid email"
    TooManyRequests:
      description: Too many requests, rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              status: error
              statusCode: 429
              message: Too many requests, please try again after some time.
    ServerError:
      description: An unexpected server error occurred.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
            example:
              status: error
              statusCode: 500
              message: An unexpected error occurred
```

