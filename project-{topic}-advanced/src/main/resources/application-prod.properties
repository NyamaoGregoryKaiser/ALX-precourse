```properties
# Production specific properties
spring.config.activate.on-profile=prod

# Production Database (adjust for cloud provider or dedicated DB)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=none # Crucial for production; Flyway manages it.

# Security
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12 # Needs to be configured
server.ssl.key-store-password=password
server.ssl.key-alias=alias

# Logging for Production (less verbose)
logging.level.com.alxmobilebackend=INFO
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
spring.jpa.show-sql=false

# Cache configuration for production (e.g., more robust distributed cache like Redis)
# spring.cache.type=redis
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# Actuator Security for Production
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoints.web.base-path=/actuator-admin
management.endpoint.health.show-details=always
management.security.enabled=true # Secure actuator endpoints
management.endpoint.health.roles=ADMIN
# Further lock down with IP restrictions or dedicated authentication
```

