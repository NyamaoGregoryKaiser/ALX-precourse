```yaml
spring:
  application:
    name: ecommerce-system
  profiles:
    active: dev # Default profile
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:ecommerce_db}
    username: ${DB_USER:ecommerce_user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Should be 'none' or 'validate' in production
    show-sql: true
    properties:
      hibernate.format_sql: true
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Only for dev, disable in prod for safety
  security:
    user:
      name: user
      password: '{noop}password' # For basic auth if needed, but JWT will override
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      #password: ${REDIS_PASSWORD:} # Uncomment if Redis requires password
  cache:
    type: redis
    redis:
      cache-null-values: true
      time-to-live: 60000ms # 1 minute cache for common items
      key-prefix: ecommerce::

jwt:
  secret: ${JWT_SECRET:yourStrongJwtSecretKeyThatIsAtLeast32BytesLongAndSecurelyStored} # **CHANGE THIS IN PRODUCTION**
  expiration: 86400000 # 24 hours in milliseconds

server:
  port: 8080
  servlet:
    context-path: /api/v1

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus # Expose health, info, and prometheus metrics
  metrics:
    tags:
      application: ${spring.application.name}

# Springdoc OpenAPI (Swagger UI) Configuration
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
    disable-swagger-default-url: true
    display-request-duration: true

# Rate Limiting Configuration
app:
  rate-limit:
    enabled: true
    window-in-seconds: 60
    max-requests: 100 # Max 100 requests per minute per IP

# Logging configuration reference (actual config in logback-spring.xml)
logging:
  level:
    root: INFO
    org.springframework.web: DEBUG
    com.alx.ecommerce: DEBUG # Adjust for your package
    org.hibernate.SQL: DEBUG # To see generated SQL
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE # To see SQL parameters

---
# Docker Profile
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://ecommerce-db:5432/ecommerce_db
    username: ecommerce_user
    password: password
  data:
    redis:
      host: redis
      port: 6379
```