server:
  port: 8080

spring:
  application:
    name: appinsight
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:appinsight_db}
    username: ${DB_USER:appinsight_user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none # Managed by Flyway
    show-sql: false # Set to true for debugging SQL
    properties:
      hibernate:
        format_sql: false
    open-in-view: false # Prevents lazy loading issues in web layer
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    cache-names:
      - applications
      - metrics
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=60s

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,beans
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:verySecretKeyForAppInsightMonitoringSystemThatIsLongAndSecureForProductionUse} # Use a strong, environment-specific secret
  expiration: 86400000 # 24 hours in milliseconds

# Rate Limiting Configuration (Bucket4j)
bucket4j:
  filters:
    - url: "/api/metric-data/**"
      rate-limits:
        - capacity: 1000 # 1000 requests
          period: 1 # per second
          url-regex: true # Apply to paths matching the regex
      http-statuses:
        too-many-requests: 429
    - url: "/api/applications"
      rate-limits:
        - capacity: 100 # 100 requests
          period: 60 # per minute
      http-statuses:
        too-many-requests: 429

# Logging (see logback-spring.xml for detailed configuration)
logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.appinsight: DEBUG # Set to DEBUG for more detailed application logs

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs