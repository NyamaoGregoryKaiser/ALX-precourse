# Global application settings
spring:
  application:
    name: authentication-system
  profiles:
    active: dev # Default profile
  main:
    web-application-type: servlet # Ensures it's a web application
  # Database configuration (PostgreSQL)
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db # Default for local Docker setup
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver
  # JPA (Hibernate) configuration
  jpa:
    hibernate:
      ddl-auto: validate # 'validate' in production, 'update' or 'create' for dev if needed, 'none' with Flyway
    show-sql: true # Log SQL queries for debugging
    properties:
      hibernate:
        format_sql: true # Format SQL logs
    open-in-view: false # Prevents N+1 issues and keeps session open in view layer (generally set to false)
  # Flyway database migration configuration
  flyway:
    enabled: true
    baseline-on-migrate: true # Baselines schema if it exists but is not versioned by Flyway
    locations: classpath:db/migration # Directory for migration scripts
    create-schemas: true # Allows Flyway to create the database schema if it doesn't exist
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
  # Cache configuration (Caffeine)
  cache:
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m # Default cache settings if not overridden by CacheConfig
  # Web configuration
  web:
    resources:
      add-mappings: true # Enable serving static resources

# Server settings
server:
  port: 8080 # Application runs on port 8080

# Logging configuration
logging:
  config: classpath:logback-spring.xml # Path to Logback configuration file
  level:
    root: INFO
    org.springframework.web: DEBUG # More detailed logging for web requests
    com.alx.auth.system: DEBUG # Detailed logging for our application package
    org.hibernate.SQL: DEBUG # Show prepared statements
    org.hibernate.orm.jdbc.bind: TRACE # Show parameters for prepared statements

# JWT Security properties
application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 # Base64 encoded secret key (highly recommended to generate a strong random one)
      expiration: 86400000 # 24 hours in milliseconds (24 * 60 * 60 * 1000)

# OpenAPI (Swagger) configuration
springdoc:
  api-docs:
    path: /v3/api-docs # Endpoint for the OpenAPI specification
  swagger-ui:
    path: /swagger-ui.html # Endpoint for Swagger UI
    disable-swagger-default-url: true
    display-request-duration: true # Show response time in Swagger UI
    operations-sorter: method # Sort operations by HTTP method
    tags-sorter: alpha # Sort tags alphabetically
```

