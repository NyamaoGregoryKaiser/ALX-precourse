```properties
# Spring Application
spring.application.name=my-mobile-backend
server.port=8080

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5432/alx_mobile_db
spring.datasource.username=alxuser
spring.datasource.password=alxpassword
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none # Flyway will manage schema
spring.jpa.open-in-view=false # Disable Open Session In View
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true

# Flyway Database Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true # Create baseline if schema already exists
spring.flyway.locations=classpath:/db/migration

# Logging Configuration
logging.level.com.alxmobilebackend=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicExtractor=TRACE

# JWT Configuration (Secret Key from Constants is used)
# Constants.java holds the secret and expiration.

# Spring Security
# Enable method level security
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/jwk-set # Dummy, not used directly by our JWT setup, but Spring Boot expects it for certain auto-configurations. Our JwtService handles JWT.

# Caching Configuration (Caffeine)
spring.cache.type=caffeine
spring.cache.cache-names=products,users,orders
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=60s

# OpenAPI (Swagger) Configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packagesToScan=com.alxmobilebackend.controller
springdoc.pathsToMatch=/api/v1/**

# Actuator Endpoints (for monitoring)
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,beans,caches
management.endpoint.health.show-details=always
```