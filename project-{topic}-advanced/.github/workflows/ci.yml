```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-lint-test-build:
    name: Backend Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Run backend lint
        run: npm run lint

      - name: Setup test database (PostgreSQL)
        run: |
          docker run --name test_db -e POSTGRES_DB=perf_monitor_test_db -e POSTGRES_USER=testuser -e POSTGRES_PASSWORD=testpassword -p 5433:5432 -d postgres:15-alpine
          sleep 10 # Give PostgreSQL time to start

      - name: Setup test Redis
        run: |
          docker run --name test_redis -p 6380:6379 -d redis:7-alpine
          sleep 5 # Give Redis time to start

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5433/perf_monitor_test_db
          REDIS_URL: redis://localhost:6380
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_jwt_refresh_secret
          NODE_ENV: test
        run: npm test

      - name: Build backend
        run: npm run build

      - name: Upload backend build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: backend/dist/

  frontend-lint-test-build:
    name: Frontend Lint, Test, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test -- --coverage --watchAll=false

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/build/

  # Basic deployment (example - requires further setup for real production)
  deploy:
    name: Deploy to Production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [backend-lint-test-build, frontend-lint-test-build]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download backend build artifacts
        uses: actions/download-artifact@v3
        with:
          name: backend-build
          path: backend/dist

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v3
        with:
          name: frontend-build
          path: frontend/build

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker images
        run: |
          docker-compose -f docker-compose.prod.yml build
          docker tag perf-monitor-backend_backend:latest your_docker_username/perf-monitor-backend:${{ github.sha }}
          docker tag perf-monitor-frontend_frontend:latest your_docker_username/perf-monitor-frontend:${{ github.sha }}
          docker push your_docker_username/perf-monitor-backend:${{ github.sha }}
          docker push your_docker_username/perf-monitor-frontend:${{ github.sha }}
          docker tag perf-monitor-backend_backend:latest your_docker_username/perf-monitor-backend:latest
          docker tag perf-monitor-frontend_frontend:latest your_docker_username/perf-monitor-frontend:latest
          docker push your_docker_username/perf-monitor-backend:latest
          docker push your_docker_username/perf-monitor-frontend:latest
        env:
          # Define necessary environment variables for prod build if different from dev
          REACT_APP_API_BASE_URL: https://api.yourdomain.com/api/v1 # Example production API URL

      - name: Deploy to Server (e.g., using SSH and Docker Compose)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /path/to/your/app
            # Pull latest images
            docker pull your_docker_username/perf-monitor-backend:latest
            docker pull your_docker_username/perf-monitor-frontend:latest
            # Update docker-compose.yml to use specific image tags or just 'latest'
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans
            docker system prune -f # Clean up old images/containers
```