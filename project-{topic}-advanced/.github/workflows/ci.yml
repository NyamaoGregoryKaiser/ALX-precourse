```yaml
name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn' # Cache node modules for faster builds
          cache-dependency-path: backend/yarn.lock

      - name: Install backend dependencies
        run: |
          cd backend
          yarn install --frozen-lockfile

      - name: Run backend tests
        run: |
          cd backend
          # Use a dedicated test database, or mock TypeORM entirely for unit tests
          # For integration tests, a temporary database container could be started
          yarn test --ci --json --outputFile=test-results.json --coverage
        env:
          # Provide dummy env vars for tests that might need them
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: testdb
          JWT_SECRET: ci_test_secret_for_jwt_validation
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          NODE_ENV: test

      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.json

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-coverage-report
          path: backend/coverage/lcov-report

      - name: Run backend lint
        run: |
          cd backend
          yarn lint

  frontend-build-test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn' # Cache node modules for faster builds
          cache-dependency-path: frontend/yarn.lock

      - name: Install frontend dependencies
        run: |
          cd frontend
          yarn install --frozen-lockfile

      - name: Run frontend tests
        run: |
          cd frontend
          yarn test --ci --json --outputFile=test-results.json --coverage

      - name: Upload Test Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: frontend-test-results
          path: frontend/test-results.json

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: frontend-coverage-report
          path: frontend/coverage/lcov-report

      - name: Run frontend lint
        run: |
          cd frontend
          yarn lint

