```
**GitHub Secrets for CI/CD:**
You'll need to configure the following secrets in your GitHub repository:
*   `DATABASE_URL_TEST`: `postgresql://test_user:test_password@localhost:5433/taskdb_test?schema=public` (This will be overridden by the service URL, but good practice to have it defined)
*   `JWT_SECRET_TEST`: A strong, random string for testing JWTs.
*   `REFRESH_TOKEN_SECRET_TEST`: A strong, random string for testing refresh tokens.
*   (Optional, for deployment) `PROD_DATABASE_URL`, `PROD_JWT_SECRET`, `HEROKU_API_KEY`, etc.

