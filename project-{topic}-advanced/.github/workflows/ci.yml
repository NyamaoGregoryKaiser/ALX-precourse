```yaml
name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint

    - name: Setup Database (PostgreSQL) for tests
      uses: Harmonize-Inc/setup-postgres@v2.0.0
      with:
        postgres-version: '14'
        db-name: 'task_management_test'
        user: 'testuser'
        password: 'testpassword'

    - name: Setup Redis for tests
      uses: supercharge/redis-github-action@1.8.0
      with:
        redis-version: '6'
        redis-password: 'testpassword'

    - name: Generate .env for tests
      run: |
        echo "NODE_ENV=test" >> .env
        echo "PORT=5000" >> .env
        echo "DB_HOST=localhost" >> .env
        echo "DB_PORT=5432" >> .env
        echo "DB_USERNAME=testuser" >> .env
        echo "DB_PASSWORD=testpassword" >> .env
        echo "DB_DATABASE=task_management_test" >> .env
        echo "JWT_SECRET=testsecret" >> .env
        echo "REDIS_HOST=localhost" >> .env
        echo "REDIS_PORT=6379" >> .env
        echo "REDIS_PASSWORD=testpassword" >> .env
        echo "RATE_LIMIT_WINDOW_MS=1000" >> .env
        echo "RATE_LIMIT_MAX_REQUESTS=100" >> .env
        echo "ADMIN_USERNAME=testadmin" >> .env
        echo "ADMIN_EMAIL=testadmin@example.com" >> .env
        echo "ADMIN_PASSWORD=testpassword" >> .env

    - name: Run TypeORM migrations and seeders for tests
      run: |
        npm run db:migrate
        npm run db:seed

    - name: Run tests with coverage
      run: npm test

    - name: Upload coverage report
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # If using Codecov.io
        directory: ./backend/coverage

    - name: Build TypeScript
      run: npm run build

    - name: Store backend build artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-dist
        path: ./backend/dist

  # Frontend CI Job (similar structure)
  frontend-build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: npm ci

    - name: Lint code
      run: npm run lint

    - name: Run tests
      run: npm test

    - name: Build Frontend
      run: npm run build

    - name: Store frontend build artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-dist
        path: ./frontend/dist
```

