```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    services:
      # PostgreSQL database for integration tests
      test_db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: taskdb_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Redis for caching tests
      test_redis:
        image: redis:7-alpine
        ports:
          - 6380:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node.js modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install

      - name: Setup .env for tests
        run: |
          echo "NODE_ENV=test" >> .env
          echo "PORT=5001" >> .env # Use a different port if needed for test environment
          echo "DATABASE_URL=${{ secrets.DATABASE_URL_TEST }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET_TEST }}" >> .env
          echo "JWT_EXPIRATION_TIME=1h" >> .env
          echo "REFRESH_TOKEN_SECRET=${{ secrets.REFRESH_TOKEN_SECRET_TEST }}" >> .env
          echo "REFRESH_TOKEN_EXPIRATION_TIME=7d" >> .env
          echo "REDIS_URL=redis://localhost:6380" >> .env # Point to test_redis service
          echo "LOG_LEVEL=warn" >> .env

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          npm install -g wait-on
          wait-on tcp:5433 -t 30000 # Wait for PostgreSQL on port 5433
          wait-on tcp:6380 -t 30000 # Wait for Redis on port 6380
        env:
          DATABASE_URL_TEST: postgresql://test_user:test_password@localhost:5433/taskdb_test?schema=public

      - name: Generate Prisma client & Run migrations
        run: |
          npx prisma generate --schema=./prisma/schema.prisma
          npx prisma migrate deploy --schema=./prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5433/taskdb_test?schema=public # Use test DB URL here

      - name: Seed test database
        run: npx ts-node prisma/seed.ts
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5433/taskdb_test?schema=public # Use test DB URL here

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm test

      - name: Build TypeScript
        run: npm run build

      # You can add steps for pushing Docker images to a registry (e.g., Docker Hub, AWS ECR)
      # or deploying to a cloud provider (e.g., AWS ECS, Heroku, Vercel) here.

  # Example Deployment Job (simplified - often involves more complex steps)
