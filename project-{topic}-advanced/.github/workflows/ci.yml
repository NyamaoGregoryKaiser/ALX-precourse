```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm install

      - name: Set up database (PostgreSQL)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          sudo systemctl start postgresql.service
          sudo -u postgres psql -c "CREATE USER user WITH PASSWORD 'password';"
          sudo -u postgres psql -c "CREATE DATABASE payment_db OWNER user;"
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: payment_db

      - name: Configure test database URL
        run: echo "DATABASE_URL=postgresql://user:password@localhost:5432/payment_db?schema=public" >> $GITHUB_ENV

      - name: Install Prisma client
        run: npx prisma generate

      - name: Run Prisma migrations
        run: npx prisma migrate deploy

      - name: Run backend tests
        run: npm test

      - name: Build backend
        run: npm run build

      - name: Upload backend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: dist/

  frontend-test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./client

      - name: Run frontend tests
        run: npm test
        working-directory: ./client

      - name: Build frontend
        run: npm run build
        working-directory: ./client

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

