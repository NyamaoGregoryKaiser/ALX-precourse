name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    name: Build & Test Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Create .env for backend tests
        run: |
          echo "NODE_ENV=test" > ./backend/.env
          echo "PORT=5000" >> ./backend/.env
          echo "DB_HOST=localhost" >> ./backend/.env
          echo "DB_PORT=5432" >> ./backend/.env
          echo "DB_USERNAME=testuser" >> ./backend/.env
          echo "DB_PASSWORD=testpassword" >> ./backend/.env
          echo "DB_DATABASE=testdb" >> ./backend/.env
          echo "JWT_SECRET=testsecret" >> ./backend/.env
          echo "JWT_EXPIRES_IN=1h" >> ./backend/.env
          echo "REDIS_HOST=localhost" >> ./backend/.env
          echo "REDIS_PORT=6379" >> ./backend/.env
          echo "REDIS_PASSWORD=" >> ./backend/.env
          echo "MOCK_CSV_DATA_PATH=./src/db/mock_data/sample_data.csv" >> ./backend/.env
        working-directory: ./backend

      - name: Wait for PostgreSQL to be ready
        run: while ! pg_isready -h localhost -p 5432 -U testuser; do sleep 5; done
        
      - name: Run TypeORM Migrations
        run: npm run migrate:run
        working-directory: ./backend

      - name: Build backend
        run: npm run build
        working-directory: ./backend

      - name: Run backend tests
        run: npm test
        working-directory: ./backend
        env:
          CI: true # Prevents Jest from going into watch mode

      - name: Upload Backend Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: backend-coverage-report
          path: backend/coverage

  build-and-test-frontend:
    name: Build & Test Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: npm install
        working-directory: ./frontend

      - name: Create .env for frontend tests
        run: |
          echo "REACT_APP_API_BASE_URL=http://localhost:5000/api" > .env
        working-directory: ./frontend

      - name: Build frontend
        run: npm run build
        working-directory: ./frontend

      - name: Run frontend tests
        run: npm test -- --watchAll=false
        working-directory: ./frontend
        env:
          CI: true # Prevents Jest from going into watch mode

      - name: Upload Frontend Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: frontend-coverage-report
          path: frontend/coverage

  deploy:
    name: Deploy to Staging/Production
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main' # Deploy only on push to main branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Dummy Deploy Step
        run: |
          echo "Simulating deployment to a cloud provider (e.g., AWS ECR/ECS, GCP GKE, Azure AKS)."
          echo "This would involve:"
          echo "1. Authenticating to your cloud provider."
          echo "2. Building and pushing Docker images to a container registry."
          echo "3. Updating Kubernetes manifests or ECS task definitions."
          echo "4. Applying migrations (backend)."
          echo "5. Restarting services."
          echo "Deployment successful for branch ${{ github.ref }}"