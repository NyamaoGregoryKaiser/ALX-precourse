```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Run ESLint
      run: npm run lint

    - name: Build TypeScript
      run: npm run build

    - name: Set up Docker Compose
      run: docker-compose up -d db

    - name: Wait for PostgreSQL to be ready
      run: |
        docker-compose logs db
        until docker-compose exec db pg_isready -U postgres -d datavizdb; do
          echo "Waiting for postgres..."
          sleep 5
        done
        echo "PostgreSQL is ready."
      timeout-minutes: 5

    - name: Run migrations
      run: npm run migration:run
      env:
        DB_HOST: localhost # Access db directly on host for migrations/tests
        DB_PORT: 5432
        DB_USERNAME: postgres
        DB_PASSWORD: password
        DB_NAME: datavizdb

    - name: Run Backend Tests
      run: npm test
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USERNAME: postgres
        DB_PASSWORD: password
        DB_NAME: datavizdb_test # Use a separate test database
        JWT_SECRET: test_jwt_secret

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: backend-coverage-report
        path: coverage/

  build-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      working-directory: ./frontend
      run: npm install

    - name: Run ESLint
      working-directory: ./frontend
      run: npm run lint

    - name: Run Frontend Tests
      working-directory: ./frontend
      run: npm test -- --coverage --watchAll=false # Run tests once and exit, collect coverage

    - name: Build Frontend
      working-directory: ./frontend
      run: npm run build

    - name: Upload coverage reports
      uses: actions/upload-artifact@v3
      with:
        name: frontend-coverage-report
        path: frontend/coverage/

  deploy-to-staging:
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment:
      name: Staging
      url: https://staging.yourdomain.com
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build and Push Docker Images
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - uses: docker/setup-buildx-action@v2
    - uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: yourusername/data-viz-backend:staging-${{ github.sha }}
    - uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: yourusername/data-viz-frontend:staging-${{ github.sha }}

    - name: Deploy to Staging (SSH)
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        script: |
          cd /path/to/your/staging/app
          docker-compose pull
          docker-compose up -d --build
          docker system prune -f # Clean up old images

  deploy-to-production:
    needs: [build-and-test-backend, build-and-test-frontend]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://yourdomain.com
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Build and Push Docker Images
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - uses: docker/setup-buildx-action@v2
    - uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: yourusername/data-viz-backend:latest
    - uses: docker/build-push-action@v4
      with:
        context: ./frontend
        file: ./frontend/Dockerfile
        push: true
        tags: yourusername/data-viz-frontend:latest

    - name: Deploy to Production (SSH)
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.PRODUCTION_HOST }}
        username: ${{ secrets.PRODUCTION_USERNAME }}
        key: ${{ secrets.PRODUCTION_SSH_KEY }}
        script: |
          cd /path/to/your/production/app
          docker-compose pull
          docker-compose up -d --build
          docker system prune -f
```