```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven and Run Tests
        run: mvn clean install -Dspring.profiles.active=test

      - name: Upload JaCoCo Coverage Report
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # Optional: If you use Codecov for coverage reports
          file: target/site/jacoco/jacoco.xml
          fail_ci_if_error: true
          verbose: true

  docker-build-and-push:
    name: Docker Build & Push
    needs: build-and-test # This job depends on successful build and test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' # Only run for main/develop branch pushes

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t alx-ecommerce-app:${{ github.sha }} . # Tag with commit SHA

      - name: Tag and Push Docker Image (main branch)
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag alx-ecommerce-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-app:latest
          docker tag alx-ecommerce-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-app:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-app:${{ github.sha }}

      - name: Tag and Push Docker Image (develop branch)
        if: github.ref == 'refs/heads/develop'
        run: |
          docker tag alx-ecommerce-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-app:develop
          docker tag alx-ecommerce-app:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-app:develop-${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-app:develop
          docker push ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-app:develop-${{ github.sha }}

  deploy-to-dev:
    name: Deploy to Development
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    environment: Development # GitHub Environment for Dev
    if: github.ref == 'refs/heads/develop' # Deploy develop branch to dev environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Server (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd /opt/alx-ecommerce-dev # Your deploy directory on the server
            docker compose pull ecommerce-app # Pull the latest develop image
            docker compose up -d --remove-orphans
            docker image prune -f # Clean up old images

  deploy-to-prod:
    name: Deploy to Production
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    environment: Production # GitHub Environment for Prod
    if: github.ref == 'refs/heads/main' # Deploy main branch to prod environment

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy to Server (SSH)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_SSH_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/alx-ecommerce-prod # Your deploy directory on the server
            docker compose pull ecommerce-app # Pull the latest main/latest image
            docker compose up -d --remove-orphans
            docker image prune -f # Clean up old images
```