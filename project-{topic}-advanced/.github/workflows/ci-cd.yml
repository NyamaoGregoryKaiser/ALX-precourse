```yaml
name: CI/CD Pipeline for ALX Project Management API

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsqlite3-dev cmake git build-essential

    - name: Clone Crow framework (if not using vcpkg/submodule)
      run: git clone https://github.com/ipkn/crow.git /usr/local/include/crow

    - name: Configure CMake
      run: cmake -B build -DCROW_INCLUDE_DIR=/usr/local/include/crow -DJSON_EXTERNAL_BUILD=ON -DJWT_CPP_EXTERNAL_BUILD=ON -DBUILD_TESTING=ON

    - name: Build application
      run: cmake --build build

    - name: Run Unit and Integration Tests
      working-directory: ./build
      run: |
        # Set up a temporary test database
        mkdir -p test_db
        cp ../.env.example ./.env
        sed -i 's|DATABASE_PATH=db/alx_project_management.db|DATABASE_PATH=test_db/test.db|g' ./.env
        
        # Run DB initialization for tests
        ./init_db

        # Run tests (assuming `run_tests` is the executable created by CMake)
        ./run_tests --gtest_output="xml:test_results.xml"

    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: build/test_results.xml

  build-docker-image:
    needs: build-and-test # Only build image if tests pass
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker image
      id: docker_build
      uses: docker/build-push-action@v3
      with:
        context: .
        push: false # Don't push yet, just build
        tags: alx-project-management-api:latest
        platforms: linux/amd64

    - name: Verify image build
      run: docker images alx-project-management-api:latest

  deploy:
    needs: build-docker-image # Only deploy if image builds successfully
    if: github.ref == 'refs/heads/main' # Deploy only from main branch
    runs-on: ubuntu-latest # Or your specific deployment runner/server

    environment:
      name: Production

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub for push
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker image
      uses: docker/build-push-action@v3
      with:
        context: .
        push: true # Push the image to Docker Hub
        tags: ${{ secrets.DOCKER_USERNAME }}/alx-project-management-api:latest
        platforms: linux/amd64

    - name: Deploy to Server (Example: SSH to update service)
      # This is a placeholder. A real deployment would use Ansible, Kubernetes, AWS ECS, etc.
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Deploying ALX Project Management API..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/alx-project-management-api:latest
          docker stop alx-project-api || true
          docker rm alx-project-api || true
          docker run -d \
            --name alx-project-api \
            -p 18080:18080 \
            -e JWT_SECRET=${{ secrets.PROD_JWT_SECRET }} \
            -e LOG_LEVEL=1 \
            -v /path/to/data/db:/app/db \
            -v /path/to/data/logs:/app/logs \
            ${{ secrets.DOCKER_USERNAME }}/alx-project-management-api:latest
          echo "Deployment complete."
```