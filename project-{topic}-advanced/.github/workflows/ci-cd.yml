name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test-server:
    name: Build & Test Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'server/package-lock.json'

      - name: Install dependencies (server)
        run: npm install
        working-directory: ./server

      - name: Build server
        run: npm run build
        working-directory: ./server

      - name: Setup PostgreSQL for tests
        uses: huafu/docker-action-postgresql@v1
        with:
          postgresql version: '14'
          username: testuser
          password: testpassword
          database: testdb
          port: 5433 # Use a different port to avoid conflicts if needed

      - name: Run server tests
        run: |
          npm test
        working-directory: ./server
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5433
          DB_USER: testuser
          DB_PASSWORD: testpassword
          DB_NAME: testdb
          JWT_SECRET: test_jwt_secret_key
          ENCRYPTION_KEY: thisisatestencryptionkey32chars
          REDIS_URL: redis://localhost:6379 # Not actually used by tests in this setup, but good to define

  build-and-test-client:
    name: Build & Test Client
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies (client)
        run: npm install
        working-directory: ./client

      - name: Run client tests
        run: npm test -- --watchAll=false
        working-directory: ./client

      - name: Build client
        run: npm run build
        working-directory: ./client

  deploy:
    name: Deploy to Render (or other platform)
    needs: [build-and-test-server, build-and-test-client]
    if: github.ref == 'refs/heads/main' # Only deploy on push to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Deploy to Render
        # This is a conceptual step. Actual deployment would involve:
        # 1. Building and pushing Docker images to a registry (e.g., Docker Hub, AWS ECR).
        # 2. Updating Render services to pull the new images.
        # Render has native integration for GitHub repos, so this step might be simpler
        # or even automated by Render itself watching the main branch.
        # For a truly manual trigger, you might use 'curl' to trigger a webhook.
        run: echo "Deployment triggered for main branch. Configure actual deployment steps here."
        # Example for a simple webhook trigger (replace with actual Render API/webhook URL)
        # run: |
        #   curl -X POST ${{ secrets.RENDER_DEPLOY_WEBHOOK }}
        env:
          RENDER_DEPLOY_WEBHOOK: ${{ secrets.RENDER_DEPLOY_WEBHOOK }}