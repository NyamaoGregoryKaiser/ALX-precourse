```yaml
name: CI/CD Pipeline for Chat Application

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('chat-app-backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and Test Backend with Maven
        working-directory: ./chat-app-backend
        run: mvn clean install -DskipTests # Build without running tests first

      - name: Run Backend Unit and Integration Tests
        working-directory: ./chat-app-backend
        run: mvn test
        env:
          # Use placeholder values for test DB, Testcontainers will override
          DB_NAME: test_db
          DB_USER: test_user
          DB_PASSWORD: test_password
          JWT_SECRET_KEY: some_super_secret_key_for_testing_purposes_only

      - name: Generate JaCoCo coverage report (Optional)
        working-directory: ./chat-app-backend
        run: mvn jacoco:report
        # If you want to upload coverage to a service like Codecov
        # - name: Upload coverage to Codecov
        #   uses: codecov/codecov-action@v3
        #   with:
        #     token: ${{ secrets.CODECOV_TOKEN }}
        #     directory: ./chat-app-backend/target/site/jacoco

  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: chat-app-frontend/package-lock.json

      - name: Install Frontend dependencies
        working-directory: ./chat-app-frontend
        run: npm ci

      - name: Run Frontend Tests (e.g., Jest, React Testing Library)
        working-directory: ./chat-app-frontend
        run: npm test -- --coverage --watchAll=false # Run tests with coverage

      - name: Build Frontend
        working-directory: ./chat-app-frontend
        run: npm run build
        env:
          REACT_APP_API_BASE_URL: http://localhost:8080/api/v1 # Placeholder for build
          REACT_APP_WEBSOCKET_URL: ws://localhost:8080/websocket # Placeholder for build

  docker-build-and-push:
    needs: [backend-ci, frontend-ci] # Only run if CI jobs pass
    if: github.ref == 'refs/heads/main' # Only push on merges to main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: yourdockerhubusername/chat-app # Replace with your Docker Hub username

      - name: Build and push Backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./chat-app-backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-backend
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./chat-app-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}-frontend
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_API_BASE_URL=http://your-production-backend-ip-or-domain/api/v1
            REACT_APP_WEBSOCKET_URL=ws://your-production-backend-ip-or-domain/websocket

  # Simplified deployment step (e.g., to a VM using SSH)
  deploy:
    needs: [docker-build-and-push]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://your-chat-app.com # Replace with your app's URL
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH into production server and deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /path/to/your/deployment/directory
            # Pull latest images
            docker compose pull
            # Stop existing services, remove old containers, and start new ones
            docker compose up -d --remove-orphans
            # Clean up old images (optional)
            docker image prune -f
```