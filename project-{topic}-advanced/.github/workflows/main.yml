```yaml
name: CI/CD Pipeline for VisGenius

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test:
    name: Build & Test C++ Backend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Create data directory
      run: mkdir -p data

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libsqlite3-dev

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Debug # Build with debug info for testing

    - name: Build C++ application
      run: cmake --build build --config Debug

    - name: Run Unit Tests
      # Assuming your test executable is named 'VisGenius_Tests' and located in 'build/bin' or directly 'build'
      # We'll create a dedicated test executable for this
      run: |
        # Generate sales_data.csv for tests
        echo "Year,Category,Value,Region" > data/sales_data.csv
        echo "2020,Electronics,1000,North" >> data/sales_data.csv
        echo "2020,Clothing,500,South" >> data/sales_data.csv
        echo "2021,Electronics,1200,North" >> data/sales_data.csv
        echo "2021,Clothing,600,West" >> data/sales_data.csv
        echo "2021,Food,300,East" >> data/sales_data.csv
        echo "2022,Electronics,1500,South" >> data/sales_data.csv
        echo "2022,Clothing,700,North" >> data/sales_data.csv
        # Run tests (assuming tests are built into a separate executable)
        cd build
        ./tests/VisGenius_Tests --gtest_output=xml:test_results.xml

    - name: Upload Test Results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: build/test_results.xml

    - name: Generate Coverage Report
      # This requires gcov/lcov, usually added with specific compiler flags in CMake
      # e.g., add_compile_options(--coverage) and add_link_options(--coverage)
      # For a basic setup, we'll skip the actual generation here, but show the step.
      run: |
        echo "Generating coverage report..."
        # lcov --capture --directory build --output-file coverage.info
        # genhtml coverage.info --output-directory coverage_report
        # echo "Coverage report generated in build/coverage_report"

    - name: Upload Coverage Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: coverage-report
        path: build/coverage_report/ # Path to your generated HTML coverage report

  docker_build_and_push:
    name: Build & Push Docker Image
    needs: build_and_test # Only proceed if tests pass
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' # Only for pushes to main/develop
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Extract Docker metadata (tags, labels)
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: yourdockerhubusername/visgenius
        tags: |
          type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
          type=ref,event=branch
          type=sha,prefix=,suffix=,format=short

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
```