```yaml
name: CI/CD Pipeline for ML Utilities System

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Set up Docker Compose (for Testcontainers)
      run: |
        docker compose version
        docker info

    - name: Build and Test Backend
      working-directory: ./backend
      run: |
        # Use Testcontainers for integration tests, requiring docker-compose.yml or local docker daemon
        # Spring Boot tests will spin up a PostgreSQL container via Testcontainers
        ./mvnw clean install
      env:
        # Provide dummy values for Testcontainers to avoid connection issues if not fully mocked
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: testdb
        DB_USERNAME: testuser
        DB_PASSWORD: testpassword
        JWT_SECRET: a_very_secret_key_for_testing_purposes_only_1234
        JWT_EXPIRATION_MS: 3600000
        INFERENCE_HOST: localhost # Not used in unit/integration tests directly, but needs to be set
        INFERENCE_PORT: 5001

    - name: Upload JaCoCo test report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: backend/target/site/jacoco/jacoco.xml

  build-docker-images:
    runs-on: ubuntu-latest
    needs: build-and-test-backend # Ensure tests pass before building images
    if: github.ref == 'refs/heads/main' # Only push images on main branch
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Backend image
      uses: docker/build-push-action@v5
      with:
        context: ./backend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ml-utilities-backend:latest
          ${{ secrets.DOCKER_USERNAME }}/ml-utilities-backend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Inference Service image
      uses: docker/build-push-action@v5
      with:
        context: ./inference-service
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ml-inference-service:latest
          ${{ secrets.DOCKER_USERNAME }}/ml-inference-service:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/ml-utilities-frontend:latest
          ${{ secrets.DOCKER_USERNAME }}/ml-utilities-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # This job would typically trigger a deployment to a cloud provider
  # deploy:
  #   runs-on: ubuntu-latest
  #   needs: build-docker-images
  #   if: github.ref == 'refs/heads/main'
  #   steps:
  #     - name: Deploy to Kubernetes / ECS / etc.
  #       run: echo "Deployment logic here using kubectl, aws cli, etc."
  #       # For example, update k8s deployment with new image tag
```