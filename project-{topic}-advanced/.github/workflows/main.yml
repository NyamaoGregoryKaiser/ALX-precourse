```yaml
name: Node.js CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: enterprise_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set up environment variables for testing
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/enterprise_test" >> $GITHUB_ENV
          echo "JWT_SECRET=test_jwt_secret" >> $GITHUB_ENV
          echo "REDIS_URL=redis://localhost:6379" >> $GITHUB_ENV
          echo "NODE_ENV=test" >> $GITHUB_ENV

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 10); do
            nc -z localhost 5432 && echo "PostgreSQL is ready" && break
            echo "Waiting for PostgreSQL..."
            sleep 5
          done
      - name: Wait for Redis to be ready
        run: |
          for i in $(seq 1 10); do
            nc -z localhost 6379 && echo "Redis is ready" && break
            echo "Waiting for Redis..."
            sleep 5
          done

      - name: Run database migrations and seeds for tests
        run: npx sequelize-cli db:create && npx sequelize-cli db:migrate && npx sequelize-cli db:seed:all

      - name: Run ESLint
        run: npm run lint

      - name: Run tests with coverage
        run: npm test

      - name: Archive production artifacts (e.g., build image)
        if: success() && github.ref == 'refs/heads/main'
        run: |
          echo "Simulating Docker image build for production..."
          # Example: docker build -t my-app:latest .
          # Example: docker push my-app:latest
          echo "Artifacts archived/pushed."

  deploy_staging:
    name: Deploy to Staging
    needs: build_and_test
    if: success() && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: staging # Define a GitHub environment for staging

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Simulate deployment to staging
        run: |
          echo "Deploying to staging environment..."
          # Replace with actual deployment commands (e.g., SSH, kubectl, AWS CLI, Heroku CLI)
          echo "Deployment to staging complete."

  deploy_production:
    name: Deploy to Production
    needs: build_and_test
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production # Define a GitHub environment for production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Simulate deployment to production
        run: |
          echo "Deploying to production environment..."
          # This step would typically involve pulling the built Docker image and deploying it
          # to a production server/cluster.
          echo "Deployment to production complete."
```