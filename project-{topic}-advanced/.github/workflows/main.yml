# This is a basic GitHub Actions workflow. For enterprise,
# consider more robust security, artifact management, and deployment strategies.
name: CI/CD Pipeline for AppInsight

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -DskipTests

      - name: Run Unit and Integration Tests
        run: mvn test

      - name: Generate JaCoCo Coverage Report
        run: mvn jacoco:report
      
      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          # Optional: Add a step to push to a coverage reporting service like Codecov/SonarQube

      - name: Build Docker image
        run: docker build -t appinsight-backend:${{ github.sha }} .

      - name: Log in to Docker Hub (or other registry)
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker tag appinsight-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/appinsight-backend:${{ github.sha }}
          docker tag appinsight-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/appinsight-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/appinsight-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/appinsight-backend:latest

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # This is a placeholder for actual deployment.
      # In a real-world scenario, you would deploy to Kubernetes, EC2, Azure App Service, etc.
      # using tools like Helm, Terraform, Ansible, or cloud-specific deployment actions.
      - name: Deploy to Staging/Production Environment
        run: |
          echo "Simulating deployment to production environment..."
          echo "Using image: ${{ secrets.DOCKER_USERNAME }}/appinsight-backend:${{ github.sha }}"
          # Example: ssh into server and run docker pull/docker compose up
          # Or call a Kubernetes deployment command
          # Example:
          # ssh -o StrictHostKeyChecking=no user@your-server "
          #   docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          #   docker pull ${{ secrets.DOCKER_USERNAME }}/appinsight-backend:latest
          #   docker-compose -f /path/to/docker-compose.yml down
          #   docker-compose -f /path/to/docker-compose.yml up -d
          # "
          echo "Deployment successful!"