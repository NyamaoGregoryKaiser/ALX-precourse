```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libsqlite3-dev libspdlog-dev git libssl-dev
        # Install GTest - often needs to be built or obtained via package manager
        sudo apt-get install -y libgtest-dev
        cd /usr/src/gtest && sudo cmake . && sudo make && sudo mv libgtest* /usr/lib/

    - name: Setup Crow (download header)
      run: |
        mkdir -p libs
        curl -L https://raw.githubusercontent.com/ipkn/crow/master/crow_all.h -o libs/crow_all.h

    - name: Setup jwt-cpp (clone repository)
      run: |
        git clone https://github.com/Thalhammer/jwt-cpp.git libs/jwt-cpp

    - name: Configure CMake
      run: |
        cmake -B build \
        -DCMAKE_BUILD_TYPE=Debug \
        -DJWT_CPP_PATH=${GITHUB_WORKSPACE}/libs/jwt-cpp \
        -DCROW_HEADERS_PATH=${GITHUB_WORKSPACE}/libs

    - name: Build application
      run: cmake --build build

    - name: Run tests
      run: |
        cd build
        ./mobile_backend_tests

  docker_build_and_push:
    needs: build_and_test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only push to Docker Hub on main branch pushes

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Log in to Docker Hub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v2
      with:
        context: .
        push: true
        tags: yourdockerhubusername/mobile-backend:latest
        platforms: linux/amd64 # Specify platform if needed
        # Pass Crow and jwt-cpp paths for builder stage
        build-args: |
          JWT_CPP_PATH=libs/jwt-cpp
          CROW_HEADERS_PATH=libs

```