name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set up Docker Compose (for DB and Redis)
        run: docker-compose -f docker-compose.yml up -d db db_test redis

      - name: Wait for database to be ready
        run: |
          ./wait-for-it.sh db:5432 --timeout=60 -- echo "PostgreSQL DB is up!"
          ./wait-for-it.sh db_test:5432 --timeout=60 -- echo "Test PostgreSQL DB is up!"
          ./wait-for-it.sh redis:6379 --timeout=60 -- echo "Redis is up!"
        env:
          WAIT_FOR_IT_COMMAND: "nc -z db 5432" # Example wait command

      - name: Run database migrations (dev/main)
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        run: |
          export DATABASE_URL="postgresql://user:password@db:5432/auth_db"
          flask db upgrade
        working-directory: . # Ensure flask commands run from project root

      - name: Run Tests
        env:
          # Use test database URL for tests
          DATABASE_URL: "postgresql://test_user:test_password@db_test:5432/test_auth_db"
          JWT_SECRET_KEY: "test_jwt_secret_key_from_env" # Must match test config
          SECRET_KEY: "test_secret_key_from_env" # Must match test config
          REDIS_HOST: "redis" # Point to the Docker Compose Redis service
          # Set other necessary environment variables for testing config
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing tests/
      
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml # Path to your coverage XML report

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_test
    if: github.ref == 'refs/heads/main' # Only deploy from main branch
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: yourdockerhubusername/auth-system:latest
          file: ./Dockerfile

      - name: Deploy to Server (e.g., using SSH and Docker Compose)
        # This is a conceptual step. Real deployment would involve:
        # - SSH into your server
        # - Pulling the latest Docker image
        # - Running docker-compose up -d --force-recreate
        # - Running database migrations
        run: |
          echo "Simulating deployment to production server..."
          # Example using sshpass (not recommended for production, use SSH agent forwarding)
          # sshpass -p ${{ secrets.SSH_PASSWORD }} ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'EOF'
          #   cd /path/to/your/app
          #   docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
          #   docker-compose pull
          #   docker-compose up -d --force-recreate
          #   docker exec auth-app flask db upgrade # Run migrations on deployed app
          # EOF
        env:
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }} # Use production DB URL for migrations