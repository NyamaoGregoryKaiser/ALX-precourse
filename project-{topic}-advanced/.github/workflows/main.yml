```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Load .env file
        uses: 'intact/env-file-action@v2'
        with:
          path: .env.example # Use example file for CI build, sensitive vars are in secrets

      # Backend steps
      - name: Install Backend Dependencies
        run: npm install --prefix src/backend

      - name: Run Backend Lint
        run: npm run lint --prefix src/backend

      - name: Run Backend Tests
        run: npm test --prefix src/backend
        env:
          # Use database setup from services for tests, or mock it
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: test_user
          DB_PASSWORD: test_password
          DB_NAME: test_db
          DB_DIALECT: postgres
          JWT_SECRET: ci_test_secret
          JWT_EXPIRES_IN: 1h
          ADMIN_EMAIL: admin@test.com
          ADMIN_PASSWORD: password
          CACHE_TTL_SECONDS: 1
          LOG_LEVEL: debug
          PORT: 5001 # Use a different port for CI tests

      # Frontend steps
      - name: Install Frontend Dependencies
        run: npm install --prefix src/frontend

      - name: Run Frontend Lint
        run: npm run lint --prefix src/frontend

      - name: Run Frontend Tests
        run: npm test --prefix src/frontend
        env:
          CI: true # Required for React scripts test in CI environments
          REACT_APP_API_URL: http://localhost:5001 # Mocked or pointing to a test backend if needed

      - name: Build Frontend
        run: npm run build --prefix src/frontend

      # Docker build (optional, can be done in a separate job for deployment)
      - name: Build Docker Images
        run: |
          docker build -t product-backend:latest -f src/backend/Dockerfile src/backend
          docker build -t product-frontend:latest -f src/frontend/Dockerfile src/frontend

