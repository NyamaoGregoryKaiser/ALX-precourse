```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in `seq 1 10`; do
            echo "Waiting for postgres... attempt $i"
            sudo docker logs postgres
            pg_isready -h localhost -p 5432 -U testuser -d test_db && break
            sleep 5
          done

      - name: Wait for Redis to be ready
        run: |
          for i in `seq 1 10`; do
            echo "Waiting for redis... attempt $i"
            redis-cli ping && break
            sleep 5
          done

      - name: Set up .env for testing
        run: |
          cp .env.example .env
          sed -i 's/DB_HOST=localhost/DB_HOST=localhost/' .env
          sed -i 's/DB_USER=user/DB_USER=testuser/' .env
          sed -i 's/DB_PASSWORD=password/DB_PASSWORD=testpassword/' .env
          sed -i 's/DB_NAME=payment_db/DB_NAME=test_db/' .env
          sed -i 's/REDIS_HOST=localhost/REDIS_HOST=localhost/' .env
          sed -i 's/REDIS_PORT=6379/REDIS_PORT=6379/' .env
          sed -i 's/NODE_ENV=development/NODE_ENV=test/' .env

      - name: Run database migrations and seeders
        run: npm run db:setup

      - name: Run ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' # Only deploy from main branch

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (Example for AWS)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1 # Change to your region

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY_URL }} # e.g., 123456789012.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY_URL }}
          ECR_REPOSITORY: payment-processor
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to ECS (Example for AWS ECS)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: # Path to your task definition JSON
          service: # Your ECS service name
          cluster: # Your ECS cluster name
          # You would typically generate a new task definition or update existing one
          # See AWS documentation for full ECS deployment options
          # This is a placeholder for a more complex deployment strategy.
        run: echo "Simulating deployment to production via ECS"
        # Actual deployment would involve updating a task definition and service
        # or using tools like Terraform/Pulumi/Ansible.
```