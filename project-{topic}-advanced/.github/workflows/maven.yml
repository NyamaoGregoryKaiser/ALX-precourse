name: Java CI with Maven and Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Cache Maven modules
      uses: actions/cache@v3
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven and Run Tests
      # We need to explicitly pass JWT_SECRET for integration tests that might rely on it.
      # For a real CI, this would come from GitHub Secrets.
      env:
        JWT_SECRET: your_test_jwt_secret_key_for_ci_256_bit_long
      run: mvn -B package --file pom.xml

    - name: Build Docker image
      run: docker build . --file Dockerfile --tag alx-scraper:latest

    - name: Verify Docker image
      run: docker images alx-scraper

    # Optional: Upload test reports/artifacts
    - name: Upload JaCoCo test report
      uses: actions/upload-artifact@v3
      with:
        name: jacoco-report
        path: target/site/jacoco

