```yaml
name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      run: npm install

    - name: Lint Frontend
      run: npm run lint

    - name: Build Frontend
      run: npm run build

    - name: Run Frontend Tests
      run: npm test -- --coverage

    - name: Upload coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: frontend-coverage-report
        path: frontend/coverage
```
*(Note: `docker-compose.test.yml` for CI would be a stripped-down version of the main `docker-compose.yml`, primarily for the database and redis, possibly on different ports to avoid conflicts with other services.)*