```yaml
version: '3.8'
services:
  db:
    image: postgres:15-alpine
    container_name: product_db_test
    environment:
      POSTGRES_DB: product_db_test
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432" # Expose to host for GitHub Actions
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d product_db_test"]
      interval: 5s
      timeout: 3s
      retries: 5
```