```nginx
server {
  listen 80;

  # Replace with your actual domain in production
  server_name localhost;

  root /usr/share/nginx/html;
  index index.html index.htm;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # Add CORS headers for API if Nginx is acting as a proxy to a different domain
  # This config assumes Nginx is serving frontend and a separate Nginx/service
  # is handling the backend. If this Nginx proxies backend, add relevant locations.
  # For direct container-to-container communication with backend, CORS might be handled by backend.
}
```