```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager Pro - Frontend Demo</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div class="container">
        <h1>Task Manager Pro</h1>

        <!-- Auth Section -->
        <section id="auth-section" class="card">
            <h2>Authentication</h2>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email" required value="user@taskmgr.com">
                <input type="password" id="password" placeholder="Password" required value="userpassword">
                <button type="submit" id="login-button">Login</button>
                <button type="button" id="register-button">Register (Default: user@taskmgr.com/userpassword)</button>
            </form>
            <p id="auth-message" class="message"></p>
        </section>

        <!-- User Info Section -->
        <section id="user-info-section" class="card hidden">
            <h2>Welcome, <span id="user-fullname"></span>!</h2>
            <p>Your Role(s): <span id="user-roles"></span></p>
            <button id="logout-button">Logout</button>
        </section>

        <!-- Task Management Section -->
        <section id="task-management-section" class="card hidden">
            <h2>My Tasks</h2>
            <div id="task-list">
                <!-- Tasks will be loaded here -->
            </div>
            <h3>Add New Task</h3>
            <form id="add-task-form">
                <input type="text" id="task-title" placeholder="Task Title" required>
                <textarea id="task-description" placeholder="Task Description"></textarea>
                <input type="datetime-local" id="task-due-date" required>
                <select id="task-status" required>
                    <option value="PENDING">PENDING</option>
                    <option value="IN_PROGRESS">IN_PROGRESS</option>
                    <option value="COMPLETED">COMPLETED</option>
                    <option value="CANCELLED">CANCELLED</option>
                </select>
                <select id="task-category" required>
                    <!-- Categories will be loaded here -->
                </select>
                <button type="submit">Add Task</button>
            </form>
            <p id="task-message" class="message"></p>
        </section>

        <!-- Admin Section (optional, if user is admin) -->
        <section id="admin-section" class="card hidden">
            <h2>Admin Dashboard</h2>
            <h3>All Categories</h3>
            <div id="category-list">
                <!-- Categories will be loaded here -->
            </div>
            <h3>Add New Category</h3>
            <form id="add-category-form">
                <input type="text" id="category-name" placeholder="Category Name" required>
                <button type="submit">Add Category</button>
            </form>
            <p id="admin-message" class="message"></p>
        </section>
    </div>

    <script src="/frontend/app.js"></script>
</body>
</html>
```
