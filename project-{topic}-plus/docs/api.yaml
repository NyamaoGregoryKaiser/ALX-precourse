openapi: 3.0.0
info:
  title: Project Management System (PMS) API
  description: Comprehensive security implementation for a Project Management System.
  version: 1.0.0
servers:
  - url: http://localhost:5000/api/v1
    description: Local Development Server
tags:
  - name: Auth
    description: User authentication and registration
  - name: Users
    description: User management operations (Admin only, or self-management)
  - name: Projects
    description: Project management operations
  - name: Tasks
    description: Task management operations within projects

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        role:
          type: string
          enum: [ADMIN, PROJECT_MANAGER, MEMBER]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - firstName
        - lastName
        - role
    UserRegister:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
      required:
        - email
        - password
        - firstName
        - lastName
    UserLogin:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required:
        - email
        - password
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        managerId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - managerId
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
        priority:
          type: string
        projectId:
          type: string
          format: uuid
        assignedToId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - projectId
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          enum: [fail, error]
        message:
          type: string
        errors:
          type: array
          items:
            type: string
          nullable: true
        stack:
          type: string
          nullable: true
          description: Stack trace (only in development)
      required:
        - status
        - message

paths:
  /health:
    get:
      tags:
        - Health
      summary: Check API health
      responses:
        200:
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  uptime:
                    type: number
                  timestamp:
                    type: string
                    format: date-time
        500:
          $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        201:
          description: User successfully registered and logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  token:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        409:
          $ref: '#/components/schemas/ErrorResponse'
        429:
          $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        200:
          description: User successfully logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  token:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        429:
          $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      tags:
        - Users
      summary: Get all users (Admin only)
      security:
        - bearerAuth: []
      responses:
        200:
          description: A list of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  results:
                    type: number
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Users
      summary: Create a new user (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              allOf: # Combine UserRegister with optional role for admin
                - $ref: '#/components/schemas/UserRegister'
                - type: object
                  properties:
                    role:
                      type: string
                      enum: [ADMIN, PROJECT_MANAGER, MEMBER]
      responses:
        201:
          description: User created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        409:
          $ref: '#/components/schemas/ErrorResponse'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get a user by ID (Admin or self)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: A single user
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Users
      summary: Update a user by ID (Admin or self, self cannot change role)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                firstName:
                  type: string
                lastName:
                  type: string
                role:
                  type: string
                  enum: [ADMIN, PROJECT_MANAGER, MEMBER]
              minProperties: 1
      responses:
        200:
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'
        409:
          $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Users
      summary: Delete a user by ID (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: User deleted successfully
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'

  /projects:
    get:
      tags:
        - Projects
      summary: Get all projects (Access based on role)
      security:
        - bearerAuth: []
      responses:
        200:
          description: A list of projects
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  results:
                    type: number
                  data:
                    type: object
                    properties:
                      projects:
                        type: array
                        items:
                          $ref: '#/components/schemas/Project'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Projects
      summary: Create a new project (Admin or Project Manager)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                startDate:
                  type: string
                  format: date-time
                  nullable: true
                endDate:
                  type: string
                  format: date-time
                  nullable: true
                status:
                  type: string
                managerId:
                  type: string
                  format: uuid
                  description: Required. If Project Manager creates, this defaults to their ID.
              required:
                - name
                - managerId
      responses:
        201:
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      project:
                        $ref: '#/components/schemas/Project'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'

  /projects/{id}:
    get:
      tags:
        - Projects
      summary: Get a project by ID (Access based on role)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: A single project
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      project:
                        $ref: '#/components/schemas/Project'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Projects
      summary: Update a project by ID (Admin or Project Manager)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                  nullable: true
                startDate:
                  type: string
                  format: date-time
                  nullable: true
                endDate:
                  type: string
                  format: date-time
                  nullable: true
                status:
                  type: string
                managerId:
                  type: string
                  format: uuid
              minProperties: 1
      responses:
        200:
          description: Project updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      project:
                        $ref: '#/components/schemas/Project'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Projects
      summary: Delete a project by ID (Admin or Project Manager)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: Project deleted successfully
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'

  /tasks:
    get:
      tags:
        - Tasks
      summary: Get all tasks (Access based on role and filters)
      security:
        - bearerAuth: []
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter tasks by project ID
        - name: assignedToId
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter tasks by assigned user ID (Admin/PM only, Member is self-filtered)
      responses:
        200:
          description: A list of tasks
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  results:
                    type: number
                  data:
                    type: object
                    properties:
                      tasks:
                        type: array
                        items:
                          $ref: '#/components/schemas/Task'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Tasks
      summary: Create a new task (Admin or Project Manager of the project)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                  nullable: true
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                status:
                  type: string
                priority:
                  type: string
                projectId:
                  type: string
                  format: uuid
                assignedToId:
                  type: string
                  format: uuid
                  nullable: true
              required:
                - title
                - projectId
      responses:
        201:
          description: Task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      task:
                        $ref: '#/components/schemas/Task'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'

  /tasks/{id}:
    get:
      tags:
        - Tasks
      summary: Get a task by ID (Access based on role)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        200:
          description: A single task
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      task:
                        $ref: '#/components/schemas/Task'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
        - Tasks
      summary: Update a task by ID (Admin, Project Manager, or Member for status)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                  nullable: true
                dueDate:
                  type: string
                  format: date-time
                  nullable: true
                status:
                  type: string
                priority:
                  type: string
                projectId:
                  type: string
                  format: uuid
                assignedToId:
                  type: string
                  format: uuid
                  nullable: true
              minProperties: 1
      responses:
        200:
          description: Task updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  data:
                    type: object
                    properties:
                      task:
                        $ref: '#/components/schemas/Task'
        400:
          $ref: '#/components/schemas/ErrorResponse'
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
        - Tasks
      summary: Delete a task by ID (Admin or Project Manager of the project)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        204:
          description: Task deleted successfully
        401:
          $ref: '#/components/schemas/ErrorResponse'
        403:
          $ref: '#/components/schemas/ErrorResponse'
        404:
          $ref: '#/components/schemas/ErrorResponse'
```