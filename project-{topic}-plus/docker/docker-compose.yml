version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: scrapeflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql # For initial setup, optional
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: scrapeflow-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: scrapeflow-backend
    restart: always
    env_file:
      - ./.env
    environment:
      DB_HOST: db # Connect to the 'db' service
      REDIS_HOST: redis # Connect to the 'redis' service
    ports:
      - "${PORT}:${PORT}"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend # Mount for live development if needed, remove in production
      - /app/backend/node_modules # Ensure node_modules is not overwritten by host mount
    # Command to run migrations and start the server
    command: sh -c "npm run typeorm:migration:run && npm run start"


  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: scrapeflow-frontend
    restart: always
    env_file:
      - ./.env
    environment:
      REACT_APP_BACKEND_URL: ${BACKEND_URL} # Pass backend URL to React app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend # Mount for live development if needed, remove in production
      - /app/frontend/node_modules # Ensure node_modules is not overwritten by host mount

volumes:
  postgres_data:
  redis_data:
```

