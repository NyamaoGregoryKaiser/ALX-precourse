```yaml
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: taskdb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-HEALTCHECK", "pg_isready", "-U", "user"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Node.js Backend Application
  app:
    build:
      context: ../ # Build context is the parent directory (root of the project)
      dockerfile: ./docker/Dockerfile # Path to the Dockerfile
    restart: always
    environment:
      NODE_ENV: development # Set to 'production' for deployment
      PORT: 3000
      DATABASE_URL: postgresql://user:password@db:5432/taskdb?schema=public
      JWT_SECRET: supersecretkey123! # Change in production! Use a strong, random string.
      JWT_EXPIRES_IN: 7d
      JWT_COOKIE_EXPIRES_IN: 7
      REDIS_URL: redis://redis:6379
      REDIS_CACHE_TTL_SECONDS: 3600
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: adminpassword123
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../src:/app/src # Mount source code for live-reloading in development
      - ../package.json:/app/package.json
      - ../package-lock.json:/app/package-lock.json
      - ../prisma:/app/prisma # Mount prisma directory for migrations/schema
    # Command to run in development with nodemon for live-reloading
    # In production, use the default CMD in Dockerfile ("node src/server.js")
    command: npm run dev
    # This mounts a local .env file. For production, environment variables
    # should ideally be managed by your orchestrator (Kubernetes, ECS, etc.)
    # or passed directly as environment variables in the docker-compose.yml
    # environment section, as shown above.
    env_file:
      - ../.env # Mount the .env file from the root directory for local development

volumes:
  postgres_data:
  redis_data:
```