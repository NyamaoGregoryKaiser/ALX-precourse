version: '3.8'

services:
  db:
    image: postgres:13-alpine
    container_name: ecommerce-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql # Initial schema
      - ./database/seed.sql:/docker-entrypoint-initdb.d/20-seed.sql     # Seed data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: ecommerce-cpp-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db # Service name within docker-compose network
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_POOL_SIZE: ${DB_POOL_SIZE}
      SERVER_HOST: 0.0.0.0 # Listen on all interfaces inside container
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_SECONDS: ${JWT_EXPIRY_SECONDS}
      REDIS_HOST: redis # Service name within docker-compose network
      REDIS_PORT: 6379
      LOG_LEVEL: ${LOG_LEVEL}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs # Mount host logs directory
    restart: always

volumes:
  db_data:
  redis_data:
```

