```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
        working-directory: ./backend

      - name: Lint with Black
        run: |
          black --check .
        working-directory: ./backend
        continue-on-error: true # Optional: allow linting to fail without stopping CI

      - name: Lint with Flake8
        run: |
          flake8 .
        working-directory: ./backend
        continue-on-error: true

      - name: Run backend tests
        env:
          DATABASE_URL: sqlite+aiosqlite:///./test.db # Use a SQLite DB for CI tests
          REDIS_URL: redis://localhost:6379/0 # Mock Redis for tests
          SECRET_KEY: test_secret_key
          ALGORITHM: HS256
        run: |
          pytest
        working-directory: ./backend

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          npm install
        working-directory: ./frontend

      - name: Run frontend tests
        run: |
          npm test # Or 'npm run test:ci' if you have a specific CI command
        working-directory: ./frontend
        continue-on-error: true # Jest tests might require more setup for CI, make optional

      - name: Build frontend for production check
        run: |
          npm run build
        working-directory: ./frontend

