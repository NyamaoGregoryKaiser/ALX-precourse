# .github/workflows/ci.yml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Environment Variables
      run: |
        # Create a .env file from example for Docker Compose during tests
        cp .env.example .env
        # Set dummy/test values for CI/CD, override if specific test values are needed
        echo "APP_ENV=test" >> .env
        echo "DB_HOST=localhost" >> .env # For tests running directly on host, or 'db' for docker-compose based tests
        echo "DB_NAME=project_management_test_db" >> .env
        echo "DB_USER=test_user" >> .env
        echo "DB_PASSWORD=test_password" >> .env
        echo "JWT_SECRET=super-secret-jwt-key-for-testing" >> .env
        echo "LOG_LEVEL=debug" >> .env
      # This .env will be used if tests run locally or by docker-compose within the runner

    - name: Set up Docker BuildX
      uses: docker/setup-buildx-action@v2

    - name: Build Docker Image
      id: docker_build
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./Dockerfile
        push: false # Don't push to registry yet, just build for testing
        tags: project-management-api:latest
        load: true # Load the image into Docker daemon for local use

    - name: Start Database Service
      run: |
        docker run --name ci_test_db -p 5432:5432 \
          -e POSTGRES_DB=${DB_NAME} \
          -e POSTGRES_USER=${DB_USER} \
          -e POSTGRES_PASSWORD=${DB_PASSWORD} \
          -d postgres:15-alpine
      env:
        DB_NAME: project_management_test_db
        DB_USER: test_user
        DB_PASSWORD: test_password

    - name: Wait for PostgreSQL to be ready
      run: |
        MAX_RETRIES=10
        RETRY_COUNT=0
        until docker exec ci_test_db pg_isready -U test_user -d project_management_test_db || [ $RETRY_COUNT -ge $MAX_RETRIES ]; do
          echo "Waiting for PostgreSQL... ($((MAX_RETRIES - RETRY_COUNT)) retries left)"
          sleep 5
          RETRY_COUNT=$((RETRY_COUNT + 1))
        done
        if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
          echo "PostgreSQL did not become ready in time."
          exit 1
        fi
        echo "PostgreSQL is ready!"
      env:
        DB_NAME: project_management_test_db
        DB_USER: test_user
        DB_PASSWORD: test_password

    - name: Apply Database Migrations and Seed Data (using app image)
      run: |
        docker run --rm \
          --network host \
          -e DB_HOST=localhost \
          -e DB_PORT=5432 \
          -e DB_NAME=${DB_NAME} \
          -e DB_USER=${DB_USER} \
          -e DB_PASSWORD=${DB_PASSWORD} \
          -v "$(pwd)/database/migrations":/app/database/migrations \
          -v "$(pwd)/database/seed":/app/database/seed \
          project-management-api:latest /bin/sh -c "
            PGPASSWORD=${DB_PASSWORD} psql -h ${DB_HOST} -U ${DB_USER} -d ${DB_NAME} -f /app/database/migrations/V1__create_tables.sql &&
            PGPASSWORD=${DB_PASSWORD} psql -h ${DB_HOST} -U ${DB_USER} -d ${DB_NAME} -f /app/database/migrations/V2__add_roles_and_seed_data.sql &&
            PGPASSWORD=${DB_PASSWORD} psql -h ${DB_HOST} -U ${DB_USER} -d ${DB_NAME} -f /app/database/seed/seed.sql
          "
      env:
        DB_NAME: project_management_test_db
        DB_USER: test_user
        DB_PASSWORD: test_password

    - name: Run Unit and Integration Tests
      run: |
        # Run tests inside the built Docker image
        docker run --rm \
          --network host \
          -e DB_HOST=localhost \
          -e DB_PORT=5432 \
          -e DB_NAME=${DB_NAME} \
          -e DB_USER=${DB_USER} \
          -e DB_PASSWORD=${DB_PASSWORD} \
          -e JWT_SECRET=${JWT_SECRET} \
          -e APP_PORT=18080 \
          project-management-api:latest /bin/bash -c "
            # Set up CMake for tests
            mkdir -p /app/build && cd /app/build &&
            cmake .. -DBUILD_TESTS=ON &&
            make -j$(nproc) &&
            # Execute tests
            ./tests/run_tests
          "
      env:
        DB_NAME: project_management_test_db
        DB_USER: test_user
        DB_PASSWORD: test_password
        JWT_SECRET: super-secret-jwt-key-for-testing

    # Optional: Push Docker image to a registry on successful merge to main
    # - name: Login to DockerHub
    #   if: github.ref == 'refs/heads/main'
    #   uses: docker/login-action@v2
    #   with:
    #     username: ${{ secrets.DOCKER_USERNAME }}
    #     password: ${{ secrets.DOCKER_PASSWORD }}

    # - name: Push Docker Image
    #   if: github.ref == 'refs/heads/main'
    #   uses: docker/build-push-action@v4
    #   with:
    #     context: .
    #     file: ./Dockerfile
    #     push: true
    #     tags: your-dockerhub-username/project-management-api:latest, your-dockerhub-username/project-management-api:${{ github.sha }}

    - name: Cleanup Docker Containers
      if: always() # Run cleanup even if previous steps fail
      run: |
        docker stop ci_test_db || true
        docker rm ci_test_db || true
```