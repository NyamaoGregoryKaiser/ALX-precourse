name: Django CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install coverage # For coverage report

    - name: Wait for PostgreSQL
      run: |
        /usr/bin/env python -c "
import psycopg2
import time
import os
db_ready = False
for _ in range(10):
    try:
        conn = psycopg2.connect(
            dbname=os.getenv('POSTGRES_DB'),
            user=os.getenv('POSTGRES_USER'),
            password=os.getenv('POSTGRES_PASSWORD'),
            host='localhost',
            port='5432'
        )
        conn.close()
        db_ready = True
        break
    except psycopg2.OperationalError:
        print('DB not ready yet...')
        time.sleep(1)
if not db_ready:
    raise Exception('Database did not become ready in time.')
"
      env:
        POSTGRES_DB: ${{ services.postgres.env.POSTGRES_DB }}
        POSTGRES_USER: ${{ services.postgres.env.POSTGRES_USER }}
        POSTGRES_PASSWORD: ${{ services.postgres.env.POSTGRES_PASSWORD }}

    - name: Create .env for CI
      run: |
        echo "DEBUG=True" >> .env
        echo "SECRET_KEY=ci-test-secret-key-1234567890abcdefghijklmnopqrstuvwxyz" >> .env
        echo "DATABASE_URL=postgres://test_user:test_password@localhost:5432/test_db" >> .env
        echo "CACHE_URL=locmemcache://" >> .env
        echo "ALLOWED_HOSTS=['*']" >> .env

    - name: Run Migrations
      run: python manage.py migrate

    - name: Run Tests with Coverage
      run: |
        coverage run manage.py test
        coverage report --omit='*/migrations/*,*/tests/*,manage.py,my_enterprise_cms/wsgi.py'

    - name: (Optional) Lint with Flake8
      run: |
        pip install flake8
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --max-complexity=10 --max-line-length=120 --statistics

    # Optional: Build Docker Image for CI (useful if you need to push it later)
    - name: Build Docker Image
      run: docker build . --file Dockerfile --tag my-enterprise-cms:latest

    # Optional: Deploy to a staging environment (example placeholder)
    # - name: Deploy to Staging
    #   if: github.ref == 'refs/heads/main'
    #   run: |
    #     echo "Deploying to staging environment..."
    #     # Add your deployment commands here (e.g., ansible, kubectl, caprover, heroku, etc.)
    #   env:
    #     DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
```