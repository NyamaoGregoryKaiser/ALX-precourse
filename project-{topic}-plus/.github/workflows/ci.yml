name: C++ API CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive # If using git submodules for dependencies

    - name: Install system dependencies for build and test
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential cmake libpistache-dev libsqlite3-dev libjsoncpp-dev libssl-dev libgtest-dev

    - name: Create Build Directory
      run: mkdir build

    - name: Configure CMake
      working-directory: ./build
      run: cmake .. -DCMAKE_BUILD_TYPE=Release

    - name: Build Application and Tests
      working-directory: ./build
      run: make -j$(nproc)

    - name: Run Unit and Integration Tests
      working-directory: ./build
      env:
        # Set environment variables for tests.
        # These override defaults in config.h and must be present for JWT.
        # Using specific test values to avoid conflicts.
        APP_PORT: 9081
        DATABASE_PATH: ./data/test_ci.db
        JWT_SECRET: ci_test_jwt_secret_12345
        JWT_EXPIRATION_SECONDS: 10
        DEFAULT_ADMIN_USERNAME: ciadmin
        DEFAULT_ADMIN_PASSWORD: ciadminpass
        LOG_LEVEL: WARN # Keep test logs minimal in CI
      run: |
        # Ensure test data directory exists for database tests
        mkdir -p data
        # Run tests executable
        ./run_tests

    # Optional: Add static analysis (e.g., clang-tidy, cppcheck)
    # - name: Run Static Analysis (e.g., Clang-Tidy)
    #   run: |
    #     # Example, requires more setup in CMake and potentially installing clang-tools
    #     # cmake --build build --target clang-tidy
    #     echo "Static analysis step placeholder"

    # Optional: Build Docker image to ensure Dockerfile is valid
    - name: Build Docker Image
      run: docker build -t cpp-api-system:latest .

  # This job could be for deployment if Continuous Deployment is desired
