name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Poetry (if using, otherwise use pip)
      run: |
        pip install poetry
        poetry config virtualenvs.create false
        poetry install --no-dev
        # Alternative: pip install -r requirements.txt

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Set up Docker Compose
      run: |
        docker-compose version
        docker info

    - name: Start services with Docker Compose
      run: docker-compose -f docker-compose.yml up -d --build

    - name: Wait for services to be healthy
      # This waits for the DB and Redis health checks defined in docker-compose.yml
      # For a more robust wait, you might use a script that polls the app's /health endpoint.
      run: |
        echo "Waiting for DB to be healthy..."
        docker-compose exec db pg_isready -U user -d ml_utils_db -t 0
        echo "Waiting for Redis to be healthy..."
        docker-compose exec redis redis-cli ping

    - name: Run Alembic Migrations and Seed Data (if not done by docker-compose command)
      # This step is often included if `alembic upgrade` is not part of the `command` in docker-compose.yml
      # Or if seed_data.py is run separately.
      # Since `command` in docker-compose.yml already handles it, this might be redundant,
      # but it demonstrates how to run them if needed.
      run: |
        docker-compose exec app alembic upgrade head
        docker-compose exec app python seed_data.py

    - name: Run Unit and Integration Tests
      run: docker-compose exec app pytest /app/tests --cov=/app --cov-report=xml

    - name: Run API Tests (against the running app)
      # Assuming you have specific API tests that use httpx or similar
      run: docker-compose exec app pytest /app/tests/integration/test_api_*.py

    - name: Generate and upload coverage report
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        # token: ${{ secrets.CODECOV_TOKEN }} # Uncomment if using private repos or needing a token
        fail_ci_if_error: true

    - name: Run Performance Tests (Locust) - Example
      # For real performance tests, you'd typically run Locust on a dedicated machine
      # This is a very basic example to demonstrate integration
      run: docker-compose exec app locust -f /app/tests/performance/test_locust.py --web-host 0.0.0.0 --headless --users 10 --spawn-rate 5 --run-time 30s --csv=locust_report

    - name: Stop services
      if: always() # Ensure services are stopped even if previous steps fail
      run: docker-compose -f docker-compose.yml down -v
```

