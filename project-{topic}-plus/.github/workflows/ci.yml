```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build and Test Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache Node.js modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm install

      - name: Set up Docker Compose for DB and Redis
        run: docker-compose -f docker/docker-compose.yml up -d db redis

      - name: Wait for DB and Redis to be healthy
        # Use a loop or wait-for-it equivalent
        run: |
          echo "Waiting for PostgreSQL to be ready..."
          until docker exec mobile-task-backend-db-1 pg_isready -U user; do
            echo "PostgreSQL is unavailable - sleeping"
            sleep 1
          done
          echo "PostgreSQL is up and running."

          echo "Waiting for Redis to be ready..."
          until docker exec mobile-task-backend-redis-1 redis-cli ping; do
            echo "Redis is unavailable - sleeping"
            sleep 1
          done
          echo "Redis is up and running."

      - name: Run Prisma Migrations
        # Ensure DATABASE_URL is correctly set to point to the Dockerized DB
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/taskdb?schema=public

      - name: Seed Database
        run: npm run prisma:seed
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/taskdb?schema=public
          ADMIN_EMAIL: ci_admin@example.com # Use specific admin credentials for CI
          ADMIN_PASSWORD: ci_admin_password

      - name: Run Unit & Integration Tests with Coverage
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov (Optional)
        # uses: codecov/codecov-action@v4
        # with:
        #   token: ${{ secrets.CODECOV_TOKEN }} # Required for private repos
        #   files: ./coverage/*.json # Adjust path to your coverage report
        #   fail_ci_if_error: true # Recommended: fail CI if Codecov upload fails
        #   verbose: true # Optional: enable verbose logging for debug
        run: echo "Skipping Codecov upload. Uncomment if Codecov is configured."

  # Deploy (Optional - placeholder for actual deployment steps)
  deploy:
    name: Deploy to Production
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' # Deploy only on push to main
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://your-app-url.com # Replace with your actual app URL

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t your-dockerhub-username/mobile-task-backend:${{ github.sha }} -f docker/Dockerfile .

      - name: Log in to Docker Hub (or other registry)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push your-dockerhub-username/mobile-task-backend:${{ github.sha }}

      - name: Deploy to Cloud Provider (e.g., Kubernetes, AWS ECS, Google Cloud Run)
        run: |
          echo "Deploying to production environment..."
          # Example: Kubernetes deployment (requires kubectl configured)
          # kubectl apply -f kubernetes/deployment.yaml
          # kubectl set image deployment/mobile-task-backend mobile-task-backend=your-dockerhub-username/mobile-task-backend:${{ github.sha }}
          echo "Deployment steps go here. This is a placeholder."
```