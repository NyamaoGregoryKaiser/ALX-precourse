```yaml
name: Python CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # Set a timeout for the entire job

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: cms_test_db
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install alembic # ensure alembic is available for migrations

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          echo "Waiting for PostgreSQL..."
          for i in `seq 1 10`; do
            nc -z localhost 5432 && break
            echo "PostgreSQL not ready, waiting..."
            sleep 5
          done
          nc -z localhost 5432 || (echo "PostgreSQL not available after 50 seconds. Exiting." && exit 1)

          echo "Waiting for Redis..."
          for i in `seq 1 10`; do
            nc -z localhost 6379 && break
            echo "Redis not ready, waiting..."
            sleep 5
          done
          nc -z localhost 6379 || (echo "Redis not available after 50 seconds. Exiting." && exit 1)
        
        env:
          POSTGRES_USER: testuser
          POSTGRES_DB: cms_test_db

      - name: Run Alembic Migrations
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/cms_test_db
        run: |
          # Initialize Alembic if not already
          # alembic init -t generic alembic_migrations_temp_dir && mv alembic_migrations_temp_dir/* alembic/ && rm -rf alembic_migrations_temp_dir
          # For an existing project, just use 'alembic upgrade head'
          alembic upgrade head

      - name: Run tests with pytest and coverage
        env:
          FLASK_ENV: testing
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/cms_test_db
          SECRET_KEY: ci_secret_key
          JWT_SECRET_KEY: ci_jwt_secret_key
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_TOKEN_EXPIRES_SECONDS: 1 # Short expiry for tests
          JWT_REFRESH_TOKEN_EXPIRES_DAYS: 1 # Short expiry for tests
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term-missing
          
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          verbose: true
```