```yaml
name: CI/CD Pipeline for Product Management System

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Docker Compose for integration tests
        run: |
          docker-compose -f docker-compose-test.yml pull
          docker-compose -f docker-compose-test.yml up -d db

      - name: Wait for PostgreSQL to be ready
        run: |
          ./wait-for-it.sh -t 60 --host=localhost --port=5432 -- /bin/true
        env:
          WAIT_FOR_TIMEOUT: 60

      - name: Build and run tests
        run: |
          ./mvnw clean install
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: product_db_test
          DB_USER: testuser
          DB_PASSWORD: testpass
          JWT_SECRET: yourtestsecretkeyforci

      - name: Upload JaCoCo test report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/jacoco.xml
          retention-days: 7

      - name: Generate JUnit Test Report
        run: |
          mkdir -p target/surefire-reports
          cp target/surefire-reports/*.xml target/surefire-reports/
        continue-on-error: true

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "target/surefire-reports/**/*.xml"
          check_name: "JUnit Test Results"

      - name: Stop Docker Compose for tests
        if: always()
        run: docker-compose -f docker-compose-test.yml down

  docker-build-and-push:
    needs: build-and-test # Only run if build and tests pass
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' # Only push to Docker Hub on main branch pushes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/product-management-system:latest
          build-args: |
            DB_HOST=db
            DB_PORT=5432
            DB_NAME=${{ env.DB_NAME }}
            DB_USER=${{ env.DB_USER }}
            DB_PASSWORD=${{ env.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }} # Use repository secret for JWT_SECRET
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Optional: Simulate deployment to a server
  # In a real-world scenario, this would involve deploying to Kubernetes, EC2, Azure App Service, etc.
  # For this example, we'll just log that it would deploy.
  deploy:
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production # Define a production environment
      url: https://your-app-url.com # URL to the deployed application
    steps:
      - name: Simulate deployment
        run: |
          echo "Simulating deployment of ${{ secrets.DOCKER_USERNAME }}/product-management-system:latest to production environment."
          echo "This would typically involve SSHing to a server, pulling the latest image, and restarting the Docker container or deploying to Kubernetes."
          echo "For example, you might use: "
          echo "  ssh user@your-server.com 'docker pull ${{ secrets.DOCKER_USERNAME }}/product-management-system:latest && docker-compose -f /path/to/docker-compose.yml up -d --force-recreate app'"
          echo "Deployment successful! Check the application at https://your-app-url.com"
```