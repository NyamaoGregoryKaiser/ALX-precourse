name: Secure Auth System CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build, Test, and Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for SonarCloud analysis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean install -B # -B for batch mode, no user interaction

      - name: Run Unit & Integration Tests with Coverage
        # Using Maven Surefire and JaCoCo to run tests and generate coverage report
        run: mvn test jacoco:report -B

      - name: Archive Test Results (Surefire Reports)
        uses: actions/upload-artifact@v4
        if: always() # Upload even if tests fail
        with:
          name: surefire-reports
          path: target/surefire-reports

      - name: Archive Test Coverage Report (JaCoCo)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: target/site/jacoco

      # SonarCloud Integration (Optional, but highly recommended for enterprise-grade)
      # Requires SONAR_TOKEN secret in GitHub repository settings
      # Also requires SONAR_HOST_URL, which is typically https://sonarcloud.io
      - name: Analyze with SonarCloud
        # Only run on push to main/develop, not on pull_request (SonarCloud usually runs a PR analysis)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
        uses: SonarSource/sonarcloud-github-action@v2.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: . # SonarCloud expects the project root

  # This job could be expanded for deployment to a cloud provider like AWS ECS, Kubernetes, etc.
  # For this example, we'll demonstrate a simple Docker image push.
  push-to-docker-registry:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test # Only run if build and tests pass
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: 'maven'

      - name: Build JAR (without tests as they ran in previous job)
        run: mvn clean package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/secure-auth-system
          tags: |
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
            type=raw,value={{branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha # Use GitHub Actions cache for Docker build
          cache-to: type=gha,mode=max

  # Example deployment step (conceptual)
