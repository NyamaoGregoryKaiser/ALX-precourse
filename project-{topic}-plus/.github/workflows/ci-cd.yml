# .github/workflows/ci-cd.yml
# GitHub Actions CI/CD Pipeline for ALX-Shop

name: ALX-Shop CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*' # Trigger on version tags like v1.0.0
  pull_request:
    branches:
      - main
      - develop

jobs:
  build_and_test:
    name: Build and Test
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'development' }} # Conditional environment for secrets
    env:
      # Environment variables for tests - adjust as necessary
      DATABASE_USER: alxuser_test
      DATABASE_PASSWORD: alxpassword_test
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: alxshop_test_db # Use a dedicated test database
      ASYNC_DATABASE_URL: postgresql+asyncpg://${{ env.DATABASE_USER }}:${{ env.DATABASE_PASSWORD }}@${{ env.DATABASE_HOST }}:${{ env.DATABASE_PORT }}/${{ env.DATABASE_NAME }}
      TEST_DATABASE_URL: postgresql+asyncpg://${{ env.DATABASE_USER }}:${{ env.DATABASE_PASSWORD }}@${{ env.DATABASE_HOST }}:${{ env.DATABASE_PORT }}/${{ env.DATABASE_NAME }}
      SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }} # Use GitHub Secrets for sensitive data
      REDIS_URI: redis://localhost:6379/0
      LOG_LEVEL: DEBUG # Verbose logging for CI
      ENVIRONMENT: testing # Crucial to tell app/core/config.py to use TEST_DATABASE_URL

    services:
      # Setup PostgreSQL for testing
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ${{ env.DATABASE_USER }}
          POSTGRES_PASSWORD: ${{ env.DATABASE_PASSWORD }}
          POSTGRES_DB: ${{ env.DATABASE_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Setup Redis for caching/rate limiting tests
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        id: cache-pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for PostgreSQL and Redis to be ready
        run: |
          # Wait for PostgreSQL
          for i in `seq 1 10`; do
            nc -z localhost 5432 && echo "PostgreSQL is up!" && break
            echo "Waiting for PostgreSQL..."
            sleep 5
          done
          # Wait for Redis
          for i in `seq 1 10`; do
            nc -z localhost 6379 && echo "Redis is up!" && break
            echo "Waiting for Redis..."
            sleep 5
          done

      - name: Run Alembic Migrations
        # Apply migrations to the test database
        run: |
          export DATABASE_URL=${{ env.ASYNC_DATABASE_URL }}
          alembic upgrade head
        working-directory: .

      - name: Run Seed Data (Optional for tests if needed for initial state)
        run: |
          export ASYNC_DATABASE_URL=${{ env.ASYNC_DATABASE_URL }}
          python seed_data.py
        working-directory: .

      - name: Run Linting (flake8, black, isort, mypy)
        run: |
          flake8 app/ tests/
          black --check app/ tests/
          isort --check-only app/ tests/
          mypy app/

      - name: Run Pytest with Coverage
        run: |
          # Set PYTHONPATH to ensure modules are found correctly
          export PYTHONPATH=$(pwd)
          pytest --cov=app --cov-report=xml --cov-report=term-missing tests/

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # If using Codecov, store token in secrets
          directory: ./coverage/
          fail_ci_if_error: true # Set to true to fail CI if Codecov upload fails
          files: ./coverage.xml # The generated coverage report
          verbose: true # Optional: enable verbose logging for debug

  build_and_push_docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: build_and_test # This job depends on successful completion of build_and_test
    if: success() && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')) # Only push on main branch or tags
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/alx-shop-api
          tags: |
            type=schedule
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=
            # Additional tag for main branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # conceptual deploy job
