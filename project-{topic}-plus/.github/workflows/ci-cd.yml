```yaml
# .github/workflows/ci-cd.yml
name: Java Spring Boot CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven and Run Tests
      run: |
        mvn -B package --file pom.xml
      env:
        # Provide dummy database credentials for testing, or use H2/Testcontainers
        # For this setup, Testcontainers will dynamically manage PostgreSQL.
        DB_HOST: localhost
        DB_PORT: 5432
        DB_NAME: ci_test_db
        DB_USERNAME: ci_user
        DB_PASSWORD: ci_password
        JWT_SECRET_KEY: a_dummy_secret_key_for_testing_in_ci_environment_that_is_long_enough_for_jwt_signing

    - name: Upload JaCoCo Coverage Report
      uses: actions/upload-artifact@v4
      with:
        name: jacoco-report
        path: target/site/jacoco/jacoco.xml

    # Optional: Publish JaCoCo report to Codecov/Coveralls if integrated
    # - name: Publish JaCoCo report to Codecov
    #   uses: codecov/codecov-action@v3
    #   with:
    #     files: target/site/jacoco/jacoco.xml
    #     flags: unittests
    #     name: codecov-umbrella
    #     fail_ci_if_error: true

  # This job will run after build-and-test completes successfully
  deploy:
    name: Deploy to Docker Hub
    runs-on: ubuntu-latest
    needs: build-and-test # Only deploy if build and tests pass
    if: github.ref == 'refs/heads/main' # Only deploy main branch to production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/taskmgr-pro:latest
        secrets: |
            "jwt_secret_key=${{ secrets.JWT_SECRET_KEY }}" # Pass secrets securely

    # Optional: Deploy to a cloud provider (e.g., AWS EC2, Kubernetes, Heroku)
    # - name: Deploy to EC2
    #   uses: appleboy/ssh-action@v1.0.0
    #   with:
    #     host: ${{ secrets.AWS_EC2_HOST }}
    #     username: ${{ secrets.AWS_EC2_USER }}
    #     key: ${{ secrets.AWS_EC2_PRIVATE_KEY }}
    #     script: |
    #       cd /path/to/your/app
    #       docker compose pull
    #       docker compose up -d
    #       docker system prune -f
