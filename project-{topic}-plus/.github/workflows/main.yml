```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    name: Build and Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Run backend tests
        run: |
          cd backend
          npm test

      - name: Build backend Docker image
        run: |
          cd backend
          docker build -t realtime-chat-backend:${{ github.sha }} .

  build-and-test-frontend:
    name: Build and Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests (if any, for this example we'll skip for brevity as react tests can be extensive)
        run: echo "Frontend tests would run here" # npm test

      - name: Build frontend Docker image
        run: |
          cd frontend
          docker build -t realtime-chat-frontend:${{ github.sha }} .

  # You can add a deploy job here that pushes Docker images to a registry
  # and then deploys to a cloud provider like AWS ECS, Kubernetes, etc.
  # For this example, we'll keep it simple to build and test.
```