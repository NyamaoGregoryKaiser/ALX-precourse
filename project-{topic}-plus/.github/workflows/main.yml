name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install database driver if needed for tests (e.g., psycopg2-binary)
        # pip install psycopg2-binary # For PostgreSQL in test environment

    - name: Run Database Migrations (for testing setup)
      run: |
        # For SQLite, it's often simpler to just create the database on the fly for tests
        # For a real DB, you'd run migration commands here
        flask db upgrade
      env:
        SQLALCHEMY_DATABASE_URI: "sqlite:///test_app.db" # Use a dedicated test DB

    - name: Run tests with coverage
      run: |
        pytest --cov=app --cov-report=xml
      env:
        SQLALCHEMY_DATABASE_URI: "sqlite:///test_app.db" # Ensure tests use the same DB
        SECRET_KEY: "test_secret_key"
        JWT_SECRET_KEY: "test_jwt_secret_key"
        FLASK_ENV: "testing"

    - name: Upload coverage report
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        fail_ci_if_error: true
        verbose: true

