name: Java Spring Boot CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: Build & Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # For SonarCloud
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build with Maven and Run Tests
        run: mvn -B verify --file pom.xml

      - name: Analyze with SonarCloud
        if: success() && github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=alx-ecommerce -Dsonar.organization=alx-ecommerce

  docker-build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: success() && github.ref == 'refs/heads/main' # Only push image for main branch successful builds

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Add steps for frontend if you have a frontend Dockerfile and want to push it
      # - name: Build and push frontend Docker image
      #   uses: docker/build-push-action@v5
      #   with:
      #     context: ./frontend
      #     file: ./frontend/Dockerfile
      #     push: true
      #     tags: ${{ secrets.DOCKER_USERNAME }}/alx-ecommerce-frontend:latest
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max

  # This job could be for deploying to a cloud provider, e.g., using SSH to a VM
  # or using a dedicated deployment action for AWS, Azure, GCP.
  # For simplicity, this example just has a placeholder.
  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: success() && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to Server (Placeholder)
        run: |
          echo "Simulating deployment to production server..."
          echo "Run docker compose pull && docker compose up -d on your server."
          # In a real scenario, you'd use SSH to connect to your server and
          # execute commands like 'docker pull' and 'docker compose up -d'.
          # For example:
          # ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no user@your-server-ip "
          #   cd /path/to/your/app &&
          #   docker compose pull &&
          #   docker compose up -d --remove-orphans
          # "
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
```
**Note on CI/CD:**
*   You need to set up GitHub Secrets for `DOCKER_USERNAME`, `DOCKER_PASSWORD`, `SONAR_TOKEN`, `SSH_PRIVATE_KEY`, `DEPLOY_HOST`, `DEPLOY_USER`.
*   SonarCloud integration requires configuring your project on SonarCloud and getting a `SONAR_TOKEN`.
*   The deploy step is a placeholder. Real deployment varies greatly by infrastructure.

