name: CI/CD Pipeline for DataViz App

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install poetry # If using poetry for dependency management

    - name: Set up Docker Compose for services (DB, Redis)
      run: |
        docker-compose -f docker-compose.yml up -d db redis
        # Wait for services to be healthy
        docker-compose -f docker-compose.yml ps
        sleep 10 # Give services some time to start, adjust based on healthchecks
        docker-compose -f docker-compose.yml exec db pg_isready -U user -d dataviz_test || exit 1
        docker-compose -f docker-compose.yml exec redis redis-cli ping || exit 1

    - name: Run Database Migrations and Seed Test Data
      # Use the test database URL for migrations/seeding during tests
      env:
        FLASK_APP: manage.py
        FLASK_ENV: testing
        TEST_DATABASE_URL: postgresql://user:password@localhost:5432/dataviz_test # For local pytest or within container
        DATABASE_URL: postgresql://user:password@db:5432/dataviz_test # For app connecting to docker-compose db
        JWT_SECRET_KEY: test-jwt-secret # Dummy secret for testing
        SECRET_KEY: test-secret # Dummy secret for testing
      run: |
        # Run from the host to ensure `flask` CLI uses the app context to connect to the docker-compose DB
        flask db upgrade
        flask seed

    - name: Run tests with coverage
      env:
        FLASK_APP: manage.py
        FLASK_ENV: testing
        TEST_DATABASE_URL: postgresql://user:password@db:5432/dataviz_test # Ensure app connects to docker-compose db
        REDIS_HOST: redis # Ensure app connects to docker-compose redis
        REDIS_PORT: 6379
        JWT_SECRET_KEY: test-jwt-secret # Dummy secret for testing
        SECRET_KEY: test-secret # Dummy secret for testing
      run: |
        pytest --cov=app --cov-report=xml --cov-report=term-missing tests/

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        token: ${{ secrets.CODECOV_TOKEN }} # Set CODECOV_TOKEN in GitHub secrets
        # directory: ./coverage/reports # If coverage output goes to a specific directory
        fail_ci_if_error: true # Recommended to fail CI if coverage report fails to upload

    - name: Stop Docker Compose services
      if: always()
      run: docker-compose -f docker-compose.yml down --volumes

