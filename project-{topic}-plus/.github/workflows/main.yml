```yaml
name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Lint backend code
        run: npm run lint

      - name: Setup PostgreSQL for tests
        uses: Harmonize-IO/setup-postgres@v1
        with:
          postgres-version: '13'
          database-name: 'test_db'
          username: 'testuser'
          password: 'testpassword'

      - name: Setup Redis for tests
        uses: supercharge/redis-github-action@1.2.0
        with:
          redis-version: 6

      - name: Run backend tests
        env:
          JWT_SECRET: test_secret
          DATABASE_TYPE: postgres
          DATABASE_HOST: localhost # Provided by Harmonize-IO/setup-postgres
          DATABASE_PORT: 5432
          DATABASE_USERNAME: testuser
          DATABASE_PASSWORD: testpassword
          DATABASE_NAME: test_db
          REDIS_HOST: localhost # Provided by supercharge/redis-github-action
          REDIS_PORT: 6379
        run: npm run test:cov # Run with coverage

      # Optional: Build Docker image for backend (e.g., push to registry)
      # - name: Build Docker image
      #   run: docker build -t your-dockerhub-username/scrape-master-backend:latest .
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      # - name: Push Docker image
      #   run: docker push your-dockerhub-username/scrape-master-backend:latest

  build-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Lint frontend code
        run: npm run lint

      - name: Run frontend tests
        run: npm run test -- --watchAll=false # Run tests without watch mode

      - name: Build frontend
        run: npm run build

      # Optional: Build Docker image for frontend (e.g., push to registry)
      # - name: Build Docker image
      #   run: docker build -t your-dockerhub-username/scrape-master-frontend:latest .
      # - name: Log in to Docker Hub
      #   uses: docker/login-action@v2
      #   with:
      #     username: ${{ secrets.DOCKER_USERNAME }}
      #     password: ${{ secrets.DOCKER_PASSWORD }}
      # - name: Push Docker image
      #   run: docker push your-dockerhub-username/scrape-master-frontend:latest
