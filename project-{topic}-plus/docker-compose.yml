version: '3.9'

services:
  db:
    image: postgres:15-alpine
    container_name: ml_utils_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ml_utils_db}
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - pg_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-ml_utils_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ml_utils_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ml_utils_app
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Wait for database to be healthy
      redis:
        condition: service_healthy # Wait for redis to be healthy
    command: >
      sh -c "alembic upgrade head &&
             python seed_data.py &&
             uvicorn main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./app:/app/app # Mount the app directory for live code changes during development
      - ./main.py:/app/main.py
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./seed_data.py:/app/seed_data.py
      - ./tests:/app/tests
      - ./pytest.ini:/app/pytest.ini

volumes:
  pg_data:
```

