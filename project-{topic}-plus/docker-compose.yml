version: '3.8'

services:
  db:
    image: postgres:13-alpine
    restart: always
    environment:
      POSTGRES_DB: dataviz_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose for local development/debugging, remove in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dataviz_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379" # Expose for local development/debugging, remove in production
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "5000:5000"
    environment:
      # Load variables from .env file. In production, these should be managed by your orchestrator.
      # Docker Compose automatically picks up .env file in the same directory.
      FLASK_ENV: development # Override to production in production deployment
      DATABASE_URL: postgresql://user:password@db:5432/dataviz_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATELIMIT_STORAGE_URL: redis://redis:6379/1
      # SECRET_KEY and JWT_SECRET_KEY should be set in .env for dev,
      # and securely managed in prod.
      # MAX_UPLOAD_SIZE_MB: 50 # Example, can be in .env

    volumes:
      - .:/app
      # If you need persistent storage for uploaded files, map a volume:
      # - ./data_uploads:/app/data_uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Wait for the database to be ready and apply migrations before starting the app
    command: >
      sh -c "flask db upgrade &&
             flask seed && # Only run seed if DB is empty, or remove for production
             gunicorn --bind 0.0.0.0:5000 --workers 4 --timeout 120 --log-level info manage:app"

  # Optional: Frontend service (example)
  # frontend:
  #   build: ./frontend # Assuming a frontend directory with its own Dockerfile
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - backend

volumes:
  postgres_data:
  redis_data: