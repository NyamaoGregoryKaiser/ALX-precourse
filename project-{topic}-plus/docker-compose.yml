version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: project_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "5432:5432" # Standard port for PostgreSQL
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: always
    env_file:
      - .env # Load environment variables from .env file
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy # Wait for DB to be healthy
      redis:
        condition: service_healthy # Wait for Redis to be healthy
    command: ["/bin/sh", "-c", "sleep 5 && alembic upgrade head && python app/seed_data.py && gunicorn app.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000"]
    # The 'sleep 5' is a rudimentary wait for DB, 'service_healthy' is better but sometimes network takes a moment.
    # `alembic upgrade head` applies migrations on startup
    # `python app/seed_data.py` runs the seed script after migrations. REMOVE THIS FOR PRODUCTION AFTER INITIAL SEEDING!
    # In production, you'd typically run `alembic upgrade head` and `python app/seed_data.py` as separate CI/CD steps,
    # not as part of the main `command` to avoid re-seeding on every restart.

volumes:
  postgres_data:
