```yaml
version: '3.8'

services:
  db:
    image: postgres:13-alpine
    restart: always
    environment:
      POSTGRES_DB: performance_monitor_dev # Use dev db name for simplicity
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
    ports:
      - "5432:5432" # Expose for local access if needed
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d performance_monitor_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379" # Expose for local access if needed
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: always
    ports:
      - "5000:5000"
    environment:
      # Inject .env variables from the host using env_file
      # Or specify them directly here if not using .env
      FLASK_CONFIG: development # Use 'development' for easier debugging in Docker
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DEV_DATABASE_URL: postgresql://dev_user:dev_password@db:5432/performance_monitor_dev # Use 'db' as hostname for PostgreSQL
      REDIS_HOST: redis # Use 'redis' as hostname for Redis
      REDIS_PORT: ${REDIS_PORT}
      REDIS_DB: ${REDIS_DB}
      DEFAULT_POLLING_INTERVAL_SECONDS: ${DEFAULT_POLLING_INTERVAL_SECONDS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app # Mount current directory to /app for live code changes during development
              # Remove or change for production to copy code at build time
    # This command first applies migrations, then seeds the DB, then starts the Gunicorn app
    # This is useful for initial setup, but in production, migrations/seeding might be
    # separate steps in a CI/CD pipeline or an explicit `docker exec` command.
    command: >
      sh -c "flask db upgrade && python scripts/seed_db.py && gunicorn --bind 0.0.0.0:5000 --workers 4 run:app"
    # If not using the combined command above, use `command: ["gunicorn", "--bind", "0.0.0.0:5000", "--workers", "4", "run:app"]`

volumes:
  db_data:
  redis_data:

```