```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: product_db
    environment:
      POSTGRES_DB: ${DB_NAME:-product_db}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-adminpass}
    volumes:
      - product_db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product_management_app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db # Connect to the 'db' service within the Docker network
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-product_db}
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-adminpass}
      JWT_SECRET: ${JWT_SECRET:supersecretkeythatisatleast256bitlongforproductionuse1234567890}
    depends_on:
      db:
        condition: service_healthy # Ensure DB is healthy before starting app
    restart: always

  prometheus:
    image: prom/prometheus:v2.42.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command: --config.file=/etc/prometheus/prometheus.yml --web.enable-remote-write-receiver
    ports:
      - "9090:9090"
    depends_on:
      - app
    restart: always

  grafana:
    image: grafana/grafana:9.4.3
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./monitoring/grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboard.yml
      - ./monitoring/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: always

  # Optional: Adminer for database GUI access
  adminer:
    image: adminer:4.8.1
    container_name: adminer
    ports:
      - "8081:8080"
    depends_on:
      - db
    restart: always

volumes:
  product_db_data:
  prometheus_data:
  grafana_data:
```