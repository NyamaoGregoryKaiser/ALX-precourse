```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      # Load environment variables from .env file directly (for development)
      # In production, these would be managed by your orchestrator or CI/CD
      FLASK_ENV: development
      SECRET_KEY: ${SECRET_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      JWT_ACCESS_TOKEN_EXPIRES_SECONDS: ${JWT_ACCESS_TOKEN_EXPIRES_SECONDS}
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: ${JWT_REFRESH_TOKEN_EXPIRES_DAYS}
    volumes:
      - .:/app # Mount current directory to /app in container for live code changes (dev)
    depends_on:
      - db
      - redis
    # Command to run alembic migrations and then start the app
    # In a real production setup, migrations might be run as a separate step/container
    command: >
      sh -c "alembic upgrade head && python scripts/seed_db.py && gunicorn --bind 0.0.0.0:5000 --workers 4 app.main:app"
    # Added health check for robust deployment - depends_on doesn't wait for "ready" state
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432" # Expose for local debugging, remove in prod if not needed
    volumes:
      - cms_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379" # Expose for local debugging, remove in prod if not needed
    volumes:
      - redis_data:/data

volumes:
  cms_data:
  redis_data:
```