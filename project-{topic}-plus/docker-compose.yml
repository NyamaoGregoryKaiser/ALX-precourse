```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dataviz_db
    environment:
      POSTGRES_DB: datavizdb
      POSTGRES_USER: datavizuser
      POSTGRES_PASSWORD: datavizpass
    ports:
      - "5432:5432"
    volumes:
      - dataviz_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U datavizuser -d datavizdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dataviz_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/datavizdb
      SPRING_DATASOURCE_USERNAME: datavizuser
      SPRING_DATASOURCE_PASSWORD: datavizpass
      # Ensure JWT secret and other sensitive info are passed securely in production
      APPLICATION_SECURITY_JWT_SECRET_KEY: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      APPLICATION_SECURITY_JWT_EXPIRATION: 86400000
    depends_on:
      db:
        condition: service_healthy # Wait for the DB to be healthy
    # To attach a debugger, uncomment the following line and configure your IDE
    # command: java -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005 -jar app.jar
    # ports:
    #   - "5005:5005"


volumes:
  dataviz_db_data:
```