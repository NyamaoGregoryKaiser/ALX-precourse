```yaml
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: chat_db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chat_backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app  # Mount source for live reload during dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chat_frontend
    environment:
      - REACT_APP_BACKEND_URL=${FRONTEND_BACKEND_URL}
      - REACT_APP_WEBSOCKET_URL=${FRONTEND_WEBSOCKET_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app # Mount source for live reload during dev
      - /app/node_modules # Exclude node_modules from host mount
    depends_on:
      - backend
    command: npm start
    restart: on-failure

volumes:
  postgres_data:
```