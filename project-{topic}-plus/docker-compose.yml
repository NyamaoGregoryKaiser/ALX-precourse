version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pms_db
    ports:
      - "5432:5432" # Map host port 5432 to container port 5432
    volumes:
      - pms_db_data:/var/lib/postgresql/data # Persist database data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d pms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend # Path to your backend Dockerfile
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://user:password@db:5432/pms_db?schema=public # Connect to the 'db' service
      JWT_SECRET: your_super_secret_jwt_key_here # Replace with a strong, random key
      SALT_ROUNDS: 10
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 100
      RATE_LIMIT_GUEST_MAX_REQUESTS: 20
      CACHE_TTL_SECONDS: 300
      LOG_LEVEL: info
    ports:
      - "5000:5000" # Map host port 5000 to container port 5000
    depends_on:
      db:
        condition: service_healthy # Ensure DB is healthy before starting backend
    # If using `.env` file instead of passing all env vars explicitly:
    # env_file:
    #   - ./backend/.env # Make sure this path is correct if Dockerfile doesn't copy .env
    # The current Dockerfile copies .env.example and expects variables to be passed explicitly or mounted.

volumes:
  pms_db_data:
