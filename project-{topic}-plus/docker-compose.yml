version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      # Mount migration scripts to be executed by initdb if they are executable
      # For a more robust migration system, you'd use a dedicated migration tool (e.g., Flyway, Liquibase, or a custom script)
      # For this example, we'll run them from the app container.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      APP_PORT: ${APP_PORT}
      APP_ENV: ${APP_ENV}
      LOG_LEVEL: ${LOG_LEVEL}
      DB_HOST: db # Use the service name for inter-container communication
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Mount the database scripts to apply migrations and seed data on startup
      - ./database/migrations:/app/database/migrations
      - ./database/seed:/app/database/seed
    command: >
      /bin/sh -c "
        echo 'Waiting for database to be ready...' &&
        until PGPASSWORD=${DB_PASSWORD} psql -h db -U ${DB_USER} -d ${DB_NAME} -c '\q'; do
          >&2 echo 'Postgres is unavailable - sleeping'
          sleep 1
        done &&
        >&2 echo 'Postgres is up - applying migrations and seeding data!' &&
        # Apply migrations
        PGPASSWORD=${DB_PASSWORD} psql -h db -U ${DB_USER} -d ${DB_NAME} -f /app/database/migrations/V1__create_tables.sql &&
        PGPASSWORD=${DB_PASSWORD} psql -h db -U ${DB_USER} -d ${DB_NAME} -f /app/database/migrations/V2__add_roles_and_seed_data.sql &&
        # Seed data
        PGPASSWORD=${DB_PASSWORD} psql -h db -U ${DB_USER} -d ${DB_NAME} -f /app/database/seed/seed.sql &&
        >&2 echo 'Migrations and seed data applied!' &&
        # Start the application
        /usr/local/bin/project_management_api
      "

volumes:
  db_data:
