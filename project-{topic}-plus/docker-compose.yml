```yaml
version: '3.8'

services:
  app:
    build: .
    command: /bin/bash -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    # For development, you might want to use the reload option:
    # command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432" # Expose for local development/debugging

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379" # Expose for local development/debugging
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
```