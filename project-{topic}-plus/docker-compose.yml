```yaml
# docker-compose.yml for ALX-Shop development environment

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Command to run the application, overrides CMD in Dockerfile for development
    # Reload allows code changes to take effect without restarting the container.
    # We use 1 worker for development for simplicity and easier debugging.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Mount current directory into /app for live code changes
    depends_on:
      - db
      - redis
    env_file:
      - .env # Load environment variables from .env file
    environment:
      # Override specific variables from .env for Docker environment if needed
      # Ensure DATABASE_HOST points to the service name 'db'
      DATABASE_HOST: db
      REDIS_URI: redis://redis:6379/0
      # Use the test database for development if needed, or explicitly set for local dev DB
      # ENVIRONMENT: development # Ensure consistent environment setting

  db:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432" # Expose DB port for local access if needed (e.g., using pgAdmin)
    volumes:
      - pgdata:/var/lib/postgresql/data # Persistent data volume
    env_file:
      - .env # Load DB credentials from .env
    environment:
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME} # Main database name
      # Optional: Test database for running tests within a separate container/setup
      POSTGRES_TEST_DB: ${TEST_DATABASE_NAME} # If you need a separate DB for tests
                                              # You'd typically create this in your CI/CD setup
                                              # or have a separate docker-compose for testing.
                                              # For this setup, we configure app to use TEST_DATABASE_URL
                                              # if ENVIRONMENT is "testing".

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379" # Expose Redis port for local access if needed
    volumes:
      - redisdata:/data # Persistent data volume

volumes:
  pgdata:
  redisdata:
```