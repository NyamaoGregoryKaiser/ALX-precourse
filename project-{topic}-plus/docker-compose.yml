```yaml
version: '3.8'

services:
  postgres:
    image: postgres:13
    restart: always
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-scrapemaster_db}
      POSTGRES_USER: ${DATABASE_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:6-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # command: sh -c "npm run typeorm migration:run && npm run seed && npm run start:dev" # Run migrations & seeds on startup
    # For local dev, we typically run migrations manually or through a separate script
    command: npm run start:dev
    ports:
      - "3000:3000"
    environment:
      # Pass through all environment variables from host .env to container
      # This is for convenience in dev, in prod use explicit ENV vars or secrets
      - PORT=${PORT:-3000}
      - NODE_ENV=${NODE_ENV:-development}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - DATABASE_TYPE=${DATABASE_TYPE:-postgres}
      - DATABASE_HOST=postgres # Service name in docker-compose
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_USERNAME=${DATABASE_USERNAME:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - DATABASE_NAME=${DATABASE_NAME:-scrapemaster_db}
      - REDIS_HOST=redis # Service name in docker-compose
      - REDIS_PORT=${REDIS_PORT:-6379}
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-100}
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/google-chrome-stable # Path inside the Docker image
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules # Don't overwrite node_modules in container with host's
    # In production, use healthchecks or wait-for-it scripts

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001" # Expose frontend on 3001
    environment:
      - REACT_APP_API_BASE_URL=${REACT_APP_API_BASE_URL:-http://localhost:3000/api}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # In a typical setup, you'd use a reverse proxy like Nginx for frontend on port 80

volumes:
  postgres_data:
  redis_data:
```