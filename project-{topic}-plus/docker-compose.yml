version: '3.8'

services:
  task-manager-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-manager-app
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data  # Persist database file
      - ./logs:/app/logs  # Persist log files
      - ./config.json:/app/config/config.json:ro # Mount config file
    environment:
      # These environment variables override values in config.json
      # Useful for production secrets
      - JWT_SECRET=your_super_secret_jwt_key_that_is_at_least_32_characters_long_and_ideally_64_bytes_from_env
      - API_PORT=8080
      - DB_PATH=/app/data/app.db
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"] # Add a health check endpoint if implemented
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true # Best practice: Prevent container processes from gaining new privileges
    cap_drop:
      - ALL # Drop all capabilities
    cap_add:
      - NET_BIND_SERVICE # Only add necessary capabilities, e.g., to bind to privileged ports if running as non-root (though we use 8080)
    read_only: true # Make the root filesystem read-only to prevent unauthorized writes, except for volumes

# To build: docker-compose build
# To run: docker-compose up -d
# To stop: docker-compose down