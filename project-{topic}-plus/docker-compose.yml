# docker-compose.yml for local development environment

version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpp-devops-app
    # Use .env file for environment variables
    env_file:
      - .env
    ports:
      - "${APP_PORT}:${APP_PORT}" # Map host port to container port
    volumes:
      # Persist database file in a named volume
      - app_data:/app/data
      # Persist logs in a named volume
      - app_logs:/app/logs
      # Optional: Mount source code for live reloading (if supported by dev setup, not out-of-box with C++)
      # - ./app/src:/app/src
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${APP_PORT}/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    # For debugging:
    # stdin_open: true
    # tty: true

volumes:
  app_data: # This volume will store your SQLite database
  app_logs: # This volume will store your application logs