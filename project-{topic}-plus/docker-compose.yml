version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cpp-api-system-app
    ports:
      - "9080:9080"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    environment:
      # These environment variables are used by the C++ application (config.h)
      # In production, these should be managed securely (e.g., Docker secrets, Vault)
      APP_PORT: 9080
      DATABASE_PATH: /app/data/database.db # Path inside the container
      JWT_SECRET: super_secret_jwt_key_please_change_this_in_production_environment_to_a_random_long_string
      JWT_EXPIRATION_SECONDS: 3600
      RATE_LIMIT_WINDOW_SECONDS: 60
      RATE_LIMIT_MAX_REQUESTS: 100
      DEFAULT_ADMIN_USERNAME: admin
      DEFAULT_ADMIN_PASSWORD: admin_password
      LOG_LEVEL: INFO # Or DEBUG, WARN, ERROR
    # Ensure the entrypoint is executed for migrations/seeding
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: ["api_server"] # Default command to run after entrypoint setup
    restart: unless-stopped # Always restart unless explicitly stopped

volumes:
  app-data:
    driver: local
  app-logs:
    driver: local
