```yaml
version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # Database connection details (matching application.yml)
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskmgr_db
      DB_USERNAME: taskmgr_user
      DB_PASSWORD: password
      # JWT secret key (should be long and complex in production)
      JWT_SECRET_KEY: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      # Spring profiles for different environments (optional, default is 'default')
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      - db
    # Optional: volume for logs if you want to persist them outside the container
    # volumes:
    #   - ./logs:/app/logs
    restart: always

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: taskmgr_db
      POSTGRES_USER: taskmgr_user
      POSTGRES_PASSWORD: password
    volumes:
      - taskmgr_db_data:/var/lib/postgresql/data # Persist database data
    restart: always

volumes:
  taskmgr_db_data:
```