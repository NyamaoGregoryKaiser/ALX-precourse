version: '3.8'

services:
  web:
    build: .
    ports:
      - "5000:5000"
    environment:
      # These environment variables override values from .env for Docker environment
      # In production, use a secrets management system (e.g., Docker Secrets, Vault, AWS Secrets Manager)
      SECRET_KEY: "${SECRET_KEY}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      SQLALCHEMY_DATABASE_URI: "${SQLALCHEMY_DATABASE_URI:-sqlite:////app/instance/app.db}" # Use /app/instance/app.db for persistent SQLite
      JWT_ACCESS_TOKEN_EXPIRES_MINUTES: "${JWT_ACCESS_TOKEN_EXPIRES_MINUTES:-15}"
      JWT_REFRESH_TOKEN_EXPIRES_DAYS: "${JWT_REFRESH_TOKEN_EXPIRES_DAYS:-30}"
      REDIS_URL: "redis://redis:6379/0"
      CACHE_DEFAULT_TIMEOUT: "${CACHE_DEFAULT_TIMEOUT:-300}"
      RATE_LIMIT_DEFAULT: "${RATE_LIMIT_DEFAULT:-200 per day;50 per hour}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FILE_PATH: "/var/log/app/app.log" # Path within the container
    volumes:
      - .:/app
      - app_logs:/var/log/app # Persistent volume for logs
      - app_data:/app/instance # Persistent volume for SQLite DB
    depends_on:
      - redis
    command: gunicorn --bind 0.0.0.0:5000 --workers 4 --threads 2 "main:app" # Override Dockerfile CMD for development

  redis:
    image: redis:6.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data # Persistent volume for Redis data

volumes:
  app_logs:
  app_data:
  redis_data:
