```yaml
version: '3.8'

services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: cms_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data # Persist data
    ports:
      - "5432:5432" # Expose for local access if needed (remove in production)
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Caching Service
  redis:
    image: redis:7-alpine
    container_name: cms_redis
    restart: always
    ports:
      - "6379:6379" # Expose for local access if needed (remove in production)
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend Application Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cms_backend
    restart: always
    ports:
      - "3000:3000" # Expose backend port
    env_file:
      - ./backend/.env # Load backend environment variables
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app # Mount host directory for live changes (dev only)
      - /app/node_modules # Exclude node_modules from host mount
    # Commands to run migrations and seeders before starting the app
    # This assumes `sequelize-cli` is installed globally in the container
    command: >
      sh -c "npx sequelize-cli db:migrate &&
             npx sequelize-cli db:seed:all &&
             npm start"
    # In production, you might separate migration/seed to a dedicated job or entrypoint.

  # Frontend Application Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cms_frontend
    restart: always
    ports:
      - "3001:3001" # Expose frontend port (React dev server)
    env_file:
      - ./frontend/.env # Load frontend environment variables
    depends_on:
      - backend # Frontend depends on backend for API calls
    volumes:
      - ./frontend:/app # Mount host directory for live changes (dev only)
      - /app/node_modules # Exclude node_modules from host mount
    # For production, you'd typically build the static assets and serve them with Nginx.
    # The current setup is for development convenience.
    command: npm start

volumes:
  pgdata:    # Volume for PostgreSQL data persistence
  redisdata: # Volume for Redis data persistence
```