<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ML Utilities</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <h1>ML Utilities System</h1>
        <p>Login to access your ML workspace</p>
    </header>
    <nav>
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/dashboard">Dashboard</a>
        <a href="/docs">API Docs</a>
    </nav>
    <div class="container">
        <h2>Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <p id="success-message" class="success-message" style="display: none;"></p>
        <p id="error-message" class="error-message" style="display: none;"></p>
        <p style="text-align: center; margin-top: 20px;">
            Don't have an account? Contact an administrator.
        </p>
        <p style="text-align: center; margin-top: 20px;">
            Default admin: <strong>admin@example.com</strong> / <strong>adminpassword</strong> (from .env.example)
        </p>
    </div>
    <footer>
        <p>&copy; 2023 ML Utilities System. All rights reserved.</p>
    </footer>
    <script src="/static/js/main.js"></script>
</body>
</html>
