<!DOCTYPE html>
<html>
<head>
    <title>Task Management API - Swagger UI</title>
    <link rel="stylesheet" type="text/css" href="{{ swagger_ui_css }}">
    <style>
        html {
            box-sizing: border-box;
            overflow: -moz-scrollbars-vertical;
            overflow-y: scroll;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }
        body {
            margin: 0;
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div id="swagger-ui"></div>
    <script src="{{ swagger_ui_bundle_js }}"></script>
    <script src="{{ swagger_ui_standalone_preset_js }}"></script>
    <script>
        window.onload = function() {
            // Build a system
            const ui = SwaggerUIBundle({
                url: "{{ swagger_spec_url }}",
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                    SwaggerUIBundle.presets.apis,
                    SwaggerUIStandalonePreset
                ],
                plugins: [
                    SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: "StandaloneLayout",
                validatorUrl: null // Disable Swagger validator
            });
            window.ui = ui;
        };
    </script>
</body>
</html>
