server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:alxchatdb}
    username: ${DB_USERNAME:alxuser}
    password: ${DB_PASSWORD:alxpassword}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none # Flyway manages schema
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          lob:
            non_contextual_creation: true # Fix for Postgres bytea
  flyway:
    enabled: true
    locations: classpath:db/migration
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  cache:
    type: redis
  main:
    allow-bean-definition-overriding: true # Required for Testcontainers sometimes

jwt:
  secret: ${JWT_SECRET:a_very_secret_key_that_should_be_at_least_256_bits_long_and_randomly_generated_in_production}
  expiration: ${JWT_EXPIRATION:3600000} # 1 hour in milliseconds

logging:
  level:
    com.alxchat: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
    org.springframework.security: INFO

# Springdoc OpenAPI (Swagger UI) configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    disable-swagger-default-url: true
    urls[0]:
      url: /v3/api-docs
      name: ALX Chat API
```
*Note: `JWT_SECRET` should be a long, randomly generated string in production, e.g., `openssl rand -base64 32`.*