spring:
  application:
    name: ecommerce-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ecommerce_db}
    username: ${DB_USERNAME:ecommerce_user}
    password: ${DB_PASSWORD:ecommerce_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none # Liquibase handles DDL
    show-sql: true
    properties:
      hibernate.format_sql: true
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
  liquibase:
    change-log: classpath:/database/liquibase/master.xml
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080 # Placeholder, adjust if using external IdP
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour in milliseconds

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:superSecretKeyForALXECommerceSolutionThatIsAtLeast32BytesLong} # MUST BE 256-bit (32 characters) or stronger
  expiration: 86400000 # 24 hours in milliseconds

# OpenAPI (Swagger) Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  default-produces-media-type: application/json

# Actuator Endpoints (for monitoring)
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

# Rate Limiting Configuration
rate-limit:
  enabled: true
  max-requests: 10 # Max requests per client IP
  time-window-seconds: 60 # Time window in seconds

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    com.alx.ecommerce: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  file:
    name: logs/ecommerce.log
  pattern:
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
    console: "%d{HH:mm:ss.SSS} %highlight(%-5level) %cyan(%logger{36}) - %msg%n"
```
