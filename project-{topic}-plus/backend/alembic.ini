```ini
[alembic]
# Path to migration scripts
script_location = alembic
# Python path to your models for autogenerate
sqlalchemy.url = postgresql+psycopg2://user:password@db:5432/chat_db # Placeholder for alembic usage
target_metadata = backend.app.core.database.Base.metadata

[post_write_hooks]
# For instance, to run black on new migrations
# hooks = black

[loggers]
keys = root, alembic, sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[logger_sqlalchemy]
level = INFO
handlers = console
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```