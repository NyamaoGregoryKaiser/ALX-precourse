```ini
[alembic]
script_location = alembic
sqlalchemy.url = ${DATABASE_URL}
asyncio.mode = true

# Path to the database models module for autogenerate
# This tells Alembic where to find your SQLAlchemy models
# The `app` part refers to the Python package `backend/app/`
# Change this if your models are located differently
version_locations = alembic/versions
versions_location = %(version_locations)s

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
formatter = generic
args = (sys.stderr,)

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```