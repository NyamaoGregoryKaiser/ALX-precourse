[alembic]
script_location = migrations
sqlalchemy.url = postgresql://user:password@localhost:5432/project_db
# For asyncpg, you might specify:
# sqlalchemy.url = postgresql+asyncpg://user:password@localhost:5432/project_db
# This URL is used by Alembic for schema comparison. Ensure it's correctly configured for your DB.

# A configurable module where the 'Base' object is located.
# The 'Base' object is used by Alembic to detect changes in your SQLAlchemy models.
target_metadata = app.core.database:Base

# Version table configuration
version_table = alembic_version
version_table_schema =

# Rendering of the migration script
# You might want to customize this to include imports, etc.
# Default will be fine for now.

[post_write_hooks]
# Example: run 'black' formatter on new migration files
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
