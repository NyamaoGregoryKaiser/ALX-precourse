```ini
[alembic]
# Path to the migration script directory
script_location = alembic
# The file from which 'env.py' will acquire the 'MetaData' object
# for the database.
sqlalchemy.url =  # This will be configured dynamically in env.py from DATABASE_URL

# Logging configuration
# You can customize loggers here.
# For example, to quiet down 'sqlalchemy.engine' logs:
# loggers = root,sqlalchemy.engine

[logging]
level = INFO
format = %(levelname)s:%(name)s:%(message)s
datefmt = %H:%M:%S

[logger_root]
level = INFO
handlers = console

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[logger_sqlalchemy]
level = WARN
handlers = console
qualname = sqlalchemy

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```