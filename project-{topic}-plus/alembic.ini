```ini
[alembic]
# Path to the migration script directory
script_location = alembic

# Path to the file containing the SQLAlchemy model's Base object
# This is used by env.py to access your models' metadata
sqlalchemy.url = postgresql+asyncpg://user:password@db:5432/app_db

# Revision identifiers. See https://alembic.sqlalchemy.org/en/latest/branches.html
revision_environment = false
revision_output_format = long

# The file containing the SQLAlchemy engine/connection setup (usually `env.py`)
# This file is loaded by Alembic to configure the database connection
file_template = %%(rev)s_%%(head)s_%%(slug)s

# Output standard 'autogen' comments in new migrations.
# This makes it easier to track what changes Alembic detected.
make_revision_header = true

# Version table. This is the table Alembic uses to track applied migrations.
version_table = alembic_version

# --- Custom Options ---
# You might want to define custom options for your specific environment
# For example, to control the async mode in env.py
# async_mode = True

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers = console
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
```