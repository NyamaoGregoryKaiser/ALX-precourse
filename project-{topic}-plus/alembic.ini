[alembic]
# Path to the migrations directory
script_location = migrations

# A base module for migration scripts (the default is usually fine)
sqlalchemy.url = $(DATABASE_URL) # This will be loaded from env if using Flask-Migrate's FlaskGroup

# If your models are in a different module, update this
# For Flask-SQLAlchemy integration, this is often handled automatically
# by the Flask-Migrate extension which passes the model base.
# If you run `alembic revision --autogenerate` without Flask-Migrate,
# you'd need to import your models in migrations/env.py.
# This config isn't directly used for Flask-Migrate `flask db migrate`.

[post_write_hooks]
# For example, to run black on new migration files
# post_write_hooks = black

[loggers]
keys = root, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_alembic]
level = INFO
handlers = console
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S