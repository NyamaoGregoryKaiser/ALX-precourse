```yaml
spring:
  application:
    name: product-management-system
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:product_db}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:adminpass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # In production, always use 'validate' or 'none' with Flyway
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false # Avoid N+1 issues in web layer
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    cache-names: products, categories
    caffeine:
      spec: maximumSize=500,expireAfterWrite=10m # Global settings, can be overridden per @Cacheable

server:
  port: 8080

alx:
  app:
    jwtSecret: ${JWT_SECRET:supersecretkeythatisatleast256bitlongforproductionuse1234567890} # Use a strong secret in production
    jwtExpirationMs: 86400000 # 24 hours

logging:
  level:
    root: INFO
    com.alx.pm: DEBUG # Set application specific logging level to DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG # Log SQL queries
    org.hibernate.type.descriptor.sql.BasicExtractor: TRACE # Log parameters bound to SQL queries

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, caches # Expose actuator endpoints for monitoring
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

# SpringDoc OpenAPI/Swagger UI configuration
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  default-produces-media-type: application/json
```