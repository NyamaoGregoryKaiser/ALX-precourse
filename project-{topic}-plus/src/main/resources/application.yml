```yaml
server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: data-viz-tool
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/datavizdb
    username: datavizuser
    password: datavizpass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate # Should be 'validate' in production, 'update' or 'create-drop' for dev/test
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc.lob.non_contextual_creation: true # Fix for specific Hibernate/PostgreSQL issues
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # Important for existing databases or initial deployments
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
  cache:
    cache-names: users,dataSources,dashboards,charts,dataSourceData,chartData # Define cache names
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m # Default caching spec if not explicitly configured in CacheConfig

application:
  security:
    jwt:
      secret-key: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000 # 24 hours in milliseconds (24 * 60 * 60 * 1000)
    rate-limit:
      requests-per-minute: 10 # For RateLimitingFilter

logging:
  level:
    root: INFO
    com.alx.dataviz: DEBUG
    org.springframework: INFO
    org.hibernate: INFO
    org.flywaydb: INFO
  file:
    name: logs/application.log
    max-size: 10MB
    max-history: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,env,beans,cache
  endpoint:
    health:
      show-details: always
    metrics:
      enabled: true
    prometheus:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
    groups:
      enabled: true
```